<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION | Austin's Elite Motors</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --neon: #ff0000; --bg: #000000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); 
        }
        .logo { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 4px; font-weight: 900; }
        .logo span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        
        nav a { color: #fff; margin-left: 25px; text-decoration: none; font-size: 11px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; cursor: pointer; opacity: 0.6; transition: 0.4s; }
        nav a:hover { opacity: 1; color: var(--neon); }

        .page { display: none; padding-top: 100px; min-height: 100vh; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-box { max-width: 650px; margin: 40px auto; background: var(--glass); padding: 40px; border: 1px solid var(--border); backdrop-filter: blur(15px); border-radius: 4px; }
        h2, h3 { font-family: 'Orbitron'; text-transform: uppercase; letter-spacing: 2px; }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 20px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 2px; font-family: 'Inter'; }
        .btn-action { width: 100%; padding: 20px; background: transparent; color: #fff; border: 1px solid var(--neon); font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .btn-action:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
        
        .btn-danger { background: rgba(255,0,0,0.1); border: 1px solid #ff0000; color: #ff0000; padding: 8px 15px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; }
        .btn-danger:hover { background: #ff0000; color: #fff; }

        .log-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        .log-table th { background: #111; color: var(--neon); padding: 15px; text-align: left; border: 1px solid #222; }
        .log-table td { padding: 12px; border: 1px solid #222; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px 5%; }
        .car-card { border: 1px solid #222; background: #050505; }
        .car-card img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(0.5); transition: 0.5s; }
        .car-card:hover img { filter: grayscale(0); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO<span>NATION</span></div>
    <nav>
        <a onclick="goPage('home')">Home</a>
        <a onclick="goPage('auto')">Showroom</a>
        <a onclick="goPage('personale')">Staff Area</a>
        <a onclick="goPage('owner')">Admin</a>
    </nav>
</header>

<div id="home" class="page active">
    <div style="height: 80vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center;">
        <h1 style="font-family: 'Orbitron'; font-size: 80px; margin: 0;">AUSTIN CORE</h1>
        <p style="color: var(--neon); letter-spacing: 15px;">PREMIUM VEHICLE MANAGEMENT</p>
    </div>
</div>

<div id="auto" class="page">
    <h2 style="text-align:center;">Current Inventory</h2>
    <div id="car-list" class="grid"></div>
</div>

<div id="personale" class="page">
    <div id="personal-login" class="glass-box">
        <h3>Staff Access</h3>
        <input id="uStaff" placeholder="Username"><input id="pStaff" type="password" placeholder="Password">
        <button class="btn-action" onclick="loginP()">LOGIN</button>
    </div>
    <div id="personal-content" class="hidden">
        <div class="glass-box">
            <h2 style="color: var(--neon);">Vehicle Bill of Sale</h2>
            <label>Select Car</label>
            <select id="selAuto" onchange="updatePrice()"></select>
            <input id="fCliente" placeholder="Buyer Name (Full Name)">
            <input id="fPrezzo" placeholder="Final Sale Price">
            <input id="fFirmaStaff" placeholder="Sales Manager Signature">
            <button class="btn-action" onclick="eseguiVendita()">PRINT & REGISTER CONTRACT</button>
        </div>
    </div>
</div>

<div id="owner" class="page">
    <div id="owner-login" class="glass-box">
        <h3>Master Access</h3>
        <input id="oPass" type="password" placeholder="Master Key">
        <button class="btn-action" onclick="loginO()">ENTER CORE</button>
    </div>
    <div id="owner-content" class="hidden">
        <div class="glass-box">
            <h3>Add New Vehicle</h3>
            <input id="cName" placeholder="Make & Model"><input id="cPrice" placeholder="Base Price"><input type="file" id="cImg">
            <button class="btn-action" onclick="caricaAuto()">ADD TO INVENTORY</button>
        </div>
        <div class="glass-box" style="max-width:95%">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Sales Logs & Plates</h3>
                <button class="btn-danger" onclick="resetTarghe()">RESET ALL DATA</button>
            </div>
            <table class="log-table">
                <thead><tr><th>Date</th><th>Buyer</th><th>Vehicle</th><th>Plate</th><th>Price</th><th>Staff</th></tr></thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let tempImg = null;

async function calcolaProssimaTarga() {
    const snap = await db.ref('sales_logs').limitToLast(1).once('value');
    const data = snap.val();
    if (!data) return "TEX-001";
    const lastKey = Object.keys(data)[0];
    const lastTarga = data[lastKey].targa;
    const num = parseInt(lastTarga.split('-')[1]);
    return "TEX-" + (num + 1).toString().padStart(3, '0');
}

function resetTarghe() {
    if(confirm("DANGER: This will wipe all sales history and restart plate sequence at TEX-001. Proceed?")) {
        db.ref('sales_logs').remove().then(() => location.reload());
    }
}

db.ref('cars').on('value', s => {
    const data = s.val();
    const grid = document.getElementById("car-list"), sel = document.getElementById("selAuto");
    grid.innerHTML = ""; sel.innerHTML = "<option>Choose...</option>";
    for(let id in data){
        grid.innerHTML += `<div class="car-card"><img src="${data[id].image}"><div style="padding:15px"><b>${data[id].name}</b><br><span style="color:red">${data[id].price}</span></div></div>`;
        sel.innerHTML += `<option value="${data[id].name}" data-p="${data[id].price}">${data[id].name}</option>`;
    }
});

db.ref('sales_logs').on('value', s => {
    const data = s.val();
    const body = document.getElementById("logs-body");
    body.innerHTML = "";
    if(data) Object.keys(data).reverse().forEach(id => {
        const v = data[id];
        body.innerHTML += `<tr><td>${v.data}</td><td>${v.cliente}</td><td>${v.veicolo}</td><td style="color:red; font-weight:bold;">${v.targa}</td><td>${v.prezzo}</td><td>${v.staff}</td></tr>`;
    });
});

function goPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById(p).classList.add('active'); }

document.getElementById('cImg').onchange = e => { const r = new FileReader(); r.onload = ev => tempImg = ev.target.result; r.readAsDataURL(e.target.files[0]); };
function caricaAuto() {
    const n = document.getElementById('cName').value, p = document.getElementById('cPrice').value;
    if(!n || !p || !tempImg) return alert("Missing data");
    db.ref('cars').push({ name:n, price:p, image:tempImg }).then(()=> alert("Car Added"));
}

function updatePrice() { const s = document.getElementById("selAuto"); document.getElementById("fPrezzo").value = s.options[s.selectedIndex].dataset.p || ""; }

async function eseguiVendita() {
    const cli = document.getElementById("fCliente").value, vei = document.getElementById("selAuto").value, prz = document.getElementById("fPrezzo").value, stf = document.getElementById("fFirmaStaff").value;
    if(!cli || !stf || vei === "Choose...") return alert("Fill all fields");
    const targa = await calcolaProssimaTarga();
    const oggi = new Date().toLocaleDateString('en-US');

    db.ref('sales_logs').push({ data: oggi, cliente: cli, veicolo: vei, targa: targa, prezzo: prz, staff: stf }).then(() => {
        generaContrattoSerio(cli, vei, targa, prz, stf, oggi);
    });
}

// --- IL NUOVO PDF PROFESSIONALE ---
function generaContrattoSerio(cli, vei, targa, prz, stf, data) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    // Bordi pagina
    pdf.setDrawColor(0); pdf.setLineWidth(0.5);
    pdf.rect(5, 5, 200, 287);

    // Header - Stile AutoNation
    pdf.setFillColor(0); pdf.rect(10, 10, 190, 20, 'F');
    pdf.setTextColor(255); pdf.setFont("helvetica", "bold"); pdf.setFontSize(22);
    pdf.text("AutoNation", 15, 24);
    pdf.setFontSize(8); pdf.text("AUSTIN ELITE MOTORS - OFFICIAL DOCUMENT", 195, 24, {align: "right"});

    // Info Principali
    pdf.setTextColor(0); pdf.setFontSize(14); pdf.text("VEHICLE BILL OF SALE & DISCLOSURE", 105, 45, {align: "center"});
    
    // Griglia Buyer
    pdf.setLineWidth(0.2);
    pdf.rect(10, 55, 190, 30); 
    pdf.setFontSize(9); pdf.setFont("helvetica", "bold"); pdf.text("BUYER INFORMATION", 12, 60);
    pdf.setFont("helvetica", "normal");
    pdf.text("FULL NAME: " + cli.toUpperCase(), 15, 70);
    pdf.text("DATE OF SALE: " + data, 15, 78);

    // Griglia Vehicle
    pdf.rect(10, 90, 190, 50);
    pdf.setFont("helvetica", "bold"); pdf.text("VEHICLE DESCRIPTION", 12, 95);
    pdf.setFont("helvetica", "normal");
    pdf.text("MAKE / MODEL: " + vei, 15, 105);
    pdf.setFontSize(16); pdf.text("ASSIGNED PLATE: " + targa, 15, 120);
    pdf.setFontSize(9); pdf.text("STATE: TEXAS (TX)", 15, 130);

    // Griglia Pricing
    pdf.rect(10, 145, 190, 30);
    pdf.setFont("helvetica", "bold"); pdf.text("PURCHASE PRICE", 12, 150);
    pdf.setFontSize(14); pdf.text("TOTAL PAID: " + prz, 15, 165);

    // Clausole Legali (Testo piccolo come i contratti veri)
    pdf.setFontSize(7); pdf.setFont("times", "italic");
    const legal = "This document confirms the transfer of ownership of the described vehicle from AutoNation Austin to the buyer. The buyer accepts the vehicle in its current condition ('As-Is'). The assigned license plate is issued under Texas Department of Motor Vehicles regulations. Any modification or falsification of this document is a federal offense.";
    pdf.text(pdf.splitTextToSize(legal, 180), 15, 185);

    // Firme
    pdf.setLineWidth(0.5);
    pdf.setFontSize(10); pdf.setFont("helvetica", "bold");
    
    // Firma Venditore
    pdf.line(15, 240, 90, 240);
    pdf.text("AUTHORIZED SIGNATURE (STAFF)", 15, 245);
    pdf.setFont("courier", "bolditalic"); pdf.text(stf, 20, 238); // Simula firma scritta

    // Firma Acquirente
    pdf.line(115, 240, 190, 240);
    pdf.setFont("helvetica", "bold"); pdf.text("BUYER SIGNATURE", 115, 245);

    // Footer
    pdf.setFontSize(8); pdf.setTextColor(150);
    pdf.text("Page 1 of 1 - Document ID: " + btoa(targa), 105, 280, {align: "center"});

    pdf.save(`Contract_${targa}.pdf`);
}

function loginO() { if(document.getElementById('oPass').value === "OWNER123") { document.getElementById('owner-login').classList.add('hidden'); document.getElementById('owner-content').classList.remove('hidden'); } }
function loginP() { if(document.getElementById('uStaff').value === "admin" && document.getElementById('pStaff').value === "1234") { document.getElementById('personal-login').classList.add('hidden'); document.getElementById('personal-content').classList.remove('hidden'); } }
</script>
</body>
</html>
