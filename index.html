<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoNation</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">AutoNation</div>

<nav>
<a href="#">Home</a>
<a href="#cars">Auto</a>
<a href="#" onclick="openPanel()">Personale</a>
</nav>

</header>


<section class="hero">

<h1>AutoNation</h1>
<p>Concessionario Premium</p>

<button onclick="scrollToCars()">SCOPRI LE AUTO</button>

</section>


<section id="cars">

<h2>Veicoli Disponibili</h2>

<div id="car-list"></div>

</section>


<div id="panel" class="hidden">

<div class="panel-box">

<h2>Pannello Personale</h2>

<input id="name" placeholder="Nome auto">

<input id="price" placeholder="Prezzo">

<input id="image" placeholder="Link immagine">

<div id="drop-area">Trascina immagine qui</div>

<button onclick="addCar()">Aggiungi Auto</button>

<button onclick="closePanel()">Chiudi</button>

</div>

</div>


<footer>

<p>© 2026 AutoNation</p>

</footer>

<script src="script.js"></script>

</body>
</html>
