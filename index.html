<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL V3 | AUSTIN LUXURY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --main: #ff2e4d;
            --bg-dark: #050505;
            --panel-bg: #0d0d0d;
            --border-color: #1a1a1a;
            --accent-blue: #00f2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR STILE FIVEM */
        nav {
            width: 90px;
            background: #000;
            border-right: 2px solid var(--main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 20px;
            z-index: 100;
        }

        .nav-btn {
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            color: #444; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s;
        }

        .nav-btn:hover { color: var(--main); background: #111; }
        .nav-btn.active { background: var(--main); color: #fff; box-shadow: 0 0 15px var(--main); }

        /* CONTENT AREA */
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #110000 0%, #050505 100%); }
        
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* GRID E CARTE */
        .category-bar { display: flex; gap: 10px; margin-bottom: 30px; }
        .cat-chip {
            padding: 10px 20px; border: 1px solid var(--border-color);
            border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem;
            transition: 0.3s; background: #000;
        }
        .cat-chip.active { background: var(--main); border-color: var(--main); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .car-card {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 15px; position: relative; overflow: hidden;
        }
        .car-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .car-price { color: var(--main); font-family: 'Orbitron'; font-weight: 900; margin: 10px 0; }

        /* PANNELLI BLINDATI */
        .lock-screen {
            text-align: center; padding: 100px 20px;
        }
        .form-group { background: var(--panel-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); }
        
        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #000; border: 1px solid var(--border-color);
            color: #fff; border-radius: 8px; font-family: 'Outfit';
        }

        .btn-main {
            width: 100%; padding: 15px; background: var(--main);
            color: #fff; border: none; border-radius: 8px;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            margin-top: 10px; text-transform: uppercase;
        }

        .hidden { display: none !important; }

        #sig-pad { background: #fff; border-radius: 10px; cursor: crosshair; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-btn active" onclick="show('home', this)"><i class="fa-solid fa-house"></i></div>
        <div class="nav-btn" onclick="show('showroom', this)"><i class="fa-solid fa-car"></i></div>
        <div class="nav-btn" onclick="show('booking', this)"><i class="fa-solid fa-calendar-alt"></i></div>
        <div class="nav-btn" onclick="show('sales', this)"><i class="fa-solid fa-file-invoice-dollar"></i></div>
        <div class="nav-btn" onclick="show('admin', this)"><i class="fa-solid fa-shield-halved"></i></div>
    </nav>

    <main>
        <section id="home" class="view active">
            <h1 style="font-family:'Orbitron'; font-size: 3.5rem;">AUSTIN<span style="color:var(--main)">MOTORS</span></h1>
            <p style="letter-spacing: 8px; color: #555; margin-bottom: 50px;">LUXURY & PERFORMANCE TERMINAL</p>
            <div class="grid">
                <div class="form-group">
                    <h2 id="count-cars">0</h2>
                    <p>VEICOLI DISPONIBILI</p>
                </div>
                <div class="form-group">
                    <h2 id="count-sales">0</h2>
                    <p>VENDITE REGISTRATE</p>
                </div>
            </div>
        </section>

        <section id="showroom" class="view">
            <div class="category-bar">
                <div class="cat-chip active" onclick="filter('All', this)">TUTTE</div>
                <div class="cat-chip" onclick="filter('Luxury', this)">LUXURY</div>
                <div class="cat-chip" onclick="filter('Sport', this)">SPORT</div>
                <div class="cat-chip" onclick="filter('SUV', this)">SUV</div>
            </div>
            <div id="car-list" class="grid"></div>
        </section>

        <section id="booking" class="view">
            <div class="form-group" style="max-width: 500px; margin: auto;">
                <h2 style="font-family:'Orbitron'; color:var(--main);">PRENOTA APPUNTAMENTO</h2>
                <input id="app-name" placeholder="Nome IC">
                <input id="app-discord" placeholder="ID Discord">
                <input type="date" id="app-date">
                <select id="app-car"></select>
                <button class="btn-main" onclick="saveApp()">Invia Richiesta</button>
            </div>
        </section>

        <section id="sales" class="view">
            <div id="sales-auth" class="lock-screen">
                <i class="fa-solid fa-lock" style="font-size: 3rem; color: var(--main);"></i>
                <input type="password" id="sales-pin" placeholder="PIN DIPENDENTE" style="max-width: 300px; text-align: center;">
                <button class="btn-main" style="max-width: 300px;" onclick="authSales()">ACCEDI</button>
            </div>
            <div id="sales-panel" class="hidden">
                <div class="form-group">
                    <h2 style="font-family:'Orbitron';">SISTEMA FATTURAZIONE</h2>
                    <div style="display: flex; gap: 20px; margin-top: 20px;">
                        <div style="flex: 1;">
                            <input id="fac-client" placeholder="Nome Cliente">
                            <select id="fac-car" onchange="autoPrice()"></select>
                            <input id="fac-price" type="number" placeholder="Prezzo $">
                        </div>
                        <div style="flex: 1; text-align: center;">
                            <p style="font-size: 0.7rem; color: var(--main);">FIRMA CLIENTE</p>
                            <canvas id="sig-pad" width="300" height="150"></canvas>
                            <button onclick="clearPad()" style="background:none; border:none; color:#555; cursor:pointer;">Pulisci</button>
                        </div>
                    </div>
                    <button class="btn-main" onclick="makeInvoice()">GENERA PDF E LOGGA VENDITA</button>
                </div>
            </div>
        </section>

        <section id="admin" class="view">
            <div id="admin-auth" class="lock-screen">
                <input type="password" id="admin-pin" placeholder="MASTER PIN" style="max-width: 300px; text-align: center;">
                <button class="btn-main" style="max-width: 300px;" onclick="authAdmin()">ENTRA</button>
            </div>
            <div id="admin-panel" class="hidden">
                <div class="form-group">
                    <h2 style="font-family:'Orbitron';">GESTIONE STOCK</h2>
                    <input id="new-name" placeholder="Nome Veicolo">
                    <input id="new-price" type="number" placeholder="Prezzo $">
                    <select id="new-cat">
                        <option value="Luxury">Luxury</option>
                        <option value="Sport">Sport</option>
                        <option value="SUV">SUV</option>
                    </select>
                    <input type="file" id="new-img" accept="image/*">
                    <button class="btn-main" onclick="addCar()">PUBBLICA VEICOLO</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURAZIONE FIREBASE
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        let stock = {};
        let currentCategory = "All";

        // GESTIONE NAVIGAZIONE
        function show(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'sales') initCanvas();
        }

        // AUTH
        function authSales() { if(document.getElementById('sales-pin').value === '1234') { document.getElementById('sales-auth').classList.add('hidden'); document.getElementById('sales-panel').classList.remove('hidden'); } }
        function authAdmin() { if(document.getElementById('admin-pin').value === 'OWNER2026') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); } }

        // SINCRONIZZAZIONE DATI
        db.ref('cars').on('value', res => {
            stock = res.val() || {};
            renderShowroom();
            updateDropdowns();
            document.getElementById('count-cars').innerText = Object.keys(stock).length;
        });

        db.ref('sales_logs').on('value', res => {
            document.getElementById('count-sales').innerText = res.numChildren();
        });

        function renderShowroom() {
            const container = document.getElementById('car-list');
            container.innerHTML = "";
            for(let id in stock) {
                const c = stock[id];
                if(currentCategory !== "All" && c.category !== currentCategory) continue;
                container.innerHTML += `
                    <div class="car-card">
                        <div style="position:absolute; top:10px; right:10px; background:var(--main); padding:3px 8px; font-size:0.6rem; font-family:'Orbitron'; border-radius:3px;">${c.category}</div>
                        <img src="${c.img}">
                        <h3 style="margin-top:10px;">${c.name}</h3>
                        <p class="car-price">$ ${parseInt(c.price).toLocaleString()}</p>
                    </div>
                `;
            }
        }

        function filter(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderShowroom();
        }

        function updateDropdowns() {
            const selects = [document.getElementById('app-car'), document.getElementById('fac-car')];
            let options = '<option value="">-- Seleziona --</option>';
            for(let id in stock) options += `<option value="${stock[id].name}">${stock[id].name}</option>`;
            selects.forEach(s => s.innerHTML = options);
        }

        function autoPrice() {
            const val = document.getElementById('fac-car').value;
            for(let id in stock) if(stock[id].name === val) document.getElementById('fac-price').value = stock[id].price;
        }

        // LOGICA PDF E VENDITE
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sig-pad');
            ctx = canvas.getContext('2d');
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
            canvas.onmousedown = () => drawing = true;
            canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            };
        }
        function clearPad() { ctx.clearRect(0,0,300,150); }

        function makeInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const client = document.getElementById('fac-client').value;
            const car = document.getElementById('fac-car').value;
            const price = document.getElementById('fac-price').value;

            if(!client || !car) return alert("Compila tutto!");

            doc.setFontSize(22); doc.text("AUSTIN LUXURY MOTORS - VENDITA", 20, 20);
            doc.setFontSize(14);
            doc.text(`Acquirente: ${client}`, 20, 40);
            doc.text(`Veicolo: ${car}`, 20, 50);
            doc.text(`Prezzo Finale: $ ${price}`, 20, 60);
            doc.addImage(canvas.toDataURL(), 'PNG', 20, 80, 60, 30);
            doc.text("Firma per Accettazione", 20, 115);

            db.ref('sales_logs').push({ client, car, price, date: new Date().toLocaleDateString() });
            doc.save(`Fattura_${client}.pdf`);
            alert("VENDITA REGISTRATA E PDF GENERATO!");
        }

        // ADMIN ADD
        let b64 = "";
        document.getElementById('new-img').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => b64 = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        function addCar() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const category = document.getElementById('new-cat').value;
            if(!name || !price || !b64) return alert("Mancano dati!");
            db.ref('cars').push({ name, price, category, img: b64 }).then(() => {
                alert("VEICOLO AGGIUNTO!");
                document.getElementById('new-name').value = "";
            });
        }

        function saveApp() {
            const data = {
                user: document.getElementById('app-name').value,
                dc: document.getElementById('app-discord').value,
                date: document.getElementById('app-date').value,
                car: document.getElementById('app-car').value
            };
            db.ref('appointments').push(data).then(() => alert("RICHIESTA INVIATA!"));
        }
    </script>
</body>
</html>
