<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION TEXAS | CORPORATE TERMINAL</title>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;700;900&family=Outfit:wght@100;300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --primary-glow: rgba(255, 46, 77, 0.5);
            --bg-dark: #050505;
            --sidebar-bg: #0a0a0a;
            --card-bg: #0d0d0d;
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent-grad: linear-gradient(135deg, #ff2e4d 0%, #a81d32 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        nav {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 50px 25px;
            z-index: 1000;
        }

        .brand-logo {
            width: 120px; height: 120px;
            border-radius: 50%; border: 2px solid var(--primary);
            margin: 0 auto 20px; display: block;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .nav-menu { display: flex; flex-direction: column; gap: 10px; }
        .nav-item {
            padding: 18px 22px; border-radius: 12px;
            color: var(--text-dim); font-family: 'Orbitron';
            font-size: 0.7rem; cursor: pointer;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s; border: 1px solid transparent;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active {
            background: var(--accent-grad);
            color: #fff; border-color: var(--primary);
        }

        /* --- MAIN CONTENT --- */
        main { flex: 1; overflow-y: auto; background: #050505; position: relative; }
        
        .view-section {
            display: none; /* Nascondi tutto di default */
            padding: 60px;
            animation: fadeIn 0.5s ease;
        }

        .view-section.active { display: block; } /* Mostra solo se attivo */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .neo-panel {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            padding: 40px; border-radius: 20px;
        }

        .btn-premium {
            width: 100%; padding: 20px;
            background: var(--accent-grad); color: #fff;
            border: none; border-radius: 10px;
            font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; text-transform: uppercase;
        }

        input, select {
            width: 100%; background: #000; border: 1px solid #222;
            color: #fff; padding: 15px; border-radius: 10px; margin-top: 5px;
        }

        #sig-canvas { background: #fff; border-radius: 10px; width: 100%; height: 150px; }
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <nav>
        <img src="https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png" class="brand-logo">
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchPage('home-view', this)"><i class="fa-solid fa-house"></i> HUB</div>
            <div class="nav-item" onclick="switchPage('showroom-view', this)"><i class="fa-solid fa-car"></i> FLOTTA</div>
            <div class="nav-item" onclick="switchPage('booking-view', this)"><i class="fa-solid fa-calendar"></i> APPUNTAMENTI</div>
            <div class="nav-item" onclick="switchPage('sales-view', this)"><i class="fa-solid fa-file-invoice"></i> VENDITE</div>
            <div class="nav-item" onclick="switchPage('owner-view', this)"><i class="fa-solid fa-lock"></i> OWNER</div>
        </div>
    </nav>

    <main id="main-scroll">

        <section id="home-view" class="view-section active">
            <div style="text-align:center; margin-top: 100px;">
                <h1 style="font-family:'Orbitron'; font-size: 5rem;">AUTO<span style="color:var(--primary)">NATION</span></h1>
                <p style="letter-spacing: 10px; color: var(--text-dim);">AUSTIN LUXURY MOTORS</p>
                <div style="display:flex; justify-content:center; gap:50px; margin-top:50px;">
                    <div><h2 id="stat-cars">0</h2><p>VEICOLI</p></div>
                    <div><h2>203</h2><p>CIVICO</p></div>
                </div>
            </div>
        </section>

        <section id="showroom-view" class="view-section">
            <h1 style="font-family:'Orbitron'; margin-bottom:30px;">LUXURY <span style="color:var(--primary)">FLEET</span></h1>
            <div id="showroom-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
        </section>

        <section id="booking-view" class="view-section">
            <div class="neo-panel" style="max-width: 600px; margin: 0 auto;">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px;">PRENOTA VISITA</h2>
                <input id="b-name" placeholder="Nome IC">
                <input id="b-disc" placeholder="ID Discord">
                <input type="date" id="b-date">
                <button class="btn-premium" style="margin-top:20px;" onclick="sendBook()">Invia Richiesta</button>
            </div>
        </section>

        <section id="sales-view" class="view-section">
            <div id="sales-login" class="neo-panel" style="max-width:400px; margin: 0 auto; text-align:center;">
                <input type="password" id="s-pin" placeholder="PIN AGENTE">
                <button class="btn-premium" onclick="checkSPin()">Sblocca</button>
            </div>
            <div id="sales-content" class="hidden neo-panel">
                <h2 style="font-family:'Orbitron';">NUOVO CONTRATTO</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div>
                        <input id="s-client" placeholder="Nome Cliente">
                        <select id="s-car" onchange="updateSPrice()"></select>
                        <input id="s-price" type="number" placeholder="Prezzo">
                    </div>
                    <div>
                        <canvas id="sig-canvas"></canvas>
                        <button onclick="clearSig()" style="color:red; background:none; border:none; cursor:pointer;">Pulisci Firma</button>
                    </div>
                </div>
                <button class="btn-premium" style="margin-top:20px;" onclick="makeSale()">Finalizza Vendita</button>
            </div>
        </section>

        <section id="owner-view" class="view-section">
            <div id="owner-login" class="neo-panel" style="max-width:400px; margin: 0 auto; text-align:center;">
                <input type="password" id="o-pin" placeholder="MASTER PIN">
                <button class="btn-premium" onclick="checkOPin()">Entra</button>
            </div>
            <div id="owner-content" class="hidden neo-panel">
                <h2 style="font-family:'Orbitron';">GESTIONE STOCK</h2>
                <input id="add-n" placeholder="Nome Modello">
                <input id="add-p" type="number" placeholder="Prezzo">
                <input type="file" id="add-f">
                <button class="btn-premium" style="margin-top:20px;" onclick="pushCar()">Aggiungi Veicolo</button>
            </div>
        </section>

    </main>

    <script>
        // Firebase
        const fbCfg = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(fbCfg);
        const db = firebase.database();

        // Navigazione (Corretta)
        function switchPage(id, el) {
            // Nasconde tutte le sezioni
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            // Rimuove classe active da tutti i tasti
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Mostra la sezione cliccata
            document.getElementById(id).classList.add('active');
            // Attiva il tasto cliccato
            el.classList.add('active');
            
            // Reset scroll
            document.getElementById('main-scroll').scrollTop = 0;

            if(id === 'sales-view') initCanvas();
        }

        // Logic
        function checkSPin() { if(document.getElementById('s-pin').value === '1234') { document.getElementById('sales-login').classList.add('hidden'); document.getElementById('sales-content').classList.remove('hidden'); initCanvas(); } }
        function checkOPin() { if(document.getElementById('o-pin').value === 'OWNER2026') { document.getElementById('owner-login').classList.add('hidden'); document.getElementById('owner-content').classList.remove('hidden'); } }

        let cars = {};
        db.ref('cars').on('value', snap => {
            cars = snap.val() || {};
            const container = document.getElementById('showroom-container');
            const select = document.getElementById('s-car');
            container.innerHTML = "";
            select.innerHTML = "<option>Seleziona...</option>";
            
            for(let k in cars) {
                container.innerHTML += `<div class="neo-panel"><img src="${cars[k].img}" style="width:100%; border-radius:10px;"><h3 style="margin-top:10px;">${cars[k].name}</h3><p style="color:red;">$ ${cars[k].price}</p></div>`;
                select.innerHTML += `<option value="${cars[k].name}">${cars[k].name}</option>`;
            }
            document.getElementById('stat-cars').innerText = Object.keys(cars).length;
        });

        function updateSPrice() {
            const val = document.getElementById('s-car').value;
            for(let k in cars) if(cars[k].name === val) document.getElementById('s-price').value = cars[k].price;
        }

        // Canvas Firma
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sig-canvas');
            if(!canvas) return;
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            canvas.onmousedown = () => drawing = true;
            canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            };
        }
        function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        // Finalizza
        function makeSale() {
            const client = document.getElementById('s-client').value;
            if(!client) return alert("Manca il cliente!");
            const doc = new jspdf.jsPDF();
            doc.text("AUTONATION TEXAS - CONTRATTO", 10, 10);
            doc.text(`Cliente: ${client}`, 10, 20);
            doc.text(`Veicolo: ${document.getElementById('s-car').value}`, 10, 30);
            doc.save(`Contratto_${client}.pdf`);
            alert("Vendita salvata!");
        }

        let tempImg = "";
        document.getElementById('add-f').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => tempImg = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        function pushCar() {
            const name = document.getElementById('add-n').value;
            const price = document.getElementById('add-p').value;
            if(name && price && tempImg) {
                db.ref('cars').push({name, price, img: tempImg}).then(() => {
                    alert("Aggiunta!");
                });
            }
        }
    </script>
</body>
</html>
