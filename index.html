<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Elite Management v8.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --primary-glow: rgba(255, 46, 77, 0.4);
            --bg: #030405;
            --surface: #0d0f14;
            --surface-bright: #161922;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav { width: 280px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; }
        .logo-container img { width: 100%; filter: drop-shadow(0 0 15px var(--primary-glow)); margin-bottom: 40px; }
        .nav-link { display: flex; align-items: center; padding: 16px 20px; color: var(--text-dim); text-decoration: none; border-radius: 15px; margin-bottom: 8px; font-weight: 700; transition: var(--transition); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; width: 25px; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px var(--primary-glow); }

        /* MAIN */
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at top left, #1a1c26 0%, #030405 100%); padding: 50px; }
        .page { display: none; max-width: 1300px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-card h2 { font-size: 3rem; font-family: 'Montserrat'; color: var(--primary); }

        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .car-card { background: var(--surface); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); position: relative; }
        .car-img { width: 100%; height: 200px; object-fit: cover; }
        .car-info { padding: 25px; }

        .panel { background: var(--surface); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: var(--transition); }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 15px; font-family: 'Outfit'; }
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; color: var(--primary); font-size: 0.7rem; border-bottom: 1px solid #222; }
        td { padding: 15px; border-bottom: 1px solid #111; }
        
        .hidden { display: none !important; }
        .secure-gate { max-width: 450px; margin: 0 auto; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container"><img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png"></div>
        <button class="nav-link active" onclick="navTo('home', this)"><i class="fa-solid fa-house"></i> Dashboard</button>
        <button class="nav-link" onclick="navTo('showroom', this)"><i class="fa-solid fa-car"></i> Showroom</button>
        <button class="nav-link" onclick="navTo('booking', this)"><i class="fa-solid fa-calendar-alt"></i> Booking</button>
        <button class="nav-link" onclick="navTo('sales', this)"><i class="fa-solid fa-file-invoice"></i> Fatture</button>
        <button class="nav-link" onclick="navTo('owners', this)"><i class="fa-solid fa-crown"></i> Owners</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="stat-grid">
                <div class="stat-card"><h2 id="st-cars">0</h2><p>AUTO</p></div>
                <div class="stat-card"><h2 id="st-sales">0</h2><p>VENDITE</p></div>
                <div class="stat-card"><h2 id="st-app">0</h2><p>PENDING</p></div>
            </div>
            <div class="panel">
                <h1 style="font-family:'Montserrat'; font-size: 3rem;">AUSTIN ELITE HUB</h1>
                <p style="color:var(--text-dim);">Sistema centrale di gestione vendite e appuntamenti.</p>
            </div>
        </div>

        <div id="showroom" class="page">
            <div id="fleet-grid" class="car-grid"></div>
        </div>

        <div id="booking" class="page">
            <div class="panel" style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align:center; margin-bottom: 20px;">RICHIESTA APPUNTAMENTO</h2>
                <label>Nome</label><input type="text" id="book-name">
                <label>Data</label><input type="date" id="book-date">
                <label>Ora</label><input type="time" id="book-time">
                <label>Motivo</label>
                <select id="book-reason">
                    <option value="Acquisto Veicolo">Acquisto Veicolo</option>
                    <option value="Test Drive">Test Drive</option>
                </select>
                <button class="btn-prime" onclick="sendBooking()">Invia</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="secure-gate panel">
                <h2>Staff PIN</h2>
                <input type="password" id="pw-sales">
                <button class="btn-prime" onclick="verify('sales')">Sblocca</button>
            </div>
            <div id="sales-content" class="hidden">
                <div class="panel" style="max-width: 500px; margin: 0 auto;">
                    <h3>Emetti Contratto Elite</h3>
                    <label>Auto</label><select id="inv-car" onchange="updatePrice()"></select>
                    <label>Nome Cliente</label><input type="text" id="inv-name">
                    <label>Prezzo Finale ($)</label><input type="number" id="inv-final" readonly>
                    <label>Firma Agente</label><input type="text" id="inv-sign">
                    <button class="btn-prime" onclick="makeInvoice()">Genera Fattura Pro</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="secure-gate panel">
                <h2>Owner Key</h2>
                <input type="password" id="pw-owners">
                <button class="btn-prime" onclick="verify('owners')">Entra</button>
            </div>
            <div id="owners-content" class="hidden">
                <div class="panel">
                    <h3>Appuntamenti in Entrata</h3>
                    <table id="app-table">
                        <thead><tr><th>CLIENTE</th><th>DATA</th><th>AZIONE</th></tr></thead>
                        <tbody id="app-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const WEBHOOK = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";
        
        let allCars = {};

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function verify(type) {
            const keys = { sales: "1234", owners: "OWNER2026" };
            if(document.getElementById('pw-'+type).value === keys[type]) {
                document.getElementById(type+'-gate').classList.add('hidden');
                document.getElementById(type+'-content').classList.remove('hidden');
            }
        }

        // --- FATTURA PRO ENGINE (MIGLIORATA) ---
        async function makeInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            
            const client = document.getElementById('inv-name').value.toUpperCase();
            const car = document.getElementById('inv-car').value;
            const price = document.getElementById('inv-final').value;
            const agent = document.getElementById('inv-sign').value.toUpperCase();
            const protocol = "TEX-" + Math.floor(100 + Math.random() * 900);
            const date = new Date().toLocaleDateString('it-IT');

            // Header - Auto Nation
            doc.setFont("helvetica", "bold");
            doc.setFontSize(26);
            doc.text("Auto Nation", 105, 45, null, null, "center");
            
            doc.setFontSize(18);
            doc.text("SALES CONTRACT", 105, 58, null, null, "center");

            // Linea separatrice
            doc.setDrawColor(200, 0, 0); // Rosso Austin
            doc.setLineWidth(0.5);
            doc.line(25, 65, 185, 65);

            // Concessionario Info
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("CONCESSIONARIO:", 25, 80);
            doc.setFont("helvetica", "normal");
            doc.text("AutoNation Austin Luxury Motors", 25, 86);
            doc.text("Austin, Texas - Corporate Hub", 25, 91);

            // Cliente Info
            doc.setFont("helvetica", "bold");
            doc.text("CLIENTE:", 25, 108);
            doc.setFont("helvetica", "normal");
            doc.text(client || "CLIENTE GENERICO", 25, 114);

            // Dettagli Veicolo
            doc.setFont("helvetica", "bold");
            doc.text("DETTAGLI VEICOLO", 25, 135);
            doc.setFont("helvetica", "normal");
            doc.text(`Modello: ${car}`, 25, 143);
            doc.text(`Protocollo: ${protocol}`, 25, 149);
            doc.text(`Data Vendita: ${date}`, 25, 155);

            // Totale in evidenza
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text(`TOTALE: $ ${parseInt(price).toLocaleString()}`, 25, 172);

            // Clausole
            doc.setFontSize(9);
            doc.setFont("helvetica", "italic");
            const clausola = "Il presente documento certifica il passaggio di proprieta. Il veicolo viene venduto con garanzia Austin Elite di 12 mesi sulle componenti meccaniche.";
            doc.text(doc.splitTextToSize(clausola, 160), 25, 185);

            // Firma Agente
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.text("FIRMA AGENTE", 155, 215, null, null, "center");
            doc.setFont("helvetica", "normal");
            doc.text(agent || "UFFICIO VENDITE", 155, 223, null, null, "center");

            // Footer
            doc.setFontSize(9);
            doc.text("AUTONATION TEXAS ★ VEHICLE DIVISION", 105, 275, null, null, "center");

            // Save & Sync
            db.ref('sales_logs').push({ client, car, price, date });
            doc.save(`Fattura_${protocol}_${client}.pdf`);
            alert("Contratto Pro Generato!");
        }

        // --- FIREBASE SYNC ---
        db.ref('cars').on('value', s => {
            allCars = s.val() || {};
            const grid = document.getElementById('fleet-grid'); grid.innerHTML = "";
            const sel = document.getElementById('inv-car'); sel.innerHTML = "<option disabled selected>Scegli...</option>";
            for(let k in allCars) {
                const c = allCars[k];
                grid.innerHTML += `<div class="car-card"><img src="${c.img}" class="car-img"><div class="car-info"><h3>${c.name}</h3><div style="color:var(--primary); font-weight:900;">$ ${c.price.toLocaleString()}</div></div></div>`;
                sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            }
            document.getElementById('st-cars').innerText = Object.keys(allCars).length;
        });

        db.ref('appointments').on('value', s => {
            const data = s.val() || {};
            const tb = document.getElementById('app-tbody'); tb.innerHTML = "";
            for(let k in data) {
                tb.innerHTML += `<tr><td>${data[k].name}</td><td>${data[k].date}</td><td><button onclick='acceptApp("${k}", ${JSON.stringify(data[k])})'>OK</button></td></tr>`;
            }
            document.getElementById('st-app').innerText = Object.keys(data).length;
        });

        db.ref('sales_logs').on('value', s => { document.getElementById('st-sales').innerText = Object.keys(s.val() || {}).length; });

        function updatePrice() {
            const n = document.getElementById('inv-car').value;
            for(let k in allCars) if(allCars[k].name === n) document.getElementById('inv-final').value = allCars[k].price;
        }

        function sendBooking() {
            const name = document.getElementById('book-name').value, date = document.getElementById('book-date').value, time = document.getElementById('book-time').value, reason = document.getElementById('book-reason').value;
            if(name && date) db.ref('appointments').push({ name, date, time, reason }).then(() => alert("Inviato!"));
        }

        async function acceptApp(key, data) {
            const embed = { username: "AutoNation Austin", embeds: [{ title: "✅ APPUNTAMENTO ACCETTATO", color: 16723533, fields: [{ name: "👤 Cliente", value: data.name, inline: true }, { name: "📅 Data", value: data.date, inline: true }] }] };
            await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(embed) });
            db.ref('appointments/'+key).remove();
        }
    </script>
</body>
</html>
