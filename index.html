<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION TEXAS | HUB UFFICIALE</title>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { 
            --p: #ff2e4d; 
            --bg: #000; 
            --s: #0a0a0a; 
            --b: #1a1a1a; 
            --t: #fff; 
            --grad: linear-gradient(135deg, var(--p), #991b2d);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }

        body { 
            background: var(--bg); 
            color: var(--t); 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        nav { 
            width: 280px; 
            background: var(--s); 
            border-right: 1px solid var(--b); 
            display: flex; 
            flex-direction: column; 
            padding: 40px 20px; 
            z-index: 100; 
            flex-shrink: 0;
        }

        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo-box img { 
            width: 140px; height: 140px; 
            border-radius: 50%; border: 3px solid var(--p); 
            object-fit: cover; transition: 0.5s;
        }
        .logo-box img:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--p); }

        .nav-link { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid transparent; 
            color: #888; padding: 16px 20px; 
            border-radius: 12px; margin-bottom: 8px;
            font-family: 'Orbitron'; font-size: 0.8rem; 
            text-align: left; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
            display: flex; align-items: center; gap: 15px;
        }

        .nav-link.active { 
            color: #fff; background: var(--grad); 
            border-color: var(--p); box-shadow: 0 10px 20px rgba(255, 46, 77, 0.2);
        }

        /* --- MAIN --- */
        main { flex: 1; overflow-y: auto; background: #050505; position: relative; }
        .page { display: none; padding: 60px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PANELS --- */
        .glass-panel { 
            background: #0a0a0a; border: 1px solid #1a1a1a; 
            padding: 40px; border-radius: 24px; 
            max-width: 600px; margin: 0 auto;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--p); font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 8px; }

        input, select, textarea { 
            width: 100%; background: #000; border: 1px solid #222; 
            color: #fff; padding: 16px; border-radius: 12px; font-family: 'Outfit';
        }

        .btn-action { 
            width: 100%; padding: 20px; background: var(--grad); 
            color: #fff; border: none; border-radius: 12px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- TABLES --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--p); font-family: 'Orbitron'; font-size: 0.7rem; border-bottom: 2px solid #1a1a1a; }
        td { padding: 15px; border-bottom: 1px solid #111; font-size: 0.9rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <img src="https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png">
        </div>
        <div class="nav-group">
            <button class="nav-link active" onclick="navTo('home', this)"><i class="fa-solid fa-house"></i> Home</button>
            <button class="nav-link" onclick="navTo('showroom', this)"><i class="fa-solid fa-car"></i> Showroom</button>
            <button class="nav-link" onclick="navTo('booking', this)"><i class="fa-solid fa-calendar-alt"></i> Appuntamenti</button>
            <button class="nav-link" onclick="navTo('sales', this)"><i class="fa-solid fa-dollar-sign"></i> Vendite</button>
            <button class="nav-link" onclick="navTo('owners', this)"><i class="fa-solid fa-shield"></i> Pannello Owner</button>
        </div>
    </nav>

    <main>
        <div id="home" class="page active" style="text-align:center; padding-top: 150px;">
            <h1 style="font-family:'Orbitron'; font-size: 4rem;">AUTONATION <span style="color:var(--p)">TEXAS</span></h1>
            <p style="letter-spacing: 8px; color: #555;">CIVICO 203 - OFFICIAL HUB</p>
        </div>

        <div id="showroom" class="page">
            <h2 style="font-family:'Orbitron'; margin-bottom:30px;">VEICOLI DISPONIBILI</h2>
            <div id="showroom-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:25px;"></div>
        </div>

        <div id="booking" class="page">
            <div class="glass-panel">
                <h2 style="font-family:'Orbitron'; text-align:center; margin-bottom:20px;">RICHIESTA APPUNTAMENTO</h2>
                <div class="form-group">
                    <label>Nome e Cognome</label>
                    <input type="text" id="b-name" placeholder="Esempio: Mario Rossi">
                </div>
                <div class="form-group">
                    <label>ID Discord (per il ping)</label>
                    <input type="text" id="b-discord" placeholder="ID numerico o @username">
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;">
                        <label>Data Proposta</label>
                        <input type="date" id="b-date">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Ora Proposta</label>
                        <input type="time" id="b-time">
                    </div>
                </div>
                <div class="form-group">
                    <label>Messaggio per lo Staff</label>
                    <textarea id="b-notes" rows="3" placeholder="A quale auto sei interessato?"></textarea>
                </div>
                <button class="btn-action" onclick="sendInquiry()">Invia Richiesta allo Staff</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-auth" class="glass-panel" style="text-align:center;">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px;">AREA VENDITE</h2>
                <input type="password" id="sales-pw" placeholder="Inserire PIN" style="text-align:center; margin-bottom:20px;">
                <button class="btn-action" onclick="login('sales')">Accedi</button>
            </div>
            <div id="sales-panel" class="hidden">
                <div class="glass-panel" style="max-width: 800px;">
                    <h2 style="font-family:'Orbitron'; margin-bottom:20px;">NUOVO CONTRATTO</h2>
                    <input id="s-client" placeholder="Nome Cliente">
                    <select id="s-car" style="margin: 15px 0;"></select>
                    <input id="s-price" placeholder="Prezzo Finale $">
                    <input id="s-agent" placeholder="Tuo Nome (Agente)" style="margin-top:15px;">
                    <button class="btn-action" style="margin-top:20px;" onclick="generateSale()">Genera Contratto & Log</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owner-auth" class="glass-panel" style="text-align:center;">
                <h2 style="font-family:'Orbitron';">OWNER LOGIN</h2>
                <input type="password" id="owner-pw" style="margin:20px 0; text-align:center;">
                <button class="btn-action" onclick="login('owner')">Entra</button>
            </div>
            <div id="owner-panel" class="hidden">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                    <div class="glass-panel" style="margin:0;">
                        <h3>AGGIUNGI AUTO</h3>
                        <input id="add-n" placeholder="Nome Modello" style="margin-top:10px;">
                        <input id="add-p" placeholder="Prezzo" style="margin-top:10px;">
                        <select id="add-t" style="margin:10px 0;">
                            <option>Regular</option><option>Prestige</option><option>Electric</option>
                        </select>
                        <input type="file" id="add-i">
                        <button class="btn-action" style="margin-top:10px;" onclick="upload()">Pubblica</button>
                    </div>
                    <div class="glass-panel" style="margin:0; max-height:400px; overflow-y:auto;">
                        <h3>STOCK ATTUALE</h3>
                        <div id="stock-list"></div>
                    </div>
                </div>
                <div class="glass-panel" style="max-width:100%; margin-top:30px;">
                    <h3>LOG PRENOTAZIONI RICEVUTE</h3>
                    <table id="app-table">
                        <thead><tr><th>CLIENTE</th><th>DISCORD</th><th>DATA</th><th>ORA</th><th>AZIONI</th></tr></thead>
                        <tbody id="app-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const WEBHOOK = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";
        const LOGO = "https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png";

        let cars = {};
        let carImg = "";

        function navTo(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function login(type) {
            const val = document.getElementById(type + '-pw').value;
            if((type==='sales' && val==='1234') || (type==='owner' && val==='OWNER2026')) {
                document.getElementById(type+'-auth').classList.add('hidden');
                document.getElementById(type+'-panel').classList.remove('hidden');
            } else { alert("Accesso Negato"); }
        }

        // DATABASE SYNC
        db.ref('cars').on('value', s => {
            cars = s.val() || {};
            const grid = document.getElementById('showroom-grid');
            const stock = document.getElementById('stock-list');
            const sel = document.getElementById('s-car');
            grid.innerHTML = ""; stock.innerHTML = ""; sel.innerHTML = "";

            for(let id in cars) {
                grid.innerHTML += `<div style="background:#0d0d0d; border-radius:15px; overflow:hidden; border:1px solid #1a1a1a;">
                    <img src="${cars[id].img}" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:20px;">
                        <h4 style="font-family:'Orbitron';">${cars[id].name}</h4>
                        <p style="color:var(--p); font-weight:900;">$ ${parseInt(cars[id].price).toLocaleString()}</p>
                    </div>
                </div>`;
                stock.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${cars[id].name}</span><button onclick="delCar('${id}')" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`;
                sel.innerHTML += `<option value="${cars[id].name}">${cars[id].name}</option>`;
            }
        });

        db.ref('appointments').on('value', s => {
            const body = document.getElementById('app-body');
            body.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                body.innerHTML += `<tr><td>${data[id].name}</td><td>${data[id].discord}</td><td>${data[id].date}</td><td>${data[id].time}</td><td><button onclick="archive('${id}')" style="color:var(--p); background:none; border:none; cursor:pointer;">ARCHIVIA</button></td></tr>`;
            }
        });

        // ACTIONS
        document.getElementById('add-i').onchange = e => {
            const r = new FileReader(); r.onload = ev => carImg = ev.target.result; r.readAsDataURL(e.target.files[0]);
        };

        function upload() {
            const n = document.getElementById('add-n').value, p = document.getElementById('add-p').value, t = document.getElementById('add-t').value;
            if(n && p && carImg) db.ref('cars').push({name:n, price:p, type:t, img:carImg}).then(()=>alert("Auto Caricata!"));
        }

        function delCar(id) { db.ref('cars').child(id).remove(); }
        function archive(id) { db.ref('appointments').child(id).remove(); }

        // --- WEBHOOK RICHIESTA (DA ACCETTARE) ---
        function sendInquiry() {
            const name = document.getElementById('b-name').value;
            const discord = document.getElementById('b-discord').value;
            const date = document.getElementById('b-date').value;
            const time = document.getElementById('b-time').value;
            const notes = document.getElementById('b-notes').value || "Nessuna nota";

            if(!name || !date || !time) return alert("Compila i campi obbligatori!");

            let ping = discord;
            if(!isNaN(discord) && discord.length > 15) ping = `<@${discord}>`;

            db.ref('appointments').push({name, discord, date, time}).then(() => {
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `📩 **NUOVA PROPOSTA APPUNTAMENTO** | Staff di <@&1465030207483154554> a rapporto!`,
                        embeds: [{
                            title: "🔍 DETTAGLI RICHIESTA DA VALUTARE",
                            description: `Il cliente ${ping} ha richiesto un incontro.\n\n📍 **Sede:** Civico 203\n⚠️ **Status:** In attesa di approvazione manuale.`,
                            color: 16723533,
                            thumbnail: { url: LOGO },
                            fields: [
                                { name: "👤 CLIENTE", value: `\`${name}\``, inline: true },
                                { name: "🗓️ DATA PROPOSTA", value: `\`${date}\``, inline: true },
                                { name: "🕒 ORA PROPOSTA", value: `\`${time}\``, inline: true },
                                { name: "📝 NOTE CLIENTE", value: `\`${notes}\``, inline: false }
                            ],
                            footer: { text: "AutoNation Texas | Sistema Ricezione Pratiche" },
                            timestamp: new Date()
                        }]
                    })
                });
                alert("Richiesta inviata! Attendi che uno staffer ti contatti su Discord.");
                location.reload();
            });
        }

        function generateSale() {
            const client = document.getElementById('s-client').value;
            const car = document.getElementById('s-car').value;
            const price = document.getElementById('s-price').value;
            const agent = document.getElementById('s-agent').value;

            fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "📈 VENDITA CONCLUSA CON SUCCESSO",
                        color: 3066993,
                        thumbnail: { url: LOGO },
                        fields: [
                            { name: "CLIENTE", value: `\`${client}\``, inline: true },
                            { name: "AGENTE", value: `\`${agent}\``, inline: true },
                            { name: "AUTO", value: `\`${car}\``, inline: false },
                            { name: "PREZZO", value: `\`$ ${parseInt(price).toLocaleString()}\``, inline: true }
                        ]
                    }]
                })
            });

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("CONTRATTO AUTONATION TEXAS", 20, 20);
            doc.text(`Cliente: ${client}`, 20, 40);
            doc.text(`Auto: ${car}`, 20, 50);
            doc.text(`Prezzo: $ ${price}`, 20, 60);
            doc.save(`Contratto_${client}.pdf`);
            alert("Vendita Loggata!");
        }
    </script>
</body>
</html>
