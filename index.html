<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AutoNation Gestionale</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#020617;
border-bottom:1px solid #1e293b;
}

header h1{
margin:0;
font-weight:700;
letter-spacing:2px;
}

nav a{
margin-left:25px;
cursor:pointer;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

/* PAGES */

.page{
display:none;
padding:40px;
animation:fade 0.4s ease;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card h3{
margin-bottom:10px;
font-weight:500;
}

.card p{
font-size:28px;
font-weight:700;
}

/* FORM */

input,select{
padding:12px;
margin:6px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#16a34a;
}

/* CAR LIST */

#carList{
display:flex;
flex-wrap:wrap;
margin-top:30px;
}

.car{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:10px;
width:220px;
transition:0.3s;
}

.car:hover{
transform:translateY(-5px);
}

.car img{
width:100%;
border-radius:8px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<h1>AutoNation</h1>

<nav>

<a onclick="showPage('dashboard')">Dashboard</a> <a onclick="showPage('auto')">Auto</a> <a onclick="showPage('vendita')">Vendi Auto</a> <a onclick="openAdmin()">Registro Vendite</a>

</nav>

</header>

<!-- DASHBOARD -->

<section id="dashboard" class="page active">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Auto disponibili</h3>
<p id="totAuto">0</p>
</div>

<div class="card">
<h3>Vendite totali</h3>
<p id="totVendite">0</p>
</div>

</div>

</section>

<!-- AUTO -->

<section id="auto" class="page">

<h2>Gestione Auto</h2>

<input id="name" placeholder="Modello auto">
<input id="price" placeholder="Prezzo">
<input id="image" placeholder="Link immagine">

<button onclick="addCar()">Aggiungi Auto</button>

<div id="carList"></div>

</section>

<!-- VENDITA -->

<section id="vendita" class="page">

<h2>Vendi Auto</h2>

<select id="autoSelect"></select>

<input id="nome" placeholder="Nome cliente">
<input id="cognome" placeholder="Cognome cliente">

<button onclick="vendiAuto()">Completa vendita</button>

</section>

<!-- REGISTRO VENDITE (ADMIN) -->

<section id="admin" class="page">

<h2>Registro Vendite</h2>

<table>

<thead>

<tr>
<th>Targa</th>
<th>Cliente</th>
<th>Auto</th>
</tr>

</thead>

<tbody id="venditeList"></tbody>

</table>

</section>

<script>

const ADMIN_PASSWORD="admin123"

let cars=JSON.parse(localStorage.getItem("cars"))||[]
let vendite=JSON.parse(localStorage.getItem("vendite"))||[]
let numeroTarga=localStorage.getItem("targa")||1

function save(){

localStorage.setItem("cars",JSON.stringify(cars))
localStorage.setItem("vendite",JSON.stringify(vendite))

}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function openAdmin(){

let pass=prompt("Password admin")

if(pass===ADMIN_PASSWORD){

showPage("admin")

}else{

alert("Accesso negato")

}

}

function addCar(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value

if(!name||!price||!image)return alert("Compila tutto")

cars.push({name,price,image})

save()

location.reload()

}

function generaTarga(){

let num=String(numeroTarga).padStart(3,"0")

numeroTarga++

localStorage.setItem("targa",numeroTarga)

return "TEX-"+num

}

function vendiAuto(){

let nome=document.getElementById("nome").value
let cognome=document.getElementById("cognome").value
let auto=document.getElementById("autoSelect").value

if(!nome||!cognome)return alert("Compila dati cliente")

let targa=generaTarga()

vendite.push({targa,nome,cognome,auto})

save()

location.reload()

}

function loadCars(){

let list=document.getElementById("carList")

let select=document.getElementById("autoSelect")

cars.forEach(c=>{

if(list){

list.innerHTML+=`

<div class="car">

<img src="${c.image}">

<h3>${c.name}</h3>

<p>${c.price}</p>

</div>

`

}

if(select){

select.innerHTML+=`<option>${c.name}</option>`

}

})

}

function loadVendite(){

let list=document.getElementById("venditeList")

vendite.forEach(v=>{

list.innerHTML+=`

<tr>

<td>${v.targa}</td>

<td>${v.nome} ${v.cognome}</td>

<td>${v.auto}</td>

</tr>

`

})

}

document.getElementById("totAuto").innerText=cars.length
document.getElementById("totVendite").innerText=vendite.length

loadCars()
loadVendite()

</script>

</body>

</html>
