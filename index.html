<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Management System v2.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #e31837;
            --bg: #0b0c0e;
            --surface: #16181b;
            --border: #2d3238;
            --text-main: #f8f9fa;
            --text-dim: #9ba3af;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', sans-serif;
        }

        /* Navigation */
        header {
            background: rgba(11, 12, 14, 0.98);
            border-bottom: 1px solid var(--border);
            padding: 0 5%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); }

        nav a {
            color: var(--text-dim); text-decoration: none; font-size: 0.75rem;
            font-weight: 700; margin-left: 25px; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; cursor: pointer;
        }
        nav a:hover { color: var(--primary); }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 100px 20px 50px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

        /* Componenti */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 30px; margin-bottom: 25px; }
        h2 { font-weight: 800; margin-bottom: 25px; border-left: 4px solid var(--primary); padding-left: 15px; }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: #000; border: 1px solid var(--border); color: #fff;
            border-radius: 4px; font-family: 'Inter';
        }

        .btn {
            background: var(--primary); color: #fff; border: none;
            padding: 15px; font-weight: 700; cursor: pointer;
            border-radius: 4px; width: 100%; text-transform: uppercase;
        }
        .btn:hover { background: #c1142d; }
        .btn-reset { background: transparent; border: 1px solid #ff4444; color: #ff4444; width: auto; padding: 8px 15px; font-size: 0.7rem; }

        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #1c1f24; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-family: 'Roboto Mono'; font-size: 0.85rem; }
        .plate-badge { background: #fff; color: #000; padding: 2px 8px; font-weight: 800; border: 1px solid #000; border-radius: 3px; }

        /* Showroom */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .item-card img { width: 100%; height: 180px; object-fit: cover; }
        .item-info { padding: 15px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="brand">AUTONATION <span>AUSTIN</span></div>
    <nav>
        <a onclick="show('home')">Home</a>
        <a onclick="show('showroom')">Showroom</a>
        <a onclick="show('staff')">Staff Portal</a>
        <a onclick="show('admin')">Admin</a>
    </nav>
</header>

<div class="container">
    <div id="home" class="page active">
        <div style="padding: 100px 0; text-align: center;">
            <h1 style="font-size: 4rem; margin:0;">AUSTIN PRIDE</h1>
            <p style="color: var(--text-dim); letter-spacing: 5px;">OFFICIAL LOGISTICS TERMINAL</p>
        </div>
    </div>

    <div id="showroom" class="page">
        <h2>Active Fleet</h2>
        <div id="fleet-grid" class="grid"></div>
    </div>

    <div id="staff" class="page">
        <div id="staff-auth" class="card" style="max-width: 400px; margin: auto;">
            <h3>Staff Login</h3>
            <input id="s-user" placeholder="ID">
            <input id="s-pass" type="password" placeholder="Key">
            <button class="btn" onclick="loginS()">Enter</button>
        </div>
        <div id="staff-main" class="hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3>New Sale Contract</h3>
                    <div id="p-preview" style="background:#fff; color:#000; padding:5px 15px; font-weight:800; border:2px solid #000;">TEX-000</div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label>Vehicle</label>
                        <select id="v-sel" onchange="syncP()"></select>
                        <label>Price ($)</label>
                        <input id="v-price" placeholder="0.00">
                    </div>
                    <div>
                        <label>Buyer Name</label>
                        <input id="v-buyer" placeholder="Full Name">
                        <label>Officer Signature</label>
                        <input id="v-sign" placeholder="Your Name">
                    </div>
                </div>
                <button class="btn" onclick="doSale()">EXECUTE & PRINT PDF</button>
            </div>
        </div>
    </div>

    <div id="admin" class="page">
        <div id="admin-auth" class="card" style="max-width: 400px; margin: auto;">
            <h3>Admin Core</h3>
            <input id="a-key" type="password" placeholder="Master Key">
            <button class="btn" onclick="loginA()">Authorize</button>
        </div>
        <div id="admin-main" class="hidden">
            <div class="card">
                <h3>Add Vehicle</h3>
                <input id="n-name" placeholder="Model Name">
                <input id="n-price" placeholder="Price">
                <input type="file" id="n-img">
                <button class="btn" onclick="addV()">Add to Showroom</button>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Sales Registry</h3>
                    <button class="btn btn-reset" onclick="reset()">RESET LOGS</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Date</th><th>Buyer</th><th>Vehicle</th><th>Plate</th><th>Staff</th></tr></thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let imgData = null;

// NAV
function show(id) { 
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function loginS() { if(document.getElementById('s-user').value === "staff" && document.getElementById('s-pass').value === "1234") { document.getElementById('staff-auth').classList.add('hidden'); document.getElementById('staff-main').classList.remove('hidden'); upPlate(); } }
function loginA() { if(document.getElementById('a-key').value === "OWNER123") { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-main').classList.remove('hidden'); } }

// LOGICA
async function getPlate() {
    const s = await db.ref('sales_logs').limitToLast(1).once('value');
    const d = s.val();
    if (!d) return "TEX-001";
    const last = parseInt(Object.values(d)[0].targa.split('-')[1]);
    return "TEX-" + (last + 1).toString().padStart(3, '0');
}

async function upPlate() { document.getElementById('p-preview').innerText = await getPlate(); }

db.ref('cars').on('value', s => {
    const d = s.val();
    const g = document.getElementById('fleet-grid'), sel = document.getElementById('v-sel');
    g.innerHTML = ""; sel.innerHTML = "<option>Select...</option>";
    for(let k in d) {
        g.innerHTML += `<div class="item-card"><img src="${d[k].image}"><div class="item-info"><b>${d[k].name}</b><br><span style="color:red">${d[k].price}</span></div></div>`;
        sel.innerHTML += `<option value="${d[k].name}" data-p="${d[k].price}">${d[k].name}</option>`;
    }
});

db.ref('sales_logs').on('value', s => {
    const d = s.val();
    const b = document.getElementById('logs-body');
    b.innerHTML = "";
    if(d) Object.values(d).reverse().forEach(v => {
        b.innerHTML += `<tr><td>${v.data}</td><td>${v.cliente}</td><td>${v.veicolo}</td><td><span class="plate-badge">${v.targa}</span></td><td>${v.staff}</td></tr>`;
    });
});

document.getElementById('n-img').onchange = e => { const r = new FileReader(); r.onload = ev => imgData = ev.target.result; r.readAsDataURL(e.target.files[0]); };
function addV() {
    const n = document.getElementById('n-name').value, p = document.getElementById('n-price').value;
    if(n && p && imgData) db.ref('cars').push({ name:n, price:p, image:imgData }).then(() => location.reload());
}

function reset() { if(confirm("Wipe logs?")) db.ref('sales_logs').remove(); }
function syncP() { const s = document.getElementById('v-sel'); document.getElementById('v-price').value = s.options[s.selectedIndex].dataset.p || ""; }

async function doSale() {
    const b = document.getElementById('v-buyer').value, v = document.getElementById('v-sel').value, p = document.getElementById('v-price').value, s = document.getElementById('v-sign').value;
    if(!b || !s || v === "Select...") return alert("Missing fields");
    const plate = await getPlate();
    const date = new Date().toLocaleDateString('en-US');
    db.ref('sales_logs').push({ data:date, cliente:b, veicolo:v, targa:plate, prezzo:p, staff:s }).then(() => {
        genPDF(b, v, plate, p, s, date);
        upPlate();
    });
}

// PDF ENGINE CORRETTO
function genPDF(buyer, car, plate, price, staff, date) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setLineWidth(0.5); doc.rect(5, 5, 200, 287);
    doc.setFillColor(30); doc.rect(10, 10, 190, 25, 'F');
    doc.setTextColor(255); doc.setFontSize(26); doc.text("AutoNation", 15, 27);
    doc.setTextColor(0); doc.setFontSize(14); doc.text("TITLE TRANSFER & BILL OF SALE", 105, 50, {align:"center"});
    
    // Sez 1
    doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.text("1. BUYER", 15, 70);
    doc.rect(15, 73, 180, 20);
    doc.setFont("helvetica", "normal"); doc.text(`NAME: ${buyer.toUpperCase()}`, 20, 80);
    doc.text(`DATE: ${date}`, 20, 87);

    // Sez 2
    doc.setFont("helvetica", "bold"); doc.text("2. VEHICLE", 15, 105);
    doc.rect(15, 108, 180, 50);
    doc.setFont("helvetica", "normal"); doc.text(`UNIT: ${car}`, 20, 118);
    
    // Targa & Juris (FIXED INSIDE)
    doc.setFillColor(245); doc.rect(20, 125, 60, 20, 'F');
    doc.setFont("courier", "bold"); doc.setFontSize(18); doc.text(plate, 25, 138);
    doc.setFont("helvetica", "bold"); doc.setFontSize(9);
    doc.text("JURISDICTION:", 100, 130);
    doc.setFont("helvetica", "normal"); doc.text("STATE OF TEXAS (TX)", 100, 137);

    // Sez 3
    doc.setFont("helvetica", "bold"); doc.text("3. PRICE", 15, 170);
    doc.rect(15, 173, 180, 15);
    doc.setFontSize(12); doc.text(`PAID: $ ${price}`, 20, 183);

    // Firma
    doc.setFontSize(10); doc.line(15, 250, 80, 250); doc.text("OFFICER SIGNATURE", 15, 255);
    doc.setFont("courier", "bolditalic"); doc.text(staff, 20, 248);
    doc.save(`Sale_${plate}.pdf`);
}
</script>
</body>
</html>
