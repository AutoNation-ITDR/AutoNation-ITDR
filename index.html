<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | AUTONATION</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --accent: #00f2ff;
            --bg: #080808;
            --panel: #0f0f0f;
            --border: #1a1a1a;
            --text: #ffffff;
            --text-dim: #666;
            --grad: linear-gradient(180deg, #ff2e4d 0%, #7a0012 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR STYLE FIVEM --- */
        nav {
            width: 100px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 25px;
        }

        .nav-item {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: var(--text-dim);
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .nav-item:hover { color: var(--primary); background: rgba(255,46,77,0.05); }
        .nav-item.active {
            background: var(--grad);
            color: white;
            box-shadow: 0 0 20px rgba(255,46,77,0.4);
        }

        /* --- MAIN AREA --- */
        main { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .view-section { display: none; animation: slideUp 0.4s ease-out; }
        .view-section.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI COMPONENTS --- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            position: relative;
        }

        .category-tab {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 5px;
            background: #1a1a1a;
            font-size: 0.7rem;
            font-family: 'Orbitron';
            margin-right: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-tab.active { background: var(--primary); color: white; }

        input, select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: 'Outfit';
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: var(--grad);
            border: none;
            color: white;
            font-family: 'Orbitron';
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
        }

        #sig-canvas { background: white; border-radius: 8px; width: 100%; height: 150px; cursor: crosshair; }

        .tag {
            position: absolute; top: 15px; right: 15px;
            background: var(--primary); font-size: 0.6rem;
            padding: 4px 8px; border-radius: 4px; font-family: 'Orbitron';
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <img src="https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png" style="width: 50px; margin-bottom: 20px;">
        <div class="nav-item active" onclick="switchPage('home-view', this)"><i class="fa-solid fa-layer-group"></i></div>
        <div class="nav-item" onclick="switchPage('showroom-view', this)"><i class="fa-solid fa-car-side"></i></div>
        <div class="nav-item" onclick="switchPage('booking-view', this)"><i class="fa-solid fa-calendar-check"></i></div>
        <div class="nav-item" onclick="switchPage('sales-view', this)"><i class="fa-solid fa-file-contract"></i></div>
        <div class="nav-item" onclick="switchPage('owner-view', this)"><i class="fa-solid fa-user-shield"></i></div>
    </nav>

    <main id="main-content">

        <section id="home-view" class="view-section active">
            <h1 style="font-family:'Orbitron'; font-size: 3rem;">SYSTEM<span style="color:var(--primary)">TERMINAL</span></h1>
            <p style="color:var(--text-dim); letter-spacing: 5px;">AUSTIN LUXURY MOTORS</p>
            <div style="display:flex; gap:20px; margin-top:40px;">
                <div class="glass-panel" style="flex:1;">
                    <h3 id="stat-cars">0</h3>
                    <p style="font-size:0.7rem; color:var(--text-dim);">VEICOLI IN STOCK</p>
                </div>
                <div class="glass-panel" style="flex:1;">
                    <h3>203</h3>
                    <p style="font-size:0.7rem; color:var(--text-dim);">CIVICO UFFICIALE</p>
                </div>
            </div>
        </section>

        <section id="showroom-view" class="view-section">
            <div style="margin-bottom: 30px;">
                <div class="category-tab active" onclick="filterCat('All', this)">TUTTE</div>
                <div class="category-tab" onclick="filterCat('Luxury', this)">LUXURY</div>
                <div class="category-tab" onclick="filterCat('Sport', this)">SPORT</div>
                <div class="category-tab" onclick="filterCat('SUV', this)">SUV</div>
            </div>
            <div id="showroom-container" class="card-grid"></div>
        </section>

        <section id="booking-view" class="view-section">
            <div class="glass-panel" style="max-width: 500px; margin: 0 auto;">
                <h2 style="font-family:'Orbitron'; margin-bottom: 20px; color:var(--primary);">BOOKING</h2>
                <input id="b-name" placeholder="Nome Completo IC">
                <input id="b-disc" placeholder="Discord ID">
                <input type="date" id="b-date">
                <select id="b-car-list"></select>
                <button class="btn-action" onclick="sendBook()">Invia Richiesta</button>
            </div>
        </section>

        <section id="sales-view" class="view-section">
            <div id="sales-lock" class="glass-panel" style="max-width:350px; margin: 0 auto; text-align:center;">
                <i class="fa-solid fa-unlock-keyhole" style="font-size: 2rem; margin-bottom: 20px;"></i>
                <input type="password" id="s-pin" placeholder="PIN AGENTE" style="text-align:center;">
                <button class="btn-action" onclick="checkSalesPin()">SBLOCCA</button>
            </div>
            <div id="sales-terminal" class="hidden">
                <div class="glass-panel">
                    <h2 style="font-family:'Orbitron';">FATTURAZIONE ELETRONICA</h2>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; margin-top:20px;">
                        <div>
                            <label style="font-size:0.7rem; color:var(--primary);">DATI CLIENTE</label>
                            <input id="s-client" placeholder="Nome Acquirente">
                            <select id="s-car" onchange="syncPrice()"></select>
                            <input id="s-price" type="number" placeholder="Prezzo Finale $">
                        </div>
                        <div>
                            <label style="font-size:0.7rem; color:var(--primary);">FIRMA DIGITALE</label>
                            <canvas id="sig-canvas"></canvas>
                            <button onclick="clearSig()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.7rem; margin-top:5px;">CANCELLA FIRMA</button>
                        </div>
                    </div>
                    <button class="btn-action" onclick="generateInvoice()">GENERA E LOGGA FATTURA</button>
                </div>
            </div>
        </section>

        <section id="owner-view" class="view-section">
            <div id="owner-lock" class="glass-panel" style="max-width:350px; margin: 0 auto; text-align:center;">
                <input type="password" id="o-pin" placeholder="MASTER PASSWORD" style="text-align:center;">
                <button class="btn-action" onclick="checkOwnerPin()">ACCESSO ROOT</button>
            </div>
            <div id="owner-terminal" class="hidden glass-panel">
                <h2 style="font-family:'Orbitron';">AGGIUNGI STOCK</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                    <input id="add-name" placeholder="Modello Veicolo">
                    <input id="add-price" type="number" placeholder="Prezzo $">
                    <select id="add-cat">
                        <option value="Luxury">Luxury</option>
                        <option value="Sport">Sport</option>
                        <option value="SUV">SUV</option>
                        <option value="Off-Road">Off-Road</option>
                    </select>
                    <input type="file" id="add-img">
                </div>
                <button class="btn-action" onclick="uploadCar()">PUBBLICA VEICOLO</button>
            </div>
        </section>

    </main>

    <script>
        // FIREBASE CONFIG
        const fbCfg = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(fbCfg);
        const db = firebase.database();

        // STATE MGT
        let allCars = {};
        let currentFilter = "All";

        function switchPage(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'sales-view') setTimeout(initCanvas, 100);
        }

        // AUTH
        function checkSalesPin() { if(document.getElementById('s-pin').value === '1234') { document.getElementById('sales-lock').classList.add('hidden'); document.getElementById('sales-terminal').classList.remove('hidden'); } }
        function checkOwnerPin() { if(document.getElementById('o-pin').value === 'OWNER2026') { document.getElementById('owner-lock').classList.add('hidden'); document.getElementById('owner-terminal').classList.remove('hidden'); } }

        // REALTIME DATA
        db.ref('cars').on('value', snap => {
            allCars = snap.val() || {};
            renderShowroom();
            updateSelects();
            document.getElementById('stat-cars').innerText = Object.keys(allCars).length;
        });

        function renderShowroom() {
            const container = document.getElementById('showroom-container');
            container.innerHTML = "";
            for(let k in allCars) {
                const c = allCars[k];
                if(currentFilter !== "All" && c.category !== currentFilter) continue;
                
                container.innerHTML += `
                    <div class="glass-panel">
                        <div class="tag">${c.category.toUpperCase()}</div>
                        <img src="${c.img}" style="width:100%; height:150px; object-fit:cover; border-radius:8px;">
                        <h4 style="margin-top:15px; font-family:'Orbitron';">${c.name}</h4>
                        <p style="color:var(--primary); font-weight:bold; margin-top:5px;">$ ${parseInt(c.price).toLocaleString()}</p>
                        <button class="btn-action" style="padding:8px; font-size:0.6rem;" onclick="switchPage('booking-view', document.querySelectorAll('.nav-item')[2])">PRENOTA TEST</button>
                    </div>
                `;
            }
        }

        function filterCat(cat, el) {
            currentFilter = cat;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderShowroom();
        }

        function updateSelects() {
            const s1 = document.getElementById('b-car-list');
            const s2 = document.getElementById('s-car');
            let html = "<option value=''>Seleziona Veicolo...</option>";
            for(let k in allCars) html += `<option value="${allCars[k].name}">${allCars[k].name}</option>`;
            s1.innerHTML = html; s2.innerHTML = html;
        }

        function syncPrice() {
            const name = document.getElementById('s-car').value;
            for(let k in allCars) if(allCars[k].name === name) document.getElementById('s-price').value = allCars[k].price;
        }

        // CANVAS
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sig-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 2; ctx.strokeStyle = "#000";
            canvas.onmousedown = () => drawing = true;
            canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };
        }
        function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        // ACTIONS
        function sendBook() {
            const data = {
                name: document.getElementById('b-name').value,
                discord: document.getElementById('b-disc').value,
                date: document.getElementById('b-date').value,
                car: document.getElementById('b-car-list').value
            };
            if(!data.name || !data.date) return alert("Compila i campi!");
            db.ref('appointments').push(data).then(() => alert("Appuntamento Inviato allo Staff!"));
        }

        function generateInvoice() {
            const client = document.getElementById('s-client').value;
            const car = document.getElementById('s-car').value;
            const price = document.getElementById('s-price').value;
            if(!client || !car) return alert("Dati mancanti!");

            const doc = new jspdf.jsPDF();
            doc.setFontSize(22); doc.text("AUTONATION TEXAS - INVOICE", 20, 20);
            doc.setFontSize(12); doc.text(`Cliente: ${client}`, 20, 40);
            doc.text(`Veicolo: ${car}`, 20, 50);
            doc.text(`Prezzo: $ ${price}`, 20, 60);
            
            const sigImg = canvas.toDataURL("image/png");
            doc.addImage(sigImg, 'PNG', 20, 80, 50, 20);
            doc.text("Firma Cliente", 20, 105);

            db.ref('sales_logs').push({ client, car, price, date: new Date().toISOString() });
            doc.save(`Fattura_${client}.pdf`);
            alert("Fattura Generata e Loggata nel Sistema!");
        }

        // OWNER UPLOAD
        let base64Img = "";
        document.getElementById('add-img').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => base64Img = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        function uploadCar() {
            const name = document.getElementById('add-name').value;
            const price = document.getElementById('add-price').value;
            const category = document.getElementById('add-cat').value;
            if(!name || !price || !base64Img) return alert("Inserisci tutto!");
            
            db.ref('cars').push({ name, price, category, img: base64Img }).then(() => {
                alert("Veicolo caricato con successo!");
                document.getElementById('add-name').value = "";
            });
        }
    </script>
</body>
</html>
