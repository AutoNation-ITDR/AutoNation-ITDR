<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Internal Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #e31837; /* Rosso AutoNation */
            --bg-dark: #0f1113;
            --surface: #1a1d21;
            --border: #2d3238;
            --text-main: #f8f9fa;
            --text-dim: #9ba3af;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.5;
        }

        /* Navigation */
        header {
            background: rgba(15, 17, 19, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .brand { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }
        .brand span { color: var(--primary); }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            cursor: pointer;
        }
        nav a:hover { color: var(--primary); }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 40px; }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Components */
        .glass-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 800; font-size: 2rem; margin-top: 0; border-left: 4px solid var(--primary); padding-left: 15px; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 1.5rem;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'Inter';
            font-size: 1rem;
            border-radius: 4px;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            transition: 0.3s;
        }
        .btn:hover { background: #b3122b; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn-outline:hover { border-color: var(--primary); color: #fff; }

        /* Logs Table */
        .log-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 15px; background: #23272d; font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; font-family: 'Roboto Mono', monospace; }
        
        .badge-plate { background: #fff; color: #000; padding: 2px 8px; font-weight: 800; border-radius: 3px; border: 1px solid #000; }

        /* Showroom Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .car-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .car-card img { width: 100%; height: 180px; object-fit: cover; }
        .car-card-body { padding: 1.5rem; }
        .car-card-price { color: var(--primary); font-weight: 700; font-size: 1.2rem; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="brand">AUTONATION <span>AUSTIN</span></div>
    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('auto')">Showroom</a>
        <a onclick="showPage('personale')">Staff Login</a>
        <a onclick="showPage('owner')">Admin</a>
    </nav>
</header>

<div class="container">
    
    <div id="home" class="page active">
        <div style="padding: 100px 0; text-align: center;">
            <h1 style="font-size: 4rem; margin:0;">AUSTIN'S ELITE</h1>
            <p style="color: var(--text-dim); font-size: 1.2rem; letter-spacing: 4px;">OFFICIAL INVENTORY & TITLE MANAGEMENT</p>
        </div>
    </div>

    <div id="auto" class="page">
        <h2>Active Inventory</h2>
        <div id="car-list" class="grid"></div>
    </div>

    <div id="personale" class="page">
        <div id="p-login" class="glass-panel" style="max-width: 500px; margin: auto;">
            <h3>Operator Access</h3>
            <input id="uS" placeholder="Employee ID">
            <input id="pS" type="password" placeholder="Key Code">
            <button class="btn" onclick="authP()">Sign In</button>
        </div>
        <div id="p-main" class="hidden">
            <div class="glass-panel">
                <h2>New Vehicle Transaction</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label>Select Vehicle</label>
                        <select id="selA" onchange="syncPrice()"></select>
                    </div>
                    <div>
                        <label>Sale Price ($)</label>
                        <input id="fP" placeholder="50.000">
                    </div>
                </div>
                <input id="fC" placeholder="Buyer's Legal Full Name">
                <input id="fF" placeholder="Reporting Officer Signature">
                <button class="btn" onclick="submitSale()">EXECUTE CONTRACT & ISSUE PLATE</button>
            </div>
        </div>
    </div>

    <div id="owner" class="page">
        <div id="o-login" class="glass-panel" style="max-width: 500px; margin: auto;">
            <h3>Management Access</h3>
            <input id="oK" type="password" placeholder="Master Security Key">
            <button class="btn" onclick="authO()">Authorize</button>
        </div>
        <div id="o-main" class="hidden">
            <div class="glass-panel">
                <h3>Add Unit to Fleet</h3>
                <input id="cN" placeholder="Vehicle Year, Make, Model">
                <input id="cP" placeholder="MSRP Price">
                <input type="file" id="cI">
                <button class="btn" onclick="uploadCar()">CONFIRM INGESTION</button>
            </div>
            
            <div class="glass-panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Historical Sales & Plate Registry</h3>
                    <button class="btn btn-outline" style="width:auto;" onclick="wipeData()">RESET REGISTRY</button>
                </div>
                <div class="log-container">
                    <table>
                        <thead><tr><th>Date</th><th>Buyer</th><th>Vehicle</th><th>Texas Plate</th><th>Staff</th></tr></thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIGURAZIONE FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let imgCache = null;

// GESTIONE UI
function showPage(p) { 
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); 
    document.getElementById(p).classList.add('active'); 
}

// LOGICA PLATE SEQUENCER
async function nextPlate() {
    const s = await db.ref('sales_logs').limitToLast(1).once('value');
    const d = s.val();
    if (!d) return "TEX-001";
    const lastNum = parseInt(Object.values(d)[0].targa.split('-')[1]);
    return "TEX-" + (lastNum + 1).toString().padStart(3, '0');
}

// DATABASE SYNC
db.ref('cars').on('value', s => {
    const d = s.val();
    const list = document.getElementById("car-list"), sel = document.getElementById("selA");
    list.innerHTML = ""; sel.innerHTML = "<option>Select Unit...</option>";
    for(let k in d){
        list.innerHTML += `<div class="car-card"><img src="${d[k].image}"><div class="car-card-body"><b>${d[k].name}</b><div class="car-card-price">${d[k].price}</div></div></div>`;
        sel.innerHTML += `<option value="${d[k].name}" data-p="${d[k].price}">${d[k].name}</option>`;
    }
});

db.ref('sales_logs').on('value', s => {
    const d = s.val();
    const b = document.getElementById("logs-body");
    b.innerHTML = "";
    if(d) Object.values(d).reverse().forEach(v => {
        b.innerHTML += `<tr><td>${v.data}</td><td>${v.cliente}</td><td>${v.veicolo}</td><td><span class="badge-plate">${v.targa}</span></td><td>${v.staff}</td></tr>`;
    });
});

// AZIONI ADMIN
document.getElementById('cI').onchange = e => { const r = new FileReader(); r.onload = ev => imgCache = ev.target.result; r.readAsDataURL(e.target.files[0]); };
function uploadCar() {
    const n = document.getElementById('cN').value, p = document.getElementById('cP').value;
    if(!n || !p || !imgCache) return alert("All fields required");
    db.ref('cars').push({ name:n, price:p, image:imgCache }).then(()=> alert("Asset Ingested"));
}
function wipeData() { if(confirm("PERMANENTLY WIPE ALL SALES?")) db.ref('sales_logs').remove(); }

// AZIONI VENDITA
function syncPrice() { const s = document.getElementById("selA"); document.getElementById("fP").value = s.options[s.selectedIndex].dataset.p || ""; }
async function submitSale() {
    const c = document.getElementById("fC").value, v = document.getElementById("selA").value, p = document.getElementById("fP").value, s = document.getElementById("fF").value;
    if(!c || s === "" || v === "Select Unit...") return alert("Missing Transaction Data");
    
    const plate = await nextPlate();
    const date = new Date().toLocaleDateString('en-US');
    
    db.ref('sales_logs').push({ data:date, cliente:c, veicolo:v, targa:plate, prezzo:p, staff:s }).then(() => {
        createPDF(c, v, plate, p, s, date);
    });
}

// PDF ENGINE - FORMATO CONTRATTO FEDERALE
function createPDF(buyer, car, plate, price, staff, date) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Sfondo e Intestazione
    doc.setFillColor(240, 240, 240); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(227, 24, 55); doc.setFont("helvetica", "bold"); doc.setFontSize(28);
    doc.text("AutoNation", 15, 25);
    doc.setTextColor(60); doc.setFontSize(10); doc.text("AUSTIN TEXAS REGIONAL HEADQUARTERS", 15, 32);

    // Titolo Documento
    doc.setTextColor(0); doc.setFontSize(16); doc.text("VEHICLE BILL OF SALE & TITLE TRANSFER", 105, 55, {align:"center"});
    doc.setLineWidth(0.5); doc.line(20, 60, 190, 60);

    // Blocco Acquirente
    doc.setFontSize(11); doc.setFont("helvetica", "bold"); doc.text("1. BUYER INFORMATION", 20, 75);
    doc.setFont("helvetica", "normal");
    doc.rect(20, 78, 170, 25);
    doc.text(`FULL LEGAL NAME: ${buyer.toUpperCase()}`, 25, 87);
    doc.text(`TRANSACTION DATE: ${date}`, 25, 95);

    // Blocco Veicolo
    doc.setFont("helvetica", "bold"); doc.text("2. VEHICLE & REGISTRATION", 20, 115);
    doc.rect(20, 118, 170, 45);
    doc.setFont("helvetica", "normal");
    doc.text(`DESCRIPTION: ${car}`, 25, 128);
    doc.setFontSize(20); doc.setFont("courier", "bold");
    doc.text(`PLATE ID: ${plate}`, 25, 145);
    doc.setFontSize(11); doc.setFont("helvetica", "normal");
    doc.text("JURISDICTION: STATE OF TEXAS", 140, 155);

    // Blocco Finanziario
    doc.setFont("helvetica", "bold"); doc.text("3. PURCHASE DETAILS", 20, 175);
    doc.rect(20, 178, 170, 20);
    doc.text(`TOTAL SALE CONSIDERATION: $ ${price}`, 25, 191);

    // Clausole
    doc.setFontSize(8); doc.setFont("times", "italic");
    const disclaimer = "The Seller hereby affirms that the information provided is true and accurate to the best of their knowledge. The vehicle is sold 'AS-IS' without further warranties. The assigned Texas plate is strictly for the vehicle identified above. Any alteration to this document renders the transaction void under Texas Transportation Code.";
    doc.text(doc.splitTextToSize(disclaimer, 170), 20, 215);

    // Firme
    doc.setFontSize(10); doc.setFont("helvetica", "bold");
    doc.line(20, 250, 90, 250); doc.text("SELLER REPRESENTATIVE", 20, 255);
    doc.setFont("courier", "bolditalic"); doc.text(staff, 25, 248);

    doc.line(120, 250, 190, 250); doc.setFont("helvetica", "bold"); doc.text("BUYER SIGNATURE", 120, 255);

    // Footer
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("OFFICIAL DOCUMENT - AUTONATION AUSTIN MOTORS - COPYRIGHT 2024", 105, 285, {align:"center"});

    doc.save(`Title_Transfer_${plate}.pdf`);
}

// AUTH
function authO() { if(document.getElementById('oK').value === "OWNER123") { document.getElementById('o-login').classList.add('hidden'); document.getElementById('o-main').classList.remove('hidden'); } }
function authP() { if(document.getElementById('uS').value === "staff" && document.getElementById('pS').value === "1234") { document.getElementById('p-login').classList.add('hidden'); document.getElementById('p-main').classList.remove('hidden'); } }
</script>
</body>
</html>
