<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Elite Showroom v9.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --accent: #ff2e4d;
            --accent-glow: rgba(255, 46, 77, 0.4);
            --bg: #0a0b10;
            --panel: #11141b;
            --card: #1a1d26;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --radius: 20px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* NAV */
        nav { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; }
        .logo-img { width: 100%; filter: drop-shadow(0 0 15px var(--accent-glow)); margin-bottom: 50px; cursor: pointer; }
        .nav-link { display: flex; align-items: center; padding: 16px 20px; color: var(--text-dim); text-decoration: none; border-radius: 12px; margin-bottom: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-link.active { background: var(--accent); color: white; box-shadow: 0 10px 25px var(--accent-glow); }

        /* MAIN */
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at top right, #1c1f2b, #0a0b10); }
        .page { display: none; padding: 50px; opacity: 0; transform: translateY(20px); transition: 0.4s; }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* INVENTORY SPECIFIC */
        .inventory-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .search-bar { background: var(--card); border: 1px solid var(--border); padding: 15px 25px; border-radius: 50px; color: white; width: 350px; font-family: 'Outfit'; outline: none; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .inventory-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
        
        /* Sidebar Filters */
        .filter-section { background: rgba(255,255,255,0.02); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); }
        .sidebar-label { font-size: 0.75rem; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 15px 0; display: block; }
        
        /* Car Cards */
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .car-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .car-card:hover { transform: translateY(-12px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .img-container { position: relative; height: 220px; overflow: hidden; }
        .car-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .car-card:hover .car-img { transform: scale(1.1); filter: brightness(0.7); }

        .car-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .car-card:hover .car-overlay { opacity: 1; }
        .view-btn { background: white; color: black; padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }

        .car-info { padding: 25px; }
        .car-type-badge { font-family: 'JetBrains Mono'; font-size: 0.65rem; padding: 5px 12px; border-radius: 5px; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; display: inline-block; }
        .type-prestige { background: #ffd700; color: #000; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .type-regular { background: var(--accent); color: #fff; }

        .car-name { font-size: 1.4rem; font-weight: 900; margin: 5px 0 15px 0; letter-spacing: -0.5px; }
        .car-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .car-price { font-family: 'JetBrains Mono'; font-size: 1.6rem; font-weight: 700; color: #fff; }

        /* UTILS */
        .hidden { display: none !important; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

<nav>
    <img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png" class="logo-img" onclick="navTo('home')">
    <div class="nav-link" onclick="navTo('home')" id="n-home"><i class="fa-solid fa-house"></i> Home</div>
    <div class="nav-link active" onclick="navTo('showroom')" id="n-showroom"><i class="fa-solid fa-car"></i> Showroom</div>
    <div class="nav-link" onclick="navTo('staff')" id="n-staff"><i class="fa-solid fa-file-invoice"></i> Sales</div>
    <div class="nav-link" onclick="navTo('admin')" id="n-admin"><i class="fa-solid fa-screwdriver-wrench"></i> Terminal</div>
</nav>

<main>
    <div id="showroom" class="page active">
        <div class="inventory-header">
            <div>
                <h1 style="font-size: 3rem; margin:0; font-weight:900;">FLIGHT FLEET</h1>
                <p style="color:var(--accent); font-family:'JetBrains Mono'; text-transform:uppercase; letter-spacing:3px;">Austin Elite Inventory</p>
            </div>
            <input type="text" id="car-search" class="search-bar" placeholder="Cerca modello..." onkeyup="applyF()">
        </div>

        <div class="inventory-layout">
            <aside>
                <div class="filter-section">
                    <span class="sidebar-label" style="margin-top:0;">Price Limit</span>
                    <input type="range" id="f-price" min="0" oninput="applyF()">
                    <div id="p-val" style="color:white; font-weight:800; font-size:1.6rem; font-family:'JetBrains Mono'; margin-top:10px;">$ 0</div>

                    <span class="sidebar-label">Collections</span>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <label style="cursor:pointer;"><input type="checkbox" class="t-check" value="Regular" checked onchange="applyF()"> Regular Stock</label>
                        <label style="cursor:pointer;"><input type="checkbox" class="t-check" value="Prestige" checked onchange="applyF()"> Prestige Elite</label>
                    </div>

                    <span class="sidebar-label">Category</span>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <label style="cursor:pointer;"><input type="checkbox" class="c-check" value="Car" checked onchange="applyF()"> Coupe & Sedan</label>
                        <label style="cursor:pointer;"><input type="checkbox" class="c-check" value="SUV" checked onchange="applyF()"> SUV & Trucks</label>
                    </div>
                </div>
            </aside>

            <div id="fleet-grid" class="car-grid">
                </div>
        </div>
    </div>

    <div id="home" class="page">
        <div class="glass-card"><h1>Welcome to AutoNation</h1><button class="btn" onclick="navTo('showroom')">Entra nello Showroom</button></div>
    </div>
    <div id="staff" class="page">
        <div id="s-auth" class="filter-section" style="max-width:400px; margin:auto; text-align:center;">
            <input id="s-pass" type="password" placeholder="PIN VENDITE">
            <button class="btn" onclick="authS()">Sblocca Fatturazione</button>
        </div>
        <div id="s-main" class="hidden filter-section">
            <h2 style="color:var(--accent);">Emissione Fattura Certificata</h2>
            <div id="next-p" style="font-family:'JetBrains Mono'; margin-bottom:20px;">TEX-???</div>
            <select id="v-sel" onchange="syncP()"></select>
            <input id="v-buyer" placeholder="Nome Cliente">
            <input id="v-price" type="number" placeholder="Prezzo Finale">
            <input id="v-sign" placeholder="Firma Operatore">
            <button class="btn" onclick="doSale()">Genera PDF & Timbro</button>
        </div>
    </div>
    <div id="admin" class="page">
        <div id="a-auth" class="filter-section" style="max-width:400px; margin:auto;">
            <input id="a-key" type="password" placeholder="ADMIN KEY">
            <button class="btn" onclick="authA()">Accedi al Database</button>
        </div>
        <div id="a-main" class="hidden grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
            <div class="filter-section">
                <h3>Carica Veicolo</h3>
                <input id="n-name" placeholder="Modello">
                <input id="n-price" type="number" placeholder="Prezzo">
                <select id="n-type"><option value="Regular">Regular</option><option value="Prestige">Prestige</option></select>
                <select id="n-class"><option value="Car">Vettura</option><option value="SUV">SUV/Truck</option></select>
                <input type="file" id="n-img">
                <button class="btn" onclick="addCar()">Pubblica nello Showroom</button>
            </div>
            <div class="filter-section" id="admin-logs">
                <h3>Log Vendite / Gestione</h3>
                <button class="btn" style="background:#444;" onclick="resetPlates()">Reset Targhe</button>
                <table style="width:100%; margin-top:20px; font-size:0.8rem;">
                    <tbody id="edit-inventory-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
const config = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(config);
const db = firebase.database();
let carStorage = {}, cachedImg = null;

const LOGO_URL = "https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png";
const TIMBRO_URL = "https://res.cloudinary.com/dn0k6htsv/image/upload/v1774648015/ay8vqwcnfa2sgnfywv26.png";
const PREMESSA = "AutoNation Austin emette la presente fattura a conferma dell’avvenuta vendita. Tutti i veicoli rispettano gli standard di qualità AutoNation.";

function navTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('n-'+id).classList.add('active');
}

function authS() { if(document.getElementById('s-pass').value === "1234") { document.getElementById('s-auth').classList.add('hidden'); document.getElementById('s-main').classList.remove('hidden'); refreshP(); } }
function authA() { if(document.getElementById('a-key').value === "OWNER123") { document.getElementById('a-auth').classList.add('hidden'); document.getElementById('a-main').classList.remove('hidden'); } }

db.ref('cars').on('value', s => {
    carStorage = s.val() || {};
    applyF();
    const eb = document.getElementById('edit-inventory-body'); eb.innerHTML = "";
    for(let k in carStorage) eb.innerHTML += `<tr><td>${carStorage[k].name}</td><td><button onclick="deleteCar('${k}')" style="background:red; color:white; border:none; padding:5px; cursor:pointer;">X</button></td></tr>`;
});

function applyF() {
    const max = parseInt(document.getElementById('f-price').value || 0);
    const search = document.getElementById('car-search').value.toLowerCase();
    document.getElementById('p-val').innerText = `$ ${max.toLocaleString()}`;
    const types = Array.from(document.querySelectorAll('.t-check:checked')).map(c => c.value);
    const classes = Array.from(document.querySelectorAll('.c-check:checked')).map(c => c.value);
    
    const g = document.getElementById('fleet-grid'), sel = document.getElementById('v-sel');
    g.innerHTML = ""; sel.innerHTML = "<option>Seleziona veicolo...</option>";
    
    for(let k in carStorage) {
        const c = carStorage[k];
        const matchSearch = c.name.toLowerCase().includes(search);
        
        if(c.price <= max && types.includes(c.type) && classes.includes(c.class) && matchSearch) {
            const badgeClass = c.type === 'Prestige' ? 'type-prestige' : 'type-regular';
            g.innerHTML += `
            <div class="car-card">
                <div class="img-container">
                    <img src="${c.image}" class="car-img">
                    <div class="car-overlay"><div class="view-btn">Dettagli Asset</div></div>
                </div>
                <div class="car-info">
                    <span class="car-type-badge ${badgeClass}">${c.type}</span>
                    <div class="car-name">${c.name}</div>
                    <div class="car-footer">
                        <div class="car-price">$ ${c.price.toLocaleString()}</div>
                        <i class="fa-solid fa-arrow-right" style="color:var(--accent);"></i>
                    </div>
                </div>
            </div>`;
            sel.innerHTML += `<option value="${c.name}" data-p="${c.price}">${c.name}</option>`;
        }
    }
}

// PDF & LOGIC (Rimangono come richiesto prima)
async function generatePDF(data) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    try { doc.addImage(LOGO_URL, 'PNG', 15, 12, 55, 22); } catch(e){}
    doc.setTextColor(255, 46, 77); doc.setFontSize(26); doc.setFont(undefined, 'bold');
    doc.text("SALES CONTRACT", 110, 28);
    doc.setFontSize(9); doc.setTextColor(100, 100, 100);
    doc.text(doc.splitTextToSize(PREMESSA, 170), 15, 55);
    doc.setTextColor(0,0,0); doc.setFontSize(12); doc.text(`CLIENTE: ${data.cliente.toUpperCase()}`, 15, 90);
    doc.text(`VEICOLO: ${data.veicolo}`, 15, 100);
    doc.setTextColor(255, 46, 77); doc.text(`PREZZO: $ ${parseInt(data.prezzo).toLocaleString()}`, 15, 110);
    doc.setTextColor(0,0,0); doc.setFont("courier", "italic"); doc.text(`Agente: ${data.staff}`, 15, 160);
    try { doc.addImage(TIMBRO_URL, 'PNG', 130, 140, 50, 50); } catch(e){}
    doc.save(`AutoNation_${data.targa}.pdf`);
}

function doSale() {
    const b = document.getElementById('v-buyer').value, v = document.getElementById('v-sel').value, p = document.getElementById('v-price').value, s = document.getElementById('v-sign').value, t = document.getElementById('next-p').innerText;
    if(!b || v.includes("Seleziona")) return alert("Mancano dati");
    const saleData = { data: new Date().toLocaleDateString(), cliente: b, veicolo: v, targa: t, prezzo: p, staff: s };
    db.ref('sales_logs').push(saleData).then(() => { generatePDF(saleData); refreshP(); });
}

document.getElementById('n-img').onchange = e => { const r = new FileReader(); r.onload = ev => cachedImg = ev.target.result; r.readAsDataURL(e.target.files[0]); };
function addCar() {
    const n = document.getElementById('n-name').value, p = document.getElementById('n-price').value, t = document.getElementById('n-type').value, cl = document.getElementById('n-class').value;
    if(n && p && cachedImg) db.ref('cars').push({ name:n, price:parseInt(p), type:t, class:cl, image:cachedImg }).then(() => location.reload());
}
function deleteCar(k) { if(confirm("Eliminare?")) db.ref('cars/'+k).remove(); }
function resetPlates() { if(confirm("Reset targhe?")) db.ref('sales_logs').remove().then(()=>location.reload()); }
async function refreshP() {
    const s = await db.ref('sales_logs').limitToLast(1).once('value');
    const logs = s.val();
    const last = logs ? Object.values(logs)[Object.values(logs).length - 1].targa : "TEX-000";
    document.getElementById('next-p').innerText = "TEX-" + (parseInt(last.split('-')[1]) + 1).toString().padStart(3, '0');
}
function syncP() { const s = document.getElementById('v-sel'); document.getElementById('v-price').value = s.options[s.selectedIndex].dataset.p || ""; }
db.ref('settings/max_budget').on('value', s => { const v = s.val() || 3000000; const f = document.getElementById('f-price'); f.max = v; f.value = v; applyF(); });
</script>
</body>
</html>
