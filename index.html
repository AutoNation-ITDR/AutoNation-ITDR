<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoNation</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1 class="logo">AutoNation</h1>

<nav>
<a href="#">Home</a>
<a href="#cars">Auto</a>
<a href="#vendite">Vendite</a>
<a href="#" onclick="openPanel()">Personale</a>
</nav>

</header>

<section class="hero">

<h2>Concessionario Premium</h2>

<button onclick="scrollToCars()">Scopri le auto</button>

</section>

<section id="cars">

<h2>Auto disponibili</h2>

<div id="car-list"></div>

</section>

<section id="vendite">

<h2>Registro vendite</h2>

<div class="vendita-form">

<input id="nome" placeholder="Nome">

<input id="cognome" placeholder="Cognome">

<input id="modello" placeholder="Modello auto">

<button onclick="registraVendita()">Registra vendita</button>

</div>

<table>

<thead>

<tr>
<th>Targa</th>
<th>Nome</th>
<th>Cognome</th>
<th>Modello</th>
<th>Azioni</th>
</tr>

</thead>

<tbody id="lista-vendite"></tbody>

</table>

</section>

<div id="panel" class="hidden">

<div class="panel-box">

<h2>Pannello Auto</h2>

<input type="text" id="name" placeholder="Nome auto">

<input type="text" id="price" placeholder="Prezzo">

<input type="text" id="image" placeholder="Link immagine">

<div id="drop-area">

Trascina immagine qui

</div>

<button onclick="addCar()">Aggiungi auto</button>

<button onclick="closePanel()">Chiudi</button>

</div>

</div>

<footer>

<p>© 2026 AutoNation</p>

</footer>

<script src="script.js"></script>

</body>

</html>
