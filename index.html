<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTONATION | FATTURE</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Courier New', monospace;
    background:#050505;
    color:white;
    text-transform:uppercase;
}
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:black;
    border-bottom:2px solid #cc0000;
}
.logo{
    font-size:26px;
    font-weight:700;
    margin:0;
}
main{
    padding:20px;
    max-width:1100px;
    margin:0 auto;
}
h2{
    margin-top:20px;
    margin-bottom:10px;
}
section{
    margin-bottom:30px;
}
#car-list{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}
.car{
    background:#111;
    padding:12px;
    width:230px;
    border-radius:10px;
    border:1px solid #222;
    cursor:pointer;
    transition:0.2s;
}
.car:hover{
    transform:scale(1.03);
    box-shadow:0 0 12px #cc0000;
}
.car h3{
    margin:5px 0;
    font-size:16px;
}
.car p{
    margin:0;
    color:#ccc;
    font-size:13px;
}
button,.btn{
    background:#cc0000;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
    letter-spacing:1px;
}
button:hover,.btn:hover{
    background:#ff3b3b;
    box-shadow:0 0 12px #ff3b3b;
    transform:scale(1.03);
}
.panel{
    background:#111;
    padding:20px;
    border-radius:10px;
    border:1px solid #222;
}
.panel input,.panel select{
    width:100%;
    margin:6px 0;
    padding:8px;
    border-radius:6px;
    border:1px solid #333;
    background:#000;
    color:white;
    font-family:'Courier New', monospace;
}
.row{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}
.col{
    flex:1 1 300px;
}
footer{
    text-align:center;
    padding:10px;
    background:black;
    border-top:1px solid #222;
    font-size:12px;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
    <h1 class="logo">AUTONATION</h1>
    <span>GESTIONALE FATTURE</span>
</header>

<main>
    <section>
        <h2>VEICOLI DISPONIBILI</h2>
        <div id="car-list"></div>
    </section>

    <section class="panel">
        <h2>DATI FATTURA</h2>

        <div class="row">
            <div class="col">
                <h3>SELEZIONA VEICOLO</h3>
                <select id="selectAuto" onchange="autoDaSelect()">
                    <option value="">SELEZIONA VEICOLO</option>
                </select>
                <p style="font-size:11px;color:#aaa;margin-top:4px;">
                    PUOI ANCHE CLICCARE DIRETTAMENTE SUL VEICOLO NELLA LISTA SOPRA.
                </p>
            </div>

            <div class="col">
                <h3>DATI CLIENTE</h3>
                <input id="fatturaNome" placeholder="NOME CLIENTE">
                <input id="fatturaCognome" placeholder="COGNOME CLIENTE">
                <input id="fatturaTarga" placeholder="TARGA VEICOLO">
            </div>

            <div class="col">
                <h3>DATI VEICOLO</h3>
                <input id="fatturaAuto" placeholder="MODELLO AUTO" readonly>
                <input id="fatturaPrezzo" placeholder="PREZZO" readonly>
            </div>
        </div>

        <div class="row" style="margin-top:15px;">
            <div class="col">
                <h3>FIRMA DIGITALE DIPENDENTE</h3>
                <input id="firmaDigitale" placeholder="NOME E COGNOME DIPENDENTE">
            </div>
        </div>

        <div style="margin-top:20px;text-align:right;">
            <button onclick="generaFatturaPDF()">GENERA FATTURA PDF</button>
        </div>
    </section>
</main>

<footer>
    © 2026 AUTONATION - DOCUMENTO GENERATO DIGITALMENTE
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ================== DATI VEICOLI ================== */
/* Puoi modificare questa lista come vuoi */
let cars = [
    { name:"ALFA ROMEO GIULIA", price:"€ 45.000" },
    { name:"AUDI A3", price:"€ 32.000" },
    { name:"BMW M4 COMPETITION", price:"€ 95.000" },
    { name:"FIAT 500 ELETTRICA", price:"€ 24.000" },
    { name:"MERCEDES CLA 220D", price:"€ 52.000" },
    { name:"VOLKSWAGEN GOLF R", price:"€ 48.000" }
];

/* ================== INIZIALIZZAZIONE ================== */
document.addEventListener("DOMContentLoaded", ()=>{
    renderCars();
    popolaSelect();
});

/* ================== RENDER LISTA AUTO ================== */
function renderCars(){
    const carList = document.getElementById("car-list");
    carList.innerHTML = "";

    cars.sort((a,b)=> a.name.localeCompare(b.name));

    cars.forEach(car=>{
        const div = document.createElement("div");
        div.className = "car";
        div.onclick = ()=> selezionaAuto(car.name, car.price);
        div.innerHTML = `
            <h3>${car.name}</h3>
            <p>PREZZO: ${car.price}</p>
        `;
        carList.appendChild(div);
    });
}

/* ================== POPOLA SELECT ================== */
function popolaSelect(){
    const select = document.getElementById("selectAuto");
    select.innerHTML = '<option value="">SELEZIONA VEICOLO</option>';

    cars.sort((a,b)=> a.name.localeCompare(b.name));

    cars.forEach(car=>{
        const opt = document.createElement("option");
        opt.value = car.name;
        opt.textContent = car.name;
        opt.dataset.price = car.price;
        select.appendChild(opt);
    });
}

/* ================== SELEZIONE DA LISTA (CLICK) ================== */
function selezionaAuto(nome, prezzo){
    document.getElementById("fatturaAuto").value = nome;
    document.getElementById("fatturaPrezzo").value = prezzo;

    const select = document.getElementById("selectAuto");
    for(let i=0;i<select.options.length;i++){
        if(select.options[i].value === nome){
            select.selectedIndex = i;
            break;
        }
    }
}

/* ================== SELEZIONE DA SELECT ================== */
function autoDaSelect(){
    const select = document.getElementById("selectAuto");
    const nome = select.value;
    if(!nome) return;
    const prezzo = select.options[select.selectedIndex].dataset.price;

    document.getElementById("fatturaAuto").value = nome;
    document.getElementById("fatturaPrezzo").value = prezzo;
}

/* ================== GENERA FATTURA PDF ================== */
async function generaFatturaPDF(){
    const nome = document.getElementById("fatturaNome").value.trim();
    const cognome = document.getElementById("fatturaCognome").value.trim();
    const targa = document.getElementById("fatturaTarga").value.trim();
    const auto = document.getElementById("fatturaAuto").value.trim();
    const prezzo = document.getElementById("fatturaPrezzo").value.trim();
    const firma = document.getElementById("firmaDigitale").value.trim();

    if(!nome || !cognome || !targa || !auto || !prezzo || !firma){
        alert("COMPILA TUTTI I CAMPI PRIMA DI GENERARE LA FATTURA");
        return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    /* LOGO (semplice icona auto) */
    const logoURL = "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Car_icon_2.svg/512px-Car_icon_2.svg.png";

    let logoBase64 = null;
    try{
        const blob = await fetch(logoURL).then(r=>r.blob());
        logoBase64 = await new Promise(resolve=>{
            const reader = new FileReader();
            reader.onload = ()=> resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }catch(e){
        logoBase64 = null;
    }

    if(logoBase64){
        pdf.addImage(logoBase64,"PNG",150,10,40,40);
    }

    pdf.setFont("courier","bold");
    pdf.setFontSize(20);
    pdf.text("FATTURA DI VENDITA", 10, 20);

    pdf.setFont("courier","normal");
    pdf.setFontSize(12);

    let y = 40;
    pdf.text(`CLIENTE: ${nome} ${cognome}`,10,y); y+=8;
    pdf.text(`TARGA: ${targa}`,10,y); y+=8;
    pdf.text(`MODELLO: ${auto}`,10,y); y+=8;
    pdf.text(`PREZZO: ${prezzo}`,10,y); y+=12;

    pdf.text("FIRMA DIGITALE DIPENDENTE:",10,y);
    pdf.text(firma, 80, y);
    y += 20;

    /* TIMBRO DIGITALE (RIQUADRO ROSSO) */
    pdf.setDrawColor(255,0,0);
    pdf.setLineWidth(0.7);
    pdf.rect(10, y, 90, 25);
    pdf.setFont("courier","bold");
    pdf.text("TIMBRO DIGITALE", 15, y+10);
    pdf.text("AUTONATION", 15, y+20);
    y += 40;

    /* DISCLAIMER */
    pdf.setFont("courier","normal");
    pdf.setFontSize(10);
    pdf.text("QUESTA FATTURA È GENERATA DIGITALMENTE DA AUTONATION.",10,y); y+=6;
    pdf.text("VALIDA AI FINI DI LEGGE SE ACCOMPAGNATA DA DOCUMENTO D'IDENTITÀ.",10,y); y+=6;
    pdf.text("L'USO IMPROPRIO DI QUESTO DOCUMENTO È PERSEGUIBILE A NORMA DI LEGGE.",10,y);

    pdf.save(`FATTURA_${nome}_${cognome}.pdf`);
    alert("FATTURA PDF GENERATA");
}
</script>

</body>
</html>
