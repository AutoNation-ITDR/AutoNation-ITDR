<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Corporate Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --bg: #050608;
            --surface: #101218;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --accent-glow: rgba(255, 46, 77, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav { 
            width: 280px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; 
        }
        .logo-box img { width: 100%; margin-bottom: 40px; }
        .nav-link { 
            display: flex; align-items: center; padding: 15px 20px; color: var(--text-dim); 
            text-decoration: none; border-radius: 12px; margin-bottom: 10px; font-weight: 600; transition: 0.3s;
        }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px var(--accent-glow); }

        /* MAIN */
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #12141c 0%, #050608 100%); }
        .page { display: none; padding: 60px; max-width: 1400px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DASHBOARD (HOME) IMPROVED */
        .hero-banner { 
            position: relative; height: 450px; border-radius: 30px; overflow: hidden; 
            background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2070') center/cover;
            display: flex; align-items: center; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .hero-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.9), transparent); }
        .hero-content { position: relative; z-index: 2; max-width: 600px; }
        .hero-content h1 { font-family: 'Montserrat'; font-size: 4rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
        .hero-content p { color: var(--primary); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .stat-card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-card h2 { font-size: 2.5rem; color: var(--primary); font-family: 'Montserrat'; }

        /* SHOWROOM */
        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: var(--surface); padding: 20px; border-radius: 20px; }
        .filter-group { display: flex; gap: 10px; }
        .btn-filter { padding: 10px 20px; border-radius: 10px; border: 1px solid #333; background: none; color: white; cursor: pointer; }
        .btn-filter.active { background: var(--primary); border: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .car-card { background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .car-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .car-img { width: 100%; height: 200px; object-fit: cover; }
        .car-details { padding: 20px; }
        .price-tag { font-family: 'Montserrat'; color: var(--primary); font-size: 1.4rem; font-weight: 800; }

        /* SECURE ACCESS PANELS */
        .lock-screen { 
            max-width: 400px; margin: 100px auto; background: var(--surface); padding: 40px; 
            border-radius: 25px; border: 1px solid var(--primary); text-align: center; 
        }
        input { 
            width: 100%; background: #000; border: 1px solid #333; padding: 15px; 
            border-radius: 12px; color: white; margin: 20px 0; font-family: 'Outfit';
        }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--primary); border-bottom: 2px solid #222; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .btn-small { padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box"><img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png"></div>
        <a href="#" class="nav-link active" onclick="navTo('home')"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="#" class="nav-link" onclick="navTo('showroom')"><i class="fa-solid fa-car"></i> Showroom</a>
        <a href="#" class="nav-link" onclick="navTo('sales')"><i class="fa-solid fa-file-invoice-dollar"></i> Fatture</a>
        <a href="#" class="nav-link" onclick="navTo('owners')"><i class="fa-solid fa-user-shield"></i> Owners Area</a>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="hero-banner">
                <div class="hero-content">
                    <p>Austin Elite Dealership</p>
                    <h1>DRIVE THE<br>IMPOSSIBLE.</h1>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-card"><h2 id="count-cars">0</h2><p>Auto In Stock</p></div>
                <div class="stat-card"><h2 id="count-sales">0</h2><p>Vendite Mensili</p></div>
                <div class="stat-card"><h2>24/7</h2><p>Supporto VIP</p></div>
            </div>
        </div>

        <div id="showroom" class="page">
            <div class="filter-header">
                <div class="filter-group">
                    <button class="btn-filter active" onclick="setFilter('All')">All</button>
                    <button class="btn-filter" onclick="setFilter('Regular')">Regular</button>
                    <button class="btn-filter" onclick="setFilter('Prestige')">Prestige</button>
                    <button class="btn-filter" onclick="setFilter('Electric')">Electric</button>
                    <button class="btn-filter" onclick="setFilter('Classic')">Classic</button>
                </div>
                <div style="color:var(--text-dim)">Prezzo Max: <span id="p-val">$1M</span> 
                    <input type="range" min="0" max="1000000" step="10000" value="1000000" oninput="updatePriceFilter(this.value)">
                </div>
            </div>
            <div id="fleet-grid" class="grid"></div>
        </div>

        <div id="sales" class="page">
            <div id="lock-sales" class="lock-screen">
                <i class="fa-solid fa-key" style="font-size: 2rem; color: var(--primary)"></i>
                <h2 style="margin-top:10px">Sales Access</h2>
                <input type="password" id="pass-sales" placeholder="PIN Personale">
                <button class="btn-action" onclick="unlock('sales')">Sblocca Fatturazione</button>
            </div>
            <div id="content-sales" class="hidden">
                <div style="max-width: 600px; background:var(--surface); padding:40px; border-radius:20px; margin:auto;">
                    <h2>Nuova Fattura</h2>
                    <select id="inv-car" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:white; border-radius:12px; margin-bottom:20px;"></select>
                    <input type="text" id="inv-client" placeholder="Nome Cliente">
                    <input type="number" id="inv-price" placeholder="Prezzo Finale ($)">
                    <input type="text" id="inv-agent" placeholder="Firma Agente">
                    <button class="btn-action" onclick="createPDF()">Stampa e Salva Fattura</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="lock-owners" class="lock-screen">
                <i class="fa-solid fa-crown" style="font-size: 2rem; color: var(--primary)"></i>
                <h2 style="margin-top:10px">Owners Area</h2>
                <input type="password" id="pass-owners" placeholder="Master Password">
                <button class="btn-action" onclick="unlock('owners')">Accedi al Database</button>
            </div>
            <div id="content-owners" class="hidden">
                <div style="display:grid; grid-template-columns: 1fr 2fr; gap:30px;">
                    <div class="stat-card" style="text-align:left;">
                        <h3>Aggiungi Veicolo</h3>
                        <input id="add-name" placeholder="Modello">
                        <input id="add-price" type="number" placeholder="Prezzo">
                        <select id="add-type" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:white; margin-bottom:15px; border-radius:10px;">
                            <option value="Regular">Regular</option>
                            <option value="Prestige">Prestige</option>
                            <option value="Electric">Electric</option>
                            <option value="Classic">Classic</option>
                        </select>
                        <input type="file" id="add-img">
                        <button class="btn-action" onclick="pushCar()">Salva</button>
                    </div>
                    <div class="stat-card" style="text-align:left; overflow-x:auto;">
                        <h3>Gestione Flotta</h3>
                        <table id="owner-table">
                            <thead><tr><th>Nome</th><th>Prezzo</th><th>Azioni</th></tr></thead>
                            <tbody id="owner-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // FIREBASE
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let currentFilter = 'All', maxPrice = 1000000, allCars = {};

        // PASSWORDS
        const SECRETS = { sales: "1234", owners: "OWNER2026" };

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function unlock(type) {
            const val = document.getElementById('pass-' + type).value;
            if(val === SECRETS[type]) {
                document.getElementById('lock-' + type).style.display = 'none';
                document.getElementById('content-' + type).classList.remove('hidden');
                document.getElementById('content-' + type).style.display = 'block';
            } else { alert("Accesso Negato"); }
        }

        // DATABASE SYNC
        db.ref('cars').on('value', snap => {
            allCars = snap.val() || {};
            renderShowroom();
            renderOwnerTable();
            updateSelects();
            document.getElementById('count-cars').innerText = Object.keys(allCars).length;
        });

        db.ref('sales_logs').on('value', snap => {
            document.getElementById('count-sales').innerText = snap.numChildren();
        });

        function renderShowroom() {
            const grid = document.getElementById('fleet-grid'); grid.innerHTML = "";
            for(let key in allCars) {
                const c = allCars[key];
                if((currentFilter === 'All' || c.type === currentFilter) && c.price <= maxPrice) {
                    grid.innerHTML += `
                        <div class="car-card">
                            <img src="${c.img}" class="car-img">
                            <div class="car-details">
                                <small style="color:var(--primary)">${c.type}</small>
                                <h3 style="margin:5px 0">${c.name}</h3>
                                <div class="price-tag">$ ${parseInt(c.price).toLocaleString()}</div>
                            </div>
                        </div>`;
                }
            }
        }

        function renderOwnerTable() {
            const tbody = document.getElementById('owner-tbody'); tbody.innerHTML = "";
            for(let key in allCars) {
                const c = allCars[key];
                tbody.innerHTML += `
                    <tr>
                        <td>${c.name}</td>
                        <td><input type="number" value="${c.price}" onchange="updatePrice('${key}', this.value)" style="width:120px; margin:0; padding:5px;"></td>
                        <td><button class="btn-small" style="background:red; color:white; border:none;" onclick="delCar('${key}')">X</button></td>
                    </tr>`;
            }
        }

        function setFilter(t) { 
            currentFilter = t; 
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderShowroom(); 
        }

        function updatePriceFilter(v) { 
            maxPrice = v; 
            document.getElementById('p-val').innerText = v >= 1000000 ? "$1M+" : "$ " + parseInt(v).toLocaleString(); 
            renderShowroom(); 
        }

        function updatePrice(key, val) { db.ref('cars/'+key).update({ price: parseInt(val) }); }
        function delCar(key) { if(confirm("Eliminare?")) db.ref('cars/'+key).remove(); }

        let tempImg = "";
        document.getElementById('add-img').onchange = e => {
            const r = new FileReader();
            r.onload = ev => tempImg = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        function pushCar() {
            const name = document.getElementById('add-name').value;
            const price = document.getElementById('add-price').value;
            const type = document.getElementById('add-type').value;
            if(name && price && tempImg) db.ref('cars').push({ name, price: parseInt(price), type, img: tempImg });
        }

        function updateSelects() {
            const sel = document.getElementById('inv-car'); sel.innerHTML = "";
            for(let k in allCars) sel.innerHTML += `<option>${allCars[k].name}</option>`;
        }

        async function createPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const client = document.getElementById('inv-client').value;
            const car = document.getElementById('inv-car').value;
            const price = document.getElementById('inv-price').value;

            doc.setFillColor(16, 18, 24); doc.rect(0,0,210,40,'F');
            doc.setTextColor(255, 46, 77); doc.setFontSize(22); doc.text("AUTONATION AUSTIN", 20, 25);
            doc.setTextColor(0,0,0); doc.setFontSize(14); doc.text("CONTRATTO DI VENDITA UFFICIALE", 20, 60);
            doc.setFontSize(12);
            doc.text(`CLIENTE: ${client.toUpperCase()}`, 20, 80);
            doc.text(`VEICOLO: ${car}`, 20, 90);
            doc.text(`TOTALE: $ ${parseInt(price).toLocaleString()}`, 20, 100);
            doc.text("________________________________", 20, 150);
            doc.text(`Firma Agente: ${document.getElementById('inv-agent').value}`, 20, 160);
            
            db.ref('sales_logs').push({ client, car, price, date: new Date().toLocaleString() });
            doc.save(`Fattura_${client}.pdf`);
        }
    </script>
</body>
</html>
