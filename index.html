<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION | Austin's Automotive Pillar</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --neon: #ff0000; --bg: #000000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 5%; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 4px; font-weight: 900; }
        .logo span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        nav a { color: #fff; margin-left: 30px; text-decoration: none; font-size: 11px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; cursor: pointer; opacity: 0.6; transition: 0.4s; }
        nav a:hover { opacity: 1; color: var(--neon); }

        .hero-new { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; text-align: center; overflow: hidden;
        }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%); z-index: 1; }
        .hero-video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.5); }
        .hero-text { z-index: 2; }
        .hero-text h1 { font-family: 'Orbitron'; font-size: clamp(40px, 12vw, 120px); margin: 0; line-height: 0.8; letter-spacing: -5px; }
        .hero-text p { font-size: clamp(12px, 2vw, 18px); letter-spacing: 8px; color: var(--neon); margin-top: 20px; font-weight: 300; }

        .btn-action { 
            padding: 20px 50px; background: transparent; color: #fff; border: 1px solid var(--neon);
            font-family: 'Orbitron'; font-size: 14px; cursor: pointer; box-shadow: 0 0 15px var(--neon); transition: 0.3s;
        }
        .btn-action:hover { background: var(--neon); color: #000; box-shadow: 0 0 40px var(--neon); }

        .page { display: none; padding-top: 100px; animation: fadeInUp 0.8s ease; }
        .active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; padding: 50px 5%; }
        .car-card { background: var(--glass); border: 1px solid var(--border); transition: 0.4s; position: relative; }
        .targa-badge { position: absolute; top: 15px; right: 15px; background: #fff; color: #000; padding: 3px 10px; font-family: 'Orbitron'; font-weight: 900; font-size: 12px; }
        .car-card img { width: 100%; height: 250px; object-fit: cover; }
        .car-info { padding: 25px; }
        .car-info h3 { font-family: 'Orbitron'; margin: 0; font-size: 20px; }
        .car-price { color: var(--neon); font-weight: 800; font-size: 24px; margin-top: 10px; }

        .glass-box { max-width: 500px; margin: 50px auto; background: var(--glass); padding: 50px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        input, select { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; border: 1px solid #333; color: #fff; }

        .log-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; border: 1px solid var(--border); }
        .log-table th, .log-table td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        .log-table th { background: rgba(255,0,0,0.1); color: var(--neon); text-transform: uppercase; }

        footer { padding: 80px 5%; text-align: center; border-top: 1px solid var(--border); color: #444; font-size: 11px; letter-spacing: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO<span>NATION</span></div>
    <nav>
        <a onclick="goPage('home')">Overview</a>
        <a onclick="goPage('auto')">Inventory</a>
        <a onclick="goPage('personale')">Personale AutoNation</a>
        <a onclick="goPage('owner')">Owner Reserved</a>
    </nav>
</header>

<div id="home" class="page active" style="padding-top:0;">
    <section class="hero-new">
        <div class="video-overlay"></div>
        <video autoplay loop muted playsinline class="hero-video">
            <source src="https://coverr.co/articles/homepage-video-background-with-css/coverr-night-traffic-1571761271617.mp4" type="video/mp4">
        </video>
        <div class="hero-text">
            <h1>AUSTIN<br>PRIDE</h1>
            <p>ESTABLISHED EXCELLENCE</p>
            <button class="btn-action" style="margin-top: 50px;" onclick="goPage('auto')">EXPLORE THE FLEET</button>
        </div>
    </section>
</div>

<div id="auto" class="page">
    <h2 style="text-align:center; font-family:'Orbitron'; font-size: 40px;">THE <span style="color:var(--neon)">FLEET</span></h2>
    <div id="car-list" class="grid"></div>
</div>

<div id="personale" class="page">
    <div id="personal-login" class="glass-box">
        <h3 style="text-align:center; font-family:'Orbitron'; color:var(--neon);">STAFF LOGIN</h3>
        <input id="uP" placeholder="OPERATOR ID">
        <input id="pP" type="password" placeholder="PASSWORD">
        <button class="btn-action" style="width:100%" onclick="loginP()">ENTRA</button>
    </div>
    <div id="personal-content" class="hidden">
        <div class="glass-box">
            <h3>SISTEMA FATTURAZIONE</h3>
            <select id="selA" onchange="upF()"></select>
            <input id="fN" placeholder="NOME CLIENTE">
            <input id="fT" placeholder="TARGA" readonly style="color:var(--neon);">
            <input id="fM" placeholder="VEICOLO" readonly>
            <input id="fPr" placeholder="PREZZO" readonly>
            <input id="fF" placeholder="FIRMA DIGITALE">
            <button class="btn-action" style="width:100%" onclick="genPDF()">GENERA FATTURA</button>
        </div>
    </div>
</div>

<div id="owner" class="page">
    <div id="owner-login" class="glass-box">
        <h3 style="text-align:center; font-family:'Orbitron'; color:var(--neon);">OWNER RESERVED</h3>
        <input id="oP" type="password" placeholder="MASTER KEY">
        <button class="btn-action" style="width:100%" onclick="loginO()">ACCESS CORE</button>
    </div>
    <div id="owner-content" class="hidden">
        <div class="glass-box">
            <h3>NEW VEHICLE</h3>
            <input id="name" placeholder="MODEL NAME">
            <input id="price" placeholder="PRICE">
            <input type="file" id="imgF">
            <button class="btn-action" style="width:100%" onclick="addCar()">UPLOAD TO CLOUD</button>
        </div>
        <div class="glass-box" style="max-width: 90%;">
            <h3>VEHICLE LOGS</h3>
            <table class="log-table">
                <thead><tr><th>DATA</th><th>MODELLO</th><th>TARGA</th><th>PREZZO</th><th>ACTION</th></tr></thead>
                <tbody id="logs"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    <div class="logo">AUTO<span>NATION</span></div>
    <p>© 2026 AUSTIN, TEXAS. POWERED BY PAVEL</p>
</footer>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentImg = null;

async function getNextTarga() {
    const s = await db.ref('cars').limitToLast(1).once('value');
    const d = s.val();
    if(!d) return "TEX-001";
    const last = d[Object.keys(d)[0]].targa;
    const num = parseInt(last.split('-')[1]);
    return "TEX-" + (num + 1).toString().padStart(3, '0');
}

db.ref('cars').on('value', snap => {
    const data = snap.val();
    const list = document.getElementById("car-list");
    const logs = document.getElementById("logs");
    const sel = document.getElementById("selA");
    list.innerHTML = ""; logs.innerHTML = ""; sel.innerHTML = `<option value="">SELECT...</option>`;
    for(let id in data) {
        let c = data[id];
        list.innerHTML += `<div class="car-card"><div class="targa-badge">${c.targa}</div><img src="${c.image}"><div class="car-info"><h3>${c.name}</h3><div class="car-price">${c.price}</div></div></div>`;
        logs.innerHTML += `<tr><td>${c.data}</td><td>${c.name}</td><td><b>${c.targa}</b></td><td>${c.price}</td><td><button onclick="del('${id}')" style="background:red; color:white; border:none; padding:5px;">X</button></td></tr>`;
        sel.innerHTML += `<option value="${c.name}" data-p="${c.price}" data-t="${c.targa}">${c.name}</option>`;
    }
});

function goPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById(p).classList.add('active'); }

document.getElementById('imgF').onchange = e => {
    const r = new FileReader();
    r.onload = ev => currentImg = ev.target.result;
    r.readAsDataURL(e.target.files[0]);
};

async function addCar() {
    const n = document.getElementById('name').value, p = document.getElementById('price').value;
    if(!n || !p || !currentImg) return alert("MISSING DATA");
    const t = await getNextTarga();
    const d = new Date().toLocaleDateString('it-IT');
    db.ref('cars').push({ name:n, price:p, image:currentImg, targa:t, data:d }).then(() => alert("REGISTERED: " + t));
}

function del(id) { if(confirm("DELETE?")) db.ref('cars/'+id).remove(); }
function loginO() { if(document.getElementById('oP').value === "OWNER123") { document.getElementById('owner-login').classList.add('hidden'); document.getElementById('owner-content').classList.remove('hidden'); } }
function loginP() { if(document.getElementById('uP').value === "admin" && document.getElementById('pP').value === "1234") { document.getElementById('personal-login').classList.add('hidden'); document.getElementById('personal-content').classList.remove('hidden'); } }

function upF() {
    const s = document.getElementById("selA");
    document.getElementById("fM").value = s.value;
    document.getElementById("fPr").value = s.options[s.selectedIndex].dataset.p || "";
    document.getElementById("fT").value = s.options[s.selectedIndex].dataset.t || "";
}

function genPDF() {
    const { jsPDF } = window.jspdf; const pdf = new jsPDF();
    pdf.setFontSize(10); pdf.text("STATO DI TEXAS - CONTEA DI TRAVIS", 105, 20, {align:"center"});
    pdf.setFontSize(18); pdf.text("FATTURA AUTONATION", 105, 30, {align:"center"});
    const prem = "AutoNation, uno dei principali concessionari automobilistici di Austin, Texas, emette la presente fattura a conferma dell’avvenuta vendita e/o dei servizi erogati al cliente. Tutti i veicoli e gli interventi forniti rispettano gli standard di qualità e trasparenza che contraddistinguono il nostro marchio. I dati riportati di seguito rappresentano in modo accurato e dettagliato l’operazione effettuata, nel pieno rispetto delle normative vigenti e delle politiche interne di AutoNation.";
    pdf.setFontSize(9); pdf.text(pdf.splitTextToSize(prem, 180), 10, 45);
    pdf.text("CLIENTE: " + document.getElementById("fN").value.toUpperCase(), 10, 80);
    pdf.text("MODELLO: " + document.getElementById("fM").value, 10, 90);
    pdf.text("TARGA: " + document.getElementById("fT").value, 10, 100);
    pdf.text("PREZZO: " + document.getElementById("fPr").value, 10, 110);
    pdf.text("FIRMA: " + document.getElementById("fF").value.toUpperCase(), 10, 150);
    pdf.save("Fattura_" + document.getElementById("fT").value + ".pdf");
}
</script>
</body>
</html>
