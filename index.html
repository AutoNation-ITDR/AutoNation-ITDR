<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Texas | Elite Operations v21.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
            --text-dim: #777;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        nav { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; }
        .logo-container img { 
            width: 130px; 
            height: 130px; 
            margin: 0 auto 40px auto; 
            border-radius: 50%; 
            border: 2px solid var(--primary); 
            object-fit: cover; /* Mantiene la proporzione */
        }
        .nav-link { 
            display: flex; align-items: center; padding: 15px; color: var(--text-dim); 
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; font-weight: 700; 
            cursor: pointer; border: none; background: none; width: 100%; font-size: 0.8rem; text-align: left;
        }
        .nav-link.active { color: var(--primary); background: #111; border-left: 4px solid var(--primary); }

        /* --- MAIN --- */
        main { flex: 1; overflow-y: auto; background: #050505; }
        .page { display: none; min-height: 100%; padding: 40px; }
        .page.active { display: block; }

        /* --- HOME HERO --- */
        .hero { 
            height: 80vh; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
            padding: 60px; 
            overflow: hidden; 
            border-radius: 30px; 
            margin: 20px; 
            border: 1px solid var(--border); 
        }
        .hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: -1; }
        .hero-content { z-index: 1; }
        .hero-content h1 { font-family: 'Montserrat'; font-size: 5rem; line-height: 1; margin-bottom: 15px; letter-spacing: -2px; }
        .hero-content p { font-size: 1.2rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 4px; }

        /* --- PANELS --- */
        .panel { background: var(--surface); padding: 40px; border-radius: 25px; border: 1px solid var(--border); max-width: 650px; margin: 0 auto; }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input, select { width: 100%; padding: 15px; border-radius: 10px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 15px; font-family: 'Outfit'; }
        label { color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .car-card { background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .car-img { width: 100%; height: 200px; object-fit: cover; }
        .car-info { padding: 20px; }
        .badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 8px; color: var(--primary); border: 1px solid var(--primary); font-size: 0.6rem; font-weight: 900; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="https://i.ibb.co/v4m0YvS/BCO.jpg" alt="AutoNation Texas Logo">
        </div>
        <button class="nav-link active" onclick="navTo('home', this)">HOME</button>
        <button class="nav-link" onclick="navTo('showroom', this)">SHOWROOM</button>
        <button class="nav-link" onclick="navTo('booking', this)">BOOKING</button>
        <button class="nav-link" onclick="navTo('sales', this)">VENDITE (PDF)</button>
        <button class="nav-link" onclick="navTo('owners', this)">OWNER</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="hero">
                <video class="hero-video" autoplay muted loop playsinline>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-fast-driving-in-a-city-at-night-12344-large.mp4" type="video/mp4">
                </video>
                <div class="hero-content">
                    <h1>AUTONATION<br><span style="color:var(--primary)">TEXAS.</span></h1>
                    <p>Vehicle Division Elite</p>
                </div>
            </div>
        </div>

        <div id="showroom" class="page">
            <div id="fleet-grid" class="car-grid"></div>
        </div>

        <div id="booking" class="page">
            <div class="panel">
                <h2 style="margin-bottom:25px;">PRENOTA APPUNTAMENTO</h2>
                <label>Nome</label><input id="book-name">
                <label>Discord ID</label><input id="book-discord">
                <label>Data</label><input type="date" id="book-date">
                <label>Ora</label><input type="time" id="book-time">
                <button class="btn-prime" onclick="sendBooking()">INVIA RICHIESTA</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="panel" style="max-width:350px; text-align:center;">
                <h3>STAFF PIN</h3>
                <input type="password" id="pw-sales">
                <button class="btn-prime" onclick="verify('sales')">ACCEDI</button>
            </div>
            <div id="sales-content" class="hidden">
                <div class="panel">
                    <h2>TERMINALE CONTRATTI</h2>
                    <label>VEICOLO</label><select id="inv-car" onchange="updatePrice()"></select>
                    <label>ACQUIRENTE</label><input id="inv-name">
                    <label>PREZZO</label><input id="inv-final" readonly>
                    <label>AGENTE VENDITORE</label><input id="inv-sign">
                    <button class="btn-prime" onclick="makeInvoice()">GENERA CONTRATTO FIRMABILE</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="panel" style="max-width:350px; text-align:center;">
                <h3>OWNER KEY</h3>
                <input type="password" id="pw-owners">
                <button class="btn-prime" onclick="verify('owners')">ACCEDI</button>
            </div>
            <div id="owners-content" class="hidden">
                <div class="panel">
                    <h3>Carica Veicolo</h3>
                    <input id="add-n" placeholder="Modello">
                    <input id="add-p" type="number" placeholder="Prezzo">
                    <select id="add-type"><option value="Regular">Regular</option><option value="Prestige">Prestige</option></select>
                    <input type="file" id="add-file">
                    <button class="btn-prime" onclick="saveToDB()">PUBBLICA</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIG FIREBASE (Sostituisci con le tue credenziali se necessario)
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const WEBHOOK = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";

        let allCars = {}, cacheImg = "";

        // NAVIGAZIONE TRA LE PAGINE
        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        // VERIFICA PIN DI ACCESSO
        function verify(type) {
            const pin = document.getElementById('pw-'+type).value;
            // PIN fissi per test: Staff=1234, Owner=OWNER2026
            if((type === 'sales' && pin === "1234") || (type === 'owners' && pin === "OWNER2026")) {
                document.getElementById(type+'-gate').classList.add('hidden');
                document.getElementById(type+'-content').classList.remove('hidden');
            } else {
                alert("PIN Errato");
            }
        }

        // SINCRONIZZAZIONE DATABASE AUTO
        db.ref('cars').on('value', s => { 
            allCars = s.val() || {}; 
            renderShowroom(); 
            const sel = document.getElementById('inv-car'); sel.innerHTML = "<option disabled selected>Scegli Veicolo...</option>";
            for(let k in allCars) sel.innerHTML += `<option value="${allCars[k].name}">${allCars[k].name}</option>`;
        });

        // RENDER DELLO SHOWROOM
        function renderShowroom() {
            const grid = document.getElementById('fleet-grid'); grid.innerHTML = "";
            for(let k in allCars) {
                const c = allCars[k];
                grid.innerHTML += `<div class="car-card"><div class="badge">${c.type}</div><img src="${c.img}" class="car-img"><div class="car-info"><h3>${c.name}</h3><div style="color:var(--primary); font-weight:900;">$ ${parseInt(c.price).toLocaleString()}</div></div></div>`;
            }
        }

        // AGGIORNAMENTO PREZZO NEL MODULO FATTURA
        function updatePrice() {
            const n = document.getElementById('inv-car').value;
            for(let k in allCars) if(allCars[k].name === n) document.getElementById('inv-final').value = allCars[k].price;
        }

        // INVIO PRENOTAZIONE
        function sendBooking() {
            const name = document.getElementById('book-name').value;
            const dID = document.getElementById('book-discord').value;
            const date = document.getElementById('book-date').value;
            const time = document.getElementById('book-time').value;
            if(name && dID && date && time) {
                db.ref('appointments').push({name, dID, date, time}).then(()=> {
                    alert("Richiesta Inviata!");
                    document.getElementById('book-name').value = "";
                    document.getElementById('book-discord').value = "";
                });
            } else {
                alert("Compila tutti i campi");
            }
        }

        // GESTIONE IMMAGINE PER NUOVO STOCK
        document.getElementById('add-file').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => cacheImg = ev.target.result; r.readAsDataURL(e.target.files[0]);
        };

        // SALVATAGGIO NUOVA AUTO NEL DATABASE
        function saveToDB() {
            const n = document.getElementById('add-n').value, p = document.getElementById('add-p').value, t = document.getElementById('add-type').value;
            if(n && p && cacheImg) db.ref('cars').push({ name: n, price: p, type: t, img: cacheImg }).then(() => {
                alert("Caricata!");
                document.getElementById('add-n').value = "";
                document.getElementById('add-p').value = "";
                document.getElementById('add-file').value = "";
                cacheImg = "";
            });
        }

        // --- FUNZIONE PDF CON LOGO RIPRISTINATO E NUOVO FONT FIRMA ---
        async function makeInvoice() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const client = document.getElementById('inv-name').value.toUpperCase() || "CLIENTE ELITE";
                const car = document.getElementById('inv-car').value || "VEICOLO";
                const price = document.getElementById('inv-final').value || "0";
                const agent = document.getElementById('inv-sign').value || "Agente Texas";

                // --- SFONDO HEADER NERO ---
                doc.setFillColor(15, 15, 15); doc.rect(0, 0, 210, 55, 'F');
                
                // --- INSERIMENTO LOGO (RIPRISTINATO) ---
                // Uso l'immagine circolare del timbro fornita.
                const logoUrl = "https://i.ibb.co/v4m0YvS/BCO.jpg"; 
                doc.addImage(logoUrl, 'JPEG', 150, 5, 45, 45); 

                // --- TESTI HEADER ---
                doc.setTextColor(255, 46, 77); doc.setFontSize(28); doc.setFont("helvetica", "bold");
                doc.text("AUTONATION TEXAS", 20, 25);
                doc.setTextColor(255, 255, 255); doc.setFontSize(9); doc.setFont("helvetica", "normal");
                doc.text("VEHICLE DIVISION | OFFICIAL SALES CONTRACT", 20, 33);
                doc.text("ID CONTRATTO: " + Math.random().toString(36).substring(7).toUpperCase(), 20, 38);

                // --- CORPO DEL CONTRATTO ---
                doc.setTextColor(40, 40, 40); doc.setFontSize(11);
                doc.text("DATI ACQUIRENTE:", 20, 70);
                doc.setFont("helvetica", "bold"); doc.text(client, 20, 78);
                
                doc.setFont("helvetica", "normal"); doc.text("DATA TRANSAZIONE:", 110, 70);
                doc.setFont("helvetica", "bold"); doc.text(new Date().toLocaleDateString(), 110, 78);

                // Tabella Dettagli
                doc.setDrawColor(220, 220, 220); doc.line(20, 90, 190, 90);
                doc.setFont("helvetica", "bold"); doc.text("DESCRIZIONE", 25, 100); doc.text("VALORE", 160, 100);
                doc.line(20, 105, 190, 105);
                
                doc.setFont("helvetica", "normal");
                doc.text(`Acquisto Veicolo Stock: ${car}`, 25, 115); doc.text("$ " + parseInt(price).toLocaleString(), 160, 115);
                
                doc.setFillColor(250, 250, 250); doc.rect(130, 125, 60, 10, 'F');
                doc.setFont("helvetica", "bold"); doc.text("TOTALE FINALE: $ " + parseInt(price).toLocaleString(), 133, 132);

                // --- SEZIONE FIRME INTERATTIVE ---
                doc.setDrawColor(255, 46, 77); doc.rect(20, 160, 170, 50);
                
                // Etichetta DocuSign Style
                doc.setFillColor(255, 46, 77); doc.rect(20, 160, 30, 8, 'F');
                doc.setTextColor(255, 255, 255); doc.setFontSize(7); doc.text("SIGN HERE", 23, 165);

                // Campo Firma Cliente (Interattivo)
                doc.setTextColor(0, 0, 0); doc.setFontSize(8); doc.text("FIRMA ACQUIRENTE (CLICCA PER SCRIVERE):", 25, 172);
                
                const TextField = window.jspdf.AcroFormTextField;
                const sigField = new TextField();
                sigField.fieldName = "sig_client_ds";
                sigField.value = "Digita il tuo nome completo...";
                sigField.Rect = [25, 178, 70, 12];
                doc.addField(sigField);

                // Firma Agente (Nuovo font e stile "penna blu")
                doc.text("CERTIFICATO DALL'AGENTE:", 110, 172);
                doc.setTextColor(20, 50, 180); // Blu inchiostro elegante
                doc.setFont("times", "italic"); // Font classico corsivo per firme
                doc.setFontSize(18);
                doc.text(agent, 110, 187);
                
                // Timbro Finale "VERIFIED"
                doc.setDrawColor(40, 167, 69); doc.setTextColor(40, 167, 69);
                doc.rect(125, 197, 40, 7);
                doc.setFontSize(7); doc.setFont("helvetica", "bold");
                doc.text("VERIFIED BY TEXAS HUB", 145, 201.5, { align: "center" });

                // Download
                doc.save(`Contratto_Texas_${client}.pdf`);
            } catch (e) {
                console.error("Errore PDF:", e);
                alert("Errore nella generazione del PDF. Controlla la console.");
            }
        }
    </script>
</body>
</html>
