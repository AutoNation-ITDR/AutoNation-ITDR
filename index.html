<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Luxury Hub v5.6</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #ff2e4d;
            --accent-glow: rgba(255, 46, 77, 0.3);
            --bg: #050608;
            --panel: #0f1116;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        nav { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 50px; text-transform: uppercase; text-align: center; }
        .logo span { color: var(--accent); }
        .nav-link { display: flex; align-items: center; padding: 14px 18px; color: var(--text-dim); text-decoration: none; border-radius: 12px; margin-bottom: 8px; font-weight: 600; cursor: pointer; }
        .nav-link i { margin-right: 12px; width: 20px; text-align: center; }
        .nav-link.active { background: var(--accent); color: white; box-shadow: 0 8px 15px var(--accent-glow); }

        /* --- MAIN --- */
        main { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .page { display: none; opacity: 0; transform: translateY(10px); }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- HERO SLIDER --- */
        .hero { position: relative; height: 380px; border-radius: 25px; overflow: hidden; margin-bottom: 40px; border: 1px solid var(--border); }
        .slide { position: absolute; inset: 0; opacity: 0; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px; transition: 1s; }
        .slide.active { opacity: 1; }
        .slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .slide-content { position: relative; z-index: 10; }
        .slide-content h2 { font-size: 3rem; margin: 0; font-weight: 800; text-transform: uppercase; }

        /* --- INVENTORY LAYOUT (RIPRISTINATO) --- */
        .inventory-container { display: grid; grid-template-columns: 280px 1fr; gap: 30px; }
        .filter-sidebar { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; height: fit-content; position: sticky; top: 0; }
        .section-label { font-size: 0.7rem; color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        /* --- UI COMPONENTS --- */
        .glass-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; }
        input, select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 14px; border-radius: 10px; color: white; margin-bottom: 15px; }
        input[type="password"] { font-family: 'JetBrains Mono'; letter-spacing: 4px; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; width: 100%; }
        
        .car-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; position: relative; }
        .car-img { width: 100%; height: 180px; object-fit: cover; }
        .car-info { padding: 20px; }
        .price-tag { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 1.3rem; font-weight: 700; }

        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-dim); font-size: 0.7rem; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Auto<span>Nation</span></div>
        <div class="nav-link active" onclick="nav('home')" id="n-home"><i class="fa-solid fa-house"></i> Home</div>
        <div class="nav-link" onclick="nav('showroom')" id="n-showroom"><i class="fa-solid fa-car"></i> Inventory</div>
        <div class="nav-link" onclick="nav('staff')" id="n-staff"><i class="fa-solid fa-file-invoice"></i> Sales</div>
        <div class="nav-link" onclick="nav('admin')" id="n-admin"><i class="fa-solid fa-terminal"></i> Terminal</div>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="hero">
                <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1547420329-638060f7d9cb?q=80&w=2070');">
                    <div class="slide-content"><h2>Limitless Speed.</h2></div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=2070');">
                    <div class="slide-content"><h2>Elite Performance.</h2></div>
                </div>
            </div>
            <div class="glass-card">
                <span class="section-label">Corporate Info</span>
                <p>Benvenuti in AutoNation Austin. Gestione asset premium e database veicoli in tempo reale.</p>
            </div>
        </div>

        <div id="showroom" class="page">
            <div class="inventory-container">
                <aside class="filter-sidebar">
                    <span class="section-label">Filtra Prezzo</span>
                    <input type="range" id="f-price" min="0" oninput="applyF()">
                    <div id="p-val" style="font-family:'JetBrains Mono'; color:var(--accent); margin-bottom:25px; font-weight:700;">$ 0</div>

                    <span class="section-label">Categorie</span>
                    <label style="display:block; margin-bottom:10px;"><input type="checkbox" class="t-check" value="Regular" checked onchange="applyF()"> Regular</label>
                    <label style="display:block; margin-bottom:10px;"><input type="checkbox" class="t-check" value="Prestige" checked onchange="applyF()"> Prestige</label>
                    <label style="display:block; margin-bottom:10px;"><input type="checkbox" class="t-check" value="Electric" checked onchange="applyF()"> Electric</label>
                </aside>
                <div id="fleet-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px;"></div>
            </div>
        </div>

        <div id="staff" class="page">
            <div id="s-auth" class="glass-card" style="max-width:400px; margin:auto; text-align:center;">
                <span class="section-label">Staff Only</span>
                <input id="s-pass" type="password" placeholder="PIN CODE">
                <button class="btn" onclick="authS()">Unlock</button>
            </div>
            <div id="s-main" class="hidden">
                <div class="glass-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <span class="section-label">New Sale</span>
                        <div id="next-p" style="color:var(--accent); font-family:'JetBrains Mono'; font-weight:800;">TEX-???</div>
                    </div>
                    <select id="v-sel" onchange="syncP()"></select>
                    <input id="v-price" placeholder="Price ($)">
                    <input id="v-buyer" placeholder="Customer Name">
                    <input id="v-sign" placeholder="Staff Signature">
                    <button class="btn" onclick="doSale()">Finalize Sale</button>
                </div>
            </div>
        </div>

        <div id="admin" class="page">
            <div id="a-auth" class="glass-card" style="max-width:400px; margin:auto; text-align:center;">
                <span class="section-label">Terminal Admin</span>
                <input id="a-key" type="password" placeholder="MASTER KEY">
                <button class="btn" onclick="authA()">Login</button>
            </div>
            <div id="a-main" class="hidden">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
                    <div class="glass-card">
                        <span class="section-label">Aggiungi Auto</span>
                        <input id="n-name" placeholder="Modello">
                        <input id="n-price" type="number" placeholder="Prezzo">
                        <select id="n-type"><option value="Regular">Regular</option><option value="Prestige">Prestige</option><option value="Electric">Electric</option></select>
                        <input type="file" id="n-img">
                        <button class="btn" onclick="addCar()">Upload Asset</button>
                    </div>
                    <div class="glass-card">
                        <span class="section-label">Gestione Prezzi</span>
                        <div style="max-height:300px; overflow-y:auto;">
                            <table>
                                <tbody id="edit-inventory-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            storageBucket: "autonation-bc786.firebasestorage.app",
            messagingSenderId: "440986575785",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let cachedImg = null, carStorage = {};

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        function authS() { if(document.getElementById('s-pass').value === "1234") { document.getElementById('s-auth').classList.add('hidden'); document.getElementById('s-main').classList.remove('hidden'); refreshP(); } }
        function authA() { if(document.getElementById('a-key').value === "OWNER123") { document.getElementById('a-auth').classList.add('hidden'); document.getElementById('a-main').classList.remove('hidden'); } }

        db.ref('cars').on('value', s => {
            carStorage = s.val() || {};
            applyF();
            const editBody = document.getElementById('edit-inventory-body'); editBody.innerHTML = "";
            for(let k in carStorage) {
                editBody.innerHTML += `<tr><td>${carStorage[k].name}</td><td><input type="number" id="ep-${k}" value="${carStorage[k].price}" style="width:80px; margin:0; padding:5px;"></td><td><button onclick="updatePrice('${k}')" style="background:green; color:white; border:none; padding:5px;">✓</button></td></tr>`;
            }
        });

        function applyF() {
            const max = document.getElementById('f-price').value;
            document.getElementById('p-val').innerText = `$ ${parseInt(max).toLocaleString()}`;
            const types = Array.from(document.querySelectorAll('.t-check:checked')).map(c => c.value);
            const g = document.getElementById('fleet-grid'), sel = document.getElementById('v-sel');
            g.innerHTML = ""; sel.innerHTML = "<option>Scegli Auto...</option>";
            for(let k in carStorage) {
                const c = carStorage[k];
                if(c.price <= max && types.includes(c.type)) {
                    g.innerHTML += `
                        <div class="car-card">
                            <img src="${c.image}" class="car-img">
                            <div class="car-info">
                                <div class="price-tag">$ ${c.price.toLocaleString()}</div>
                                <div style="font-weight:700">${c.name}</div>
                            </div>
                        </div>`;
                    sel.innerHTML += `<option value="${c.name}" data-p="${c.price}">${c.name}</option>`;
                }
            }
        }

        document.getElementById('n-img').onchange = e => { const r = new FileReader(); r.onload = ev => cachedImg = ev.target.result; r.readAsDataURL(e.target.files[0]); };
        function addCar() {
            const n = document.getElementById('n-name').value, p = document.getElementById('n-price').value, t = document.getElementById('n-type').value;
            if(n && p && cachedImg) db.ref('cars').push({ name:n, price:parseInt(p), type:t, image:cachedImg }).then(() => alert("Salvato"));
        }
        function updatePrice(k) { const p = document.getElementById('ep-'+k).value; db.ref('cars/'+k).update({ price: parseInt(p) }); }

        async function refreshP() {
            const s = await db.ref('sales_logs').limitToLast(1).once('value');
            const last = s.val() ? Object.values(s.val())[0].targa : "TEX-000";
            document.getElementById('next-p').innerText = "TEX-" + (parseInt(last.split('-')[1]) + 1).toString().padStart(3, '0');
        }
        function syncP() { const s = document.getElementById('v-sel'); document.getElementById('v-price').value = s.options[s.selectedIndex].dataset.p || ""; }
        function doSale() {
            const b = document.getElementById('v-buyer').value, v = document.getElementById('v-sel').value, p = document.getElementById('v-price').value, s = document.getElementById('v-sign').value;
            if(!b || v === "Scegli Auto...") return alert("Mancano dati");
            db.ref('sales_logs').push({ data:new Date().toLocaleDateString(), cliente:b, veicolo:v, targa:document.getElementById('next-p').innerText, prezzo:p, staff:s }).then(() => { alert("Venduta!"); refreshP(); });
        }

        db.ref('settings/max_budget').on('value', s => { const v = s.val() || 500000; const f = document.getElementById('f-price'); f.max = v; f.value = v; applyF(); });

        let sIdx = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[sIdx].classList.remove('active');
            sIdx = (sIdx + 1) % slides.length;
            slides[sIdx].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
