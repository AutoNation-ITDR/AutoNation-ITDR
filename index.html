<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION | CLOUD SYSTEM</title>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --red: #cc0000; --red-h: #ff3b3b; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { margin: 0; background: var(--bg); color: white; text-transform: uppercase; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: #000; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; margin: 0; }
        nav a { color: white; margin-left: 20px; text-decoration: none; font-weight: 700; cursor: pointer; font-size: 13px; }
        nav a:hover { color: var(--red-h); }

        .page { display: none; padding: 40px 20px; animation: fIn 0.4s; }
        .page.active { display: block; }
        @keyframes fIn { from {opacity:0} to {opacity:1} }

        .hero { text-align: center; padding: 100px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80') center/cover; border-radius: 0 0 30px 30px; }
        
        #car-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .car { background: var(--card); padding: 15px; width: 280px; border-radius: 12px; border: 1px solid #222; position: relative; }
        .car img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .car-info { font-size: 12px; color: #aaa; margin-bottom: 5px; }

        .panel-box { background: var(--card); padding: 25px; border-radius: 12px; max-width: 450px; margin: 0 auto 20px; border: 1px solid #333; }
        input, select { width: 100%; margin: 8px 0; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; }
        
        button, .btn { background: var(--red); border: none; padding: 12px 20px; color: white; font-weight: 700; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 10px; }
        button:hover { background: var(--red-h); transform: scale(1.02); }
        .btn-del { background: #333; font-size: 10px; margin-top: 5px; }

        .hidden { display: none; }
        footer { text-align: center; padding: 30px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">AUTONATION</h1>
    <nav>
        <a onclick="goPage('home')">HOME</a>
        <a onclick="goPage('auto')">AUTO</a>
        <a onclick="goPage('personale')">PERSONALE</a>
        <a onclick="goPage('owner')">OWNER</a>
    </nav>
</header>

<div id="home" class="page active">
    <section class="hero">
        <h1>AUTONATION SYSTEM</h1>
        <p>GESTIONALE CLOUD REAL-TIME</p>
        <button onclick="goPage('auto')" style="width:auto">VEDI SHOWROOM</button>
    </section>
</div>

<div id="auto" class="page">
    <h2 style="text-align:center">VEICOLI DISPONIBILI</h2>
    <div id="car-list">CARICAMENTO...</div>
</div>

<div id="personale" class="page">
    <h2 style="text-align:center">AREA OPERATIVA</h2>
    <div id="personal-login" class="panel-box">
        <input id="userIdInput" placeholder="USER ID">
        <input id="userPassInput" type="password" placeholder="PASSWORD">
        <button onclick="loginOperator()">ACCEDI</button>
    </div>
    <div id="personal-content" class="hidden">
        <div class="panel-box">
            <h3>CREA FATTURA</h3>
            <select id="selectAuto" onchange="autoSelezionata()"><option>CARICAMENTO...</option></select>
            <input id="fNome" placeholder="NOME CLIENTE">
            <input id="fTarga" placeholder="TARGA">
            <input id="fAuto" placeholder="MODELLO" readonly>
            <input id="fPrezzo" placeholder="PREZZO" readonly>
            <input id="fFirma" placeholder="TUA FIRMA">
            <button onclick="generaPDF()">SCARICA FATTURA</button>
        </div>
    </div>
</div>

<div id="owner" class="page">
    <h2 style="text-align:center">DASHBOARD PROPRIETARIO</h2>
    <div id="owner-login" class="panel-box">
        <input id="ownerPassInput" type="password" placeholder="PASSWORD OWNER (OWNER123)">
        <button onclick="loginOwner()">ACCEDI OWNER</button>
    </div>
    <div id="owner-content" class="hidden">
        <div class="panel-box">
            <h3>AGGIUNGI NUOVA AUTO</h3>
            <input id="name" placeholder="NOME MODELLO">
            <input id="price" placeholder="PREZZO (€)">
            
            <label style="font-size:10px">TYPE:</label>
            <select id="type">
                <option value="Regular">Regular</option>
                <option value="Prestige">Prestige</option>
                <option value="Electric">Electric</option>
                <option value="Classic">Classic</option>
            </select>

            <label style="font-size:10px">CLASS:</label>
            <select id="class">
                <option value="Car">Car</option>
                <option value="Truck">Truck</option>
                <option value="SUV">SUV</option>
                <option value="Industrial">Industrial</option>
            </select>

            <input type="file" id="imageFile" accept="image/*">
            <button onclick="addCar()">PUBBLICA NEL DATABASE</button>
        </div>

        <div class="panel-box">
            <h3>CONFIGURA OPERATORE</h3>
            <input id="setUserId" placeholder="NUOVO USER ID">
            <input id="setUserPass" placeholder="NUOVA PASSWORD">
            <button onclick="salvaCredenziali()">SALVA CREDENZIALI</button>
        </div>
    </div>
</div>

<footer>AUTONATION CLOUD © 2026</footer>

<script>
// CONFIGURAZIONE
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let cars = [];
let currentImg = null;

// SYNC AUTO
db.ref('cars').on('value', snap => {
    const data = snap.val();
    cars = [];
    const list = document.getElementById("car-list");
    const select = document.getElementById("selectAuto");
    list.innerHTML = "";
    select.innerHTML = `<option value="">SELEZIONA VEICOLO</option>`;

    if(data) {
        for(let id in data) {
            let c = { id, ...data[id] };
            cars.push(c);
            list.innerHTML += `
                <div class="car">
                    <img src="${c.image}">
                    <div class="car-info">${c.type} | ${c.class}</div>
                    <h3 style="margin:5px 0">${c.name}</h3>
                    <p style="color:var(--red); font-weight:bold; margin:0">${c.price}</p>
                    <button class="btn-del" onclick="deleteCar('${c.id}')">ELIMINA</button>
                </div>`;
            select.innerHTML += `<option value="${c.name}" data-price="${c.price}">${c.name}</option>`;
        }
    } else { list.innerHTML = "DATABASE VUOTO"; }
});

function goPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById(p).classList.add('active');
}

// IMMAGINE
document.getElementById('imageFile').onchange = e => {
    const r = new FileReader();
    r.onload = ev => currentImg = ev.target.result;
    r.readAsDataURL(e.target.files[0]);
};

// AZIONI OWNER
function addCar() {
    const n = document.getElementById('name').value;
    const p = document.getElementById('price').value;
    const t = document.getElementById('type').value;
    const c = document.getElementById('class').value;
    if(!n || !p || !currentImg) return alert("MANCANO DATI!");
    
    db.ref('cars').push({ name:n, price:p, type:t, class:c, image:currentImg })
    .then(() => { alert("AUTO AGGIUNTA!"); currentImg=null; document.getElementById('imageFile').value=""; });
}

function deleteCar(id) {
    if(confirm("ELIMINARE?")) db.ref('cars/'+id).remove();
}

function loginOwner() {
    if(document.getElementById('ownerPassInput').value === "OWNER123") {
        document.getElementById('owner-login').classList.add('hidden');
        document.getElementById('owner-content').classList.remove('hidden');
    } else alert("ERRORE");
}

function salvaCredenziali() {
    const u = document.getElementById('setUserId').value;
    const p = document.getElementById('setUserPass').value;
    db.ref('settings/op').set({ user:u, pass:p }).then(()=>alert("SALVATO"));
}

// AZIONI OPERATORE
function loginOperator() {
    const u = document.getElementById('userIdInput').value;
    const p = document.getElementById('userPassInput').value;
    db.ref('settings/op').once('value').then(s => {
        const c = s.val();
        // Default admin/1234 se il db è vuoto
        if((!c && u==="admin" && p==="1234") || (c && u===c.user && p===c.pass)) {
            document.getElementById('personal-login').classList.add('hidden');
            document.getElementById('personal-content').classList.remove('hidden');
        } else alert("NEGATO");
    });
}

function autoSelezionata() {
    const s = document.getElementById("selectAuto");
    document.getElementById("fAuto").value = s.value;
    document.getElementById("fPrezzo").value = s.options[s.selectedIndex].dataset.price || "";
}

function generaPDF() {
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF();
    const n = document.getElementById("fNome").value;
    if(!n) return alert("NOME CLIENTE MANCANTE");
    pdf.text("AUTONATION - FATTURA", 10, 20);
    pdf.text("CLIENTE: " + n, 10, 40);
    pdf.text("AUTO: " + document.getElementById("fAuto").value, 10, 50);
    pdf.text("PREZZO: " + document.getElementById("fPrezzo").value, 10, 60);
    pdf.text("FIRMA: " + document.getElementById("fFirma").value, 10, 80);
    pdf.save("Fattura_"+n+".pdf");
}
</script>
</body>
</html>
