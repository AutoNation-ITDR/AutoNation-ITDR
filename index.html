<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoNation Gestionale</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div id="login">

<h2>Login</h2>

<input id="username" placeholder="Utente">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="app">

<header>

<h1>AutoNation</h1>

<nav>

<button onclick="showPage('dashboard')">Dashboard</button> <button onclick="showPage('auto')">Auto</button> <button onclick="showPage('vendite')">Vendite</button>

</nav>

</header>

<section id="dashboard" class="page">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Auto disponibili</h3>
<p id="totAuto"></p>
</div>

<div class="card">
<h3>Vendite</h3>
<p id="totVendite"></p>
</div>

</div>

<canvas id="grafico"></canvas>

</section>

<section id="auto" class="page">

<h2>Aggiungi Auto</h2>

<input id="carName" placeholder="Modello">
<input id="carPrice" placeholder="Prezzo">
<input type="file" id="imgUpload">

<button onclick="addCar()">Aggiungi</button>

<div id="carList"></div>

</section>

<section id="firma">

<h2>Firma Cliente</h2>

<canvas id="signature"></canvas>

</section>

<section id="vendite" class="page">

<h2>Registro Vendite</h2>

<table>

<thead>
<tr>
<th>Targa</th>
<th>Cliente</th>
<th>Auto</th>
<th>Data</th>
</tr>
</thead>

<tbody id="sales"></tbody>

</table>

</section>

<script src="script.js"></script>

</body>

</html>
