<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Corporate Elite System</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --bg-dark: #0a0b0e;
            --surface: rgba(18, 20, 28, 0.95);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --radius: 20px;
            --glass: blur(15px) saturate(180%);
        }

        /* --- SMOKE ENGINE CSS --- */
        #smoke-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            transform: translateZ(0); /* Ottimizzazione GPU */
        }

        * { cursor: none !important; box-sizing: border-box; outline: none; }
        
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* SIDEBAR */
        nav { 
            width: 280px; 
            background: var(--surface); 
            backdrop-filter: var(--glass);
            border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            flex-direction: column; 
            padding: 40px 20px; 
            z-index: 100; 
        }

        .logo-box { margin-bottom: 50px; text-align: center; }
        .logo-box img { width: 100%; filter: drop-shadow(0 0 15px rgba(255,46,77,0.3)); }

        .nav-link { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: var(--text-dim); 
            text-decoration: none; 
            border-radius: 15px; 
            margin-bottom: 8px; 
            font-weight: 600; 
            transition: all 0.2s ease;
        }

        .nav-link i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(255,46,77,0.3); }

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at top right, #161822, #0a0b0e); position: relative; }
        .page { display: none; padding: 60px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD CARDS */
        .hero { background: linear-gradient(45deg, #12141c, #1a1c26); padding: 50px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 40px; }
        .hero h1 { font-family: 'Montserrat'; font-size: 3.5rem; margin: 0; font-weight: 900; }
        .hero p { color: var(--primary); letter-spacing: 4px; font-weight: 700; text-transform: uppercase; }

        /* SHOWROOM */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .price { font-size: 1.5rem; color: var(--primary); font-weight: 800; font-family: 'Montserrat'; }

        /* FORMS */
        .form-panel { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05); }
        input, select { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; font-family: 'Outfit';
        }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: 800; width: 100%; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.3s; 
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="smoke-canvas"></canvas>

    <nav>
        <div class="logo-box">
            <img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png" alt="Logo">
        </div>
        <a href="#" class="nav-link active" onclick="navTo('home')"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a href="#" class="nav-link" onclick="navTo('showroom')"><i class="fa-solid fa-car"></i> Showroom</a>
        <a href="#" class="nav-link" onclick="navTo('sales')"><i class="fa-solid fa-file-invoice"></i> Vendite</a>
        <a href="#" class="nav-link" onclick="navTo('admin')"><i class="fa-solid fa-shield-halved"></i> Admin</a>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="hero">
                <p>Austin, Texas - Elite Dealer</p>
                <h1>WELCOME TO THE<br><span style="color:var(--primary)">FUTURE.</span></h1>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="form-panel" style="text-align:center;">
                    <h2 id="total-cars">--</h2>
                    <p>Veicoli Disponibili</p>
                </div>
                <div class="form-panel" style="text-align:center;">
                    <h2 id="total-sales">--</h2>
                    <p>Contratti Chiusi</p>
                </div>
            </div>
        </div>

        <div id="showroom" class="page">
            <h1 style="font-family: 'Montserrat'; margin-bottom:40px;">FLEET INVENTORY</h1>
            <div id="fleet-grid" class="grid"></div>
        </div>

        <div id="sales" class="page">
            <div class="form-panel" style="max-width: 600px; margin: 0 auto;">
                <h2>Nuova Vendita</h2>
                <select id="sale-car"></select>
                <input type="text" id="sale-client" placeholder="Nome Completo Cliente">
                <input type="number" id="sale-price" placeholder="Prezzo Finale ($)">
                <input type="text" id="sale-staff" placeholder="Firma Agente">
                <button class="btn" onclick="processSale()">Genera Contratto PDF</button>
            </div>
        </div>

        <div id="admin" class="page">
            <div id="admin-login" class="form-panel" style="max-width: 400px; margin: 0 auto;">
                <h2>Area Riservata</h2>
                <input type="password" id="admin-pass" placeholder="Master Password">
                <button class="btn" onclick="checkAdmin()">Accedi</button>
            </div>
            <div id="admin-panel" class="hidden">
                <div class="form-panel">
                    <h2>Aggiungi Veicolo</h2>
                    <input type="text" id="car-name" placeholder="Modello Auto">
                    <input type="number" id="car-price" placeholder="Prezzo Listino ($)">
                    <input type="file" id="car-file" accept="image/*">
                    <button class="btn" onclick="uploadCar()">Salva nel Database</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURAZIONE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- SMOKE ENGINE (OTTIMIZZATO) ---
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let hue = 0;
        const mouse = { x: -100, y: -100 };

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            for(let i=0; i<3; i++) particles.push(new Particle());
        });

        class Particle {
            constructor() {
                this.x = mouse.x; this.y = mouse.y;
                this.size = Math.random() * 6 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * -1.5 - 0.5;
                this.color = `hsla(${hue}, 100%, 50%, 0.8)`;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                this.opacity -= 0.02;
                if(this.size > 0.1) this.size += 0.05;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            hue += 2;
            requestAnimationFrame(animate);
        }
        animate();

        // --- LOGICA APPLICATIVA ---
        let carData = {};

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === "OWNER123") {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }

        // Caricamento Immagine
        let tempImg = null;
        document.getElementById('car-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => tempImg = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        function uploadCar() {
            const name = document.getElementById('car-name').value;
            const price = document.getElementById('car-price').value;
            if(name && price && tempImg) {
                db.ref('cars').push({ name, price, img: tempImg }).then(() => location.reload());
            }
        }

        // Sync Database
        db.ref('cars').on('value', snap => {
            carData = snap.val() || {};
            const grid = document.getElementById('fleet-grid');
            const select = document.getElementById('sale-car');
            grid.innerHTML = ""; select.innerHTML = "<option>Seleziona Auto...</option>";
            
            let count = 0;
            for(let key in carData) {
                const c = carData[key];
                grid.innerHTML += `<div class="card"><img src="${c.img}" class="card-img"><div class="card-content"><h3>${c.name}</h3><div class="price">$ ${parseInt(c.price).toLocaleString()}</div></div></div>`;
                select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                count++;
            }
            document.getElementById('total-cars').innerText = count;
        });

        db.ref('sales_logs').on('value', snap => {
            document.getElementById('total-sales').innerText = snap.numChildren();
        });

        async function processSale() {
            const client = document.getElementById('sale-client').value;
            const car = document.getElementById('sale-car').value;
            const price = document.getElementById('sale-price').value;
            const staff = document.getElementById('sale-staff').value;

            if(!client || !car || !price) return alert("Dati mancanti!");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("AUTONATION AUSTIN", 20, 20);
            doc.setFontSize(14); doc.text("CONTRATTO DI VENDITA", 20, 40);
            doc.setFontSize(12);
            doc.text(`Cliente: ${client}`, 20, 60);
            doc.text(`Veicolo: ${car}`, 20, 70);
            doc.text(`Prezzo: $ ${parseInt(price).toLocaleString()}`, 20, 80);
            doc.text(`Agente: ${staff}`, 20, 150);
            
            db.ref('sales_logs').push({ client, car, price, staff, date: new Date().toISOString() });
            doc.save(`Contratto_${client}.pdf`);
            alert("Contratto Generato!");
        }
    </script>
</body>
</html>
