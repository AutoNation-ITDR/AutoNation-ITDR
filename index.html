<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Elite Management v6.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --primary-dark: #c21d36;
            --bg: #030405;
            --surface: #0d0f14;
            --surface-bright: #1a1c26;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --accent-glow: 0 0 30px rgba(255, 46, 77, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        nav { width: 300px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 40px 25px; z-index: 100; }
        .logo-container { margin-bottom: 50px; text-align: center; }
        .logo-container img { width: 90%; filter: drop-shadow(var(--accent-glow)); }
        
        .nav-link { 
            display: flex; align-items: center; padding: 18px 22px; color: var(--text-dim); 
            text-decoration: none; border-radius: 18px; margin-bottom: 12px; font-weight: 700; 
            transition: var(--transition); cursor: pointer; border: none; background: none; 
            width: 100%; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-link i { margin-right: 18px; font-size: 1.2rem; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: var(--accent-glow); transform: translateX(5px); }

        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #12141d 0%, #030405 100%); position: relative; }
        .page { display: none; padding: 60px; max-width: 1400px; margin: 0 auto; animation: slideUp 0.6s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .panel { background: var(--surface); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        
        .btn-prime { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: var(--transition); }
        .btn-prime:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-accept { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 15px; font-family: 'Outfit'; }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }

        .secure-gate { max-width: 450px; margin: 100px auto; text-align: center; background: var(--surface); padding: 60px; border-radius: 40px; border: 1px solid var(--primary); }
        .hidden { display: none !important; }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; color: var(--primary); font-size: 0.7rem; border-bottom: 1px solid #222; }
        td { padding: 15px; border-bottom: 1px solid #111; font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png">
        </div>
        <button class="nav-link active" onclick="navTo('home')"><i class="fa-solid fa-house"></i> Home</button>
        <button class="nav-link" onclick="navTo('showroom')"><i class="fa-solid fa-car"></i> Showroom</button>
        <button class="nav-link" onclick="navTo('booking')"><i class="fa-solid fa-calendar-alt"></i> Appuntamenti</button>
        <button class="nav-link" onclick="navTo('sales')"><i class="fa-solid fa-file-invoice"></i> Fatture</button>
        <button class="nav-link" onclick="navTo('owners')"><i class="fa-solid fa-crown"></i> Owners</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="panel">
                <h1 style="font-family:'Montserrat'; font-size: 3rem;">AUSTIN ELITE<br><span style="color:var(--primary)">DASHBOARD</span></h1>
            </div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div class="panel" style="text-align:center;"><h2 id="st-cars" style="color:var(--primary)">0</h2><p>AUTO</p></div>
                <div class="panel" style="text-align:center;"><h2 id="st-sales" style="color:var(--primary)">0</h2><p>VENDITE</p></div>
                <div class="panel" style="text-align:center;"><h2 id="st-app" style="color:var(--primary)">0</h2><p>PENDING</p></div>
            </div>
        </div>

        <div id="showroom" class="page">
            <div id="fleet-grid" class="car-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;"></div>
        </div>

        <div id="booking" class="page">
            <div class="panel" style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align:center; margin-bottom:20px;">RICHIEDI APPUNTAMENTO</h2>
                <label>Nome</label><input type="text" id="book-name">
                <label>Data</label><input type="date" id="book-date">
                <label>Ora</label><input type="time" id="book-time">
                <label>Motivo</label>
                <select id="book-reason">
                    <option value="Acquisto Veicolo">Acquisto Veicolo</option>
                    <option value="Test Drive">Test Drive</option>
                    <option value="Riparazione">Riparazione/Tuning</option>
                </select>
                <button class="btn-prime" onclick="sendBooking()">Invia Richiesta</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="secure-gate">
                <input type="password" id="pw-sales" placeholder="Staff PIN">
                <button class="btn-prime" onclick="verify('sales')">Sblocca</button>
            </div>
            <div id="sales-content" class="hidden">
                 <div class="panel" style="max-width:500px; margin:0 auto;">
                    <label>Auto</label><select id="inv-car"></select>
                    <label>Cliente</label><input type="text" id="inv-name">
                    <button class="btn-prime" onclick="makeInvoice()">Crea Contratto</button>
                 </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="secure-gate">
                <input type="password" id="pw-owners" placeholder="Owner Key">
                <button class="btn-prime" onclick="verify('owners')">Entra</button>
            </div>
            <div id="owners-content" class="hidden">
                <div class="panel">
                    <h3>Appuntamenti in Attesa</h3>
                    <table>
                        <thead><tr><th>CLIENTE</th><th>DATA / ORA</th><th>MOTIVO</th><th>AZIONI</th></tr></thead>
                        <tbody id="app-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function verify(type) {
            const keys = { sales: "1234", owners: "OWNER2026" };
            if(document.getElementById('pw-'+type).value === keys[type]) {
                document.getElementById(type+'-gate').classList.add('hidden');
                document.getElementById(type+'-content').classList.remove('hidden');
            }
        }

        function sendBooking() {
            const data = {
                name: document.getElementById('book-name').value,
                date: document.getElementById('book-date').value,
                time: document.getElementById('book-time').value,
                reason: document.getElementById('book-reason').value
            };
            if(data.name && data.date) {
                db.ref('appointments').push(data).then(() => {
                    alert("Richiesta Inviata!");
                    location.reload();
                });
            }
        }

        // --- ACCETTAZIONE E INVIO DISCORD ---
        async function acceptAppointment(key, data) {
            const embed = {
                username: "AutoNation Austin | Elite Management",
                avatar_url: "https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png",
                embeds: [{
                    title: "✅ APPUNTAMENTO CONFERMATO",
                    description: `L'ufficio vendite ha accettato una nuova richiesta di incontro.`,
                    color: 16723533, // Rosso Austin
                    fields: [
                        { name: "👤 CLIENTE", value: `**${data.name}**`, inline: true },
                        { name: "📅 DATA & ORA", value: `**${data.date}** alle **${data.time}**`, inline: true },
                        { name: "🎯 SCOPO", value: `\`${data.reason}\``, inline: false },
                        { name: "📍 LOCATION", value: "Showroom AutoNation Austin", inline: true }
                    ],
                    footer: { text: "AutoNation Austin Luxury Motors • Sistema Automatizzato" },
                    timestamp: new Date()
                }]
            };

            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                });
                // Rimuovi dal DB dopo l'accettazione
                db.ref('appointments/' + key).remove();
                alert("Appuntamento Accettato e inviato su Discord!");
            } catch (err) {
                console.error(err);
                alert("Errore nell'invio a Discord.");
            }
        }

        // --- REALTIME SYNC ---
        db.ref('appointments').on('value', s => {
            const data = s.val() || {};
            const tb = document.getElementById('app-tbody'); tb.innerHTML = "";
            let count = 0;
            for(let k in data) {
                count++;
                tb.innerHTML += `<tr>
                    <td><strong>${data[k].name}</strong></td>
                    <td>${data[k].date} | ${data[k].time}</td>
                    <td>${data[k].reason}</td>
                    <td>
                        <button class="btn-accept" onclick='acceptAppointment("${k}", ${JSON.stringify(data[k])})'>ACCETTA</button>
                    </td>
                </tr>`;
            }
            document.getElementById('st-app').innerText = count;
        });

        // Altri sync (Stock/Sales)
        db.ref('cars').on('value', s => {
            document.getElementById('st-cars').innerText = Object.keys(s.val() || {}).length;
        });
        db.ref('sales_logs').on('value', s => {
            document.getElementById('st-sales').innerText = Object.keys(s.val() || {}).length;
        });

    </script>
</body>
</html>
