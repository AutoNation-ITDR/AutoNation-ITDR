<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION | Owner Reserved System</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --neon: #ff0000; --bg: #000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 4px; font-weight: 900; }
        .logo span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        nav a { color: #fff; margin-left: 25px; text-decoration: none; font-size: 11px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; cursor: pointer; opacity: 0.6; transition: 0.4s; }
        nav a:hover { opacity: 1; color: var(--neon); }
        .page { display: none; padding-top: 100px; animation: fadeInUp 0.6s ease forwards; min-height: 100vh; }
        .active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 40px 5%; }
        .car-card { background: var(--glass); border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .targa-tag { position: absolute; top: 10px; right: 10px; background: #fff; color: #000; padding: 2px 8px; font-weight: 800; font-size: 12px; font-family: 'Orbitron'; border-radius: 3px; }
        .car-card img { width: 100%; height: 220px; object-fit: cover; }
        .car-info { padding: 20px; }
        .car-price { color: var(--neon); font-weight: 800; font-size: 22px; }
        .glass-box { max-width: 600px; margin: 40px auto; background: var(--glass); padding: 40px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; background: #080808; border: 1px solid #222; color: #fff; }
        .btn-action { padding: 18px 45px; background: transparent; color: #fff; border: 1px solid var(--neon); font-family: 'Orbitron'; cursor: pointer; box-shadow: 0 0 15px var(--neon); transition: 0.3s; width: 100%; }
        .btn-action:hover { background: var(--neon); color: #000; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        .log-table th, .log-table td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        .log-table th { background: rgba(255,0,0,0.1); color: var(--neon); }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO<span>NATION</span></div>
    <nav>
        <a onclick="goPage('home')">Overview</a>
        <a onclick="goPage('auto')">Inventory</a>
        <a onclick="goPage('personale')">Personale AutoNation</a>
        <a onclick="goPage('owner')">Owner Reserved</a>
    </nav>
</header>

<div id="home" class="page active">
    <div style="text-align:center; padding: 100px 10%;">
        <h1 style="font-family:'Orbitron'; font-size: 80px; margin:0;">AUSTIN CORE</h1>
        <p style="letter-spacing:15px; color:var(--neon);">THE NEW STANDARD</p>
    </div>
</div>

<div id="auto" class="page">
    <h2 style="text-align:center; font-family:'Orbitron';">OFFICIAL <span style="color:var(--neon)">INVENTORY</span></h2>
    <div id="car-list" class="grid"></div>
</div>

<div id="personale" class="page">
    <div id="personal-login" class="glass-box">
        <h3 style="text-align:center;">STAFF LOGIN</h3>
        <input id="userIdInput" placeholder="OPERATOR ID">
        <input id="userPassInput" type="password" placeholder="PASSWORD">
        <button class="btn-action" onclick="loginOperator()">Sblocca</button>
    </div>
    <div id="personal-content" class="hidden">
        <div class="glass-box">
            <h3>GENERATORE FATTURE</h3>
            <select id="selectAuto" onchange="autoSelezionata()"></select>
            <input id="fNome" placeholder="NOME CLIENTE">
            <input id="fTarga" placeholder="TARGA (Auto-generata)" readonly style="background:#111; color:var(--neon);">
            <input id="fAuto" placeholder="MODELLO" readonly>
            <input id="fPrezzo" placeholder="PREZZO" readonly>
            <input id="fFirma" placeholder="FIRMA OPERATORE">
            <button class="btn-action" onclick="generaPDF()">EMETTI FATTURA</button>
        </div>
    </div>
</div>

<div id="owner" class="page">
    <div id="owner-login" class="glass-box">
        <h3 style="text-align:center; color:var(--neon);">OWNER RESERVED ACCESS</h3>
        <input id="ownerPassInput" type="password" placeholder="MASTER KEY">
        <button class="btn-action" onclick="loginOwner()">Accesso Core</button>
    </div>
    <div id="owner-content" class="hidden">
        <div class="glass-box">
            <h3>REGISTRAZIONE NUOVO VEICOLO</h3>
            <input id="name" placeholder="NOME MODELLO">
            <input id="price" placeholder="PREZZO DI VENDITA">
            <input type="file" id="imageFile">
            <button class="btn-action" onclick="addCar()">REGISTRA E ASSEGNA TARGA</button>
        </div>
        <div class="glass-box" style="max-width: 90%;">
            <h3>LOGS REGISTRAZIONI AUTO</h3>
            <table class="log-table">
                <thead><tr><th>DATA</th><th>MODELLO</th><th>TARGA ASSEGNATA</th><th>PREZZO</th><th>AZIONI</th></tr></thead>
                <tbody id="owner-logs"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentImg = null;

// GESTIONE TARGHE TEX-XXX
async function generaNuovaTarga() {
    const snap = await db.ref('cars').limitToLast(1).once('value');
    const data = snap.val();
    if (!data) return "TEX-001";
    const lastKey = Object.keys(data)[0];
    const lastTarga = data[lastKey].targa;
    const currentNum = parseInt(lastTarga.split('-')[1]);
    return "TEX-" + (currentNum + 1).toString().padStart(3, '0');
}

db.ref('cars').on('value', snap => {
    const data = snap.val();
    const publicList = document.getElementById("car-list");
    const logs = document.getElementById("owner-logs");
    const select = document.getElementById("selectAuto");
    publicList.innerHTML = ""; logs.innerHTML = "";
    select.innerHTML = `<option value="">Scegli Veicolo...</option>`;
    if(data) {
        for(let id in data) {
            let c = { id, ...data[id] };
            publicList.innerHTML += `<div class="car-card"><div class="targa-tag">${c.targa}</div><img src="${c.image}"><div class="car-info"><h3>${c.name}</h3><div class="car-price">${c.price}</div></div></div>`;
            logs.innerHTML += `<tr><td>${c.dataReg}</td><td>${c.name}</td><td style="color:var(--neon); font-weight:bold;">${c.targa}</td><td>${c.price}</td><td><button onclick="deleteCar('${c.id}')" style="background:red; color:white; border:none; padding:5px; cursor:pointer;">X</button></td></tr>`;
            select.innerHTML += `<option value="${c.name}" data-price="${c.price}" data-targa="${c.targa}">${c.name} (${c.targa})</option>`;
        }
    }
});

function goPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById(p).classList.add('active');
}

document.getElementById('imageFile').onchange = e => {
    const r = new FileReader();
    r.onload = ev => currentImg = ev.target.result;
    r.readAsDataURL(e.target.files[0]);
};

async function addCar() {
    const n = document.getElementById('name').value;
    const p = document.getElementById('price').value;
    if(!n || !p || !currentImg) return alert("Errore: Compila tutto!");
    const nuovaTarga = await generaNuovaTarga();
    const dataOggi = new Date().toLocaleDateString('it-IT');
    db.ref('cars').push({ name:n, price:p, image:currentImg, targa:nuovaTarga, dataReg:dataOggi }).then(() => alert("Veicolo Registrato con Targa: " + nuovaTarga));
}

function deleteCar(id) { if(confirm("Eliminare log e veicolo?")) db.ref('cars/'+id).remove(); }

function loginOwner() { if(document.getElementById('ownerPassInput').value === "OWNER123") { document.getElementById('owner-login').classList.add('hidden'); document.getElementById('owner-content').classList.remove('hidden'); } }
function loginOperator() { if(document.getElementById('userIdInput').value === "admin" && document.getElementById('userPassInput').value === "1234") { document.getElementById('personal-login').classList.add('hidden'); document.getElementById('personal-content').classList.remove('hidden'); } }

function autoSelezionata() {
    const s = document.getElementById("selectAuto");
    document.getElementById("fAuto").value = s.value;
    document.getElementById("fPrezzo").value = s.options[s.selectedIndex].dataset.price || "";
    document.getElementById("fTarga").value = s.options[s.selectedIndex].dataset.targa || "";
}

function generaPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    const dataOggi = new Date().toLocaleDateString('it-IT');
    pdf.setLineWidth(0.5); pdf.line(10, 35, 200, 35); pdf.line(10, 37, 200, 37);
    pdf.setFont("helvetica", "bold"); pdf.setFontSize(10); pdf.text("STATO DI TEXAS - CONTEA DI TRAVIS", 105, 20, { align: "center" });
    pdf.setFontSize(18); pdf.text("FATTURA DI VENDITA UFFICIALE", 105, 28, { align: "center" });
    pdf.setFontSize(11); pdf.text("PREMESSO CHE", 10, 55);
    pdf.setFont("helvetica", "italic"); pdf.setFontSize(9);
    const premessa = "AutoNation, uno dei principali concessionari automobilistici di Austin, Texas, emette la presente fattura a conferma dell’avvenuta vendita e/o dei servizi erogati al cliente. Tutti i veicoli e gli interventi forniti rispettano gli standard di qualità e trasparenza che contraddistinguono il nostro marchio.";
    pdf.text(pdf.splitTextToSize(premessa, 180), 10, 62);
    pdf.setFont("helvetica", "bold"); pdf.setFontSize(11); pdf.text("DATI TRANSAZIONE", 10, 90);
    pdf.setFont("helvetica", "normal"); pdf.setFontSize(10);
    pdf.text("CLIENTE: " + document.getElementById("fNome").value.toUpperCase(), 15, 100);
    pdf.text("MODELLO: " + document.getElementById("fAuto").value.toUpperCase(), 15, 108);
    pdf.text("TARGA ASSEGNATA: " + document.getElementById("fTarga").value, 15, 116);
    pdf.text("PREZZO: " + document.getElementById("fPrezzo").value, 15, 124);
    pdf.setFont("helvetica", "bold"); pdf.text("FIRMA RESPONSABILE: " + document.getElementById("fFirma").value.toUpperCase(), 10, 160);
    pdf.save("Fattura_" + document.getElementById("fTarga").value + ".pdf");
}
</script>
</body>
</html>
