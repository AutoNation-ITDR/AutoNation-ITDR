<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION | Austin TX</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --neon: #ff0000; --bg: #000; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; background: #000; border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; }
        .logo span { color: var(--neon); }
        
        nav a { color: #fff; margin-left: 20px; text-decoration: none; font-size: 12px; text-transform: uppercase; cursor: pointer; }

        .page { display: none; padding: 50px 5%; }
        .active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .car-card { background: var(--glass); border: 1px solid var(--border); padding: 15px; position: relative; }
        .targa-badge { position: absolute; top: 10px; right: 10px; background: #fff; color: #000; padding: 2px 5px; font-weight: 800; font-size: 10px; font-family: 'Orbitron'; }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }

        .glass-box { max-width: 600px; margin: 0 auto; background: var(--glass); padding: 30px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: #fff; }
        
        .btn { background: var(--neon); color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-family: 'Orbitron'; width: 100%; }
        
        .log-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        .log-table th, .log-table td { border: 1px solid var(--border); padding: 8px; text-align: left; }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO<span>NATION</span></div>
    <nav>
        <a onclick="goPage('home')">Home</a>
        <a onclick="goPage('auto')">Auto</a>
        <a onclick="goPage('personale')">Personale AutoNation</a>
        <a onclick="goPage('owner')">Owner Reserved</a>
    </nav>
</header>

<div id="home" class="page active">
    <div style="text-align:center; padding: 100px 0;">
        <h1 style="font-family:'Orbitron'; font-size: 60px;">BENVENUTO</h1>
        <p>AUTONATION AUSTIN, TEXAS</p>
    </div>
</div>

<div id="auto" class="page">
    <h2 style="font-family:'Orbitron';">INVENTARIO</h2>
    <div id="car-list" class="grid"></div>
</div>

<div id="personale" class="page">
    <div id="personal-login" class="glass-box">
        <h3>ACCESSO PERSONALE</h3>
        <input id="uP" placeholder="ID">
        <input id="pP" type="password" placeholder="PASSWORD">
        <button class="btn" onclick="loginP()">ACCEDI</button>
    </div>
    <div id="personal-content" style="display:none;" class="glass-box">
        <h3>FATTURAZIONE</h3>
        <select id="selA" onchange="updateF()"></select>
        <input id="fN" placeholder="NOME CLIENTE">
        <input id="fT" placeholder="TARGA" readonly>
        <input id="fM" placeholder="MODELLO" readonly>
        <input id="fPr" placeholder="PREZZO" readonly>
        <input id="fF" placeholder="FIRMA OPERATORE">
        <button class="btn" onclick="generaPDF()">GENERA FATTURA</button>
    </div>
</div>

<div id="owner" class="page">
    <div id="owner-login" class="glass-box">
        <h3>OWNER RESERVED</h3>
        <input id="oP" type="password" placeholder="MASTER PASSWORD">
        <button class="btn" onclick="loginO()">ACCEDI</button>
    </div>
    <div id="owner-content" style="display:none;">
        <div class="glass-box">
            <h3>REGISTRA AUTO</h3>
            <input id="name" placeholder="MODELLO">
            <input id="price" placeholder="PREZZO">
            <input type="file" id="imgF">
            <button class="btn" onclick="addCar()">REGISTRA E ASSEGNA TARGA</button>
        </div>
        <div class="glass-box" style="max-width:95%; margin-top:20px;">
            <h3>LOGS REGISTRAZIONI</h3>
            <table class="log-table">
                <thead><tr><th>DATA</th><th>MODELLO</th><th>TARGA</th><th>PREZZO</th><th>ELIMINA</th></tr></thead>
                <tbody id="logs"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentImg = null;

async function generaTarga() {
    const snap = await db.ref('cars').limitToLast(1).once('value');
    const data = snap.val();
    if (!data) return "TEX-001";
    const lastKey = Object.keys(data)[0];
    const lastTarga = data[lastKey].targa;
    const num = parseInt(lastTarga.split('-')[1]);
    return "TEX-" + (num + 1).toString().padStart(3, '0');
}

db.ref('cars').on('value', snap => {
    const data = snap.val();
    const pL = document.getElementById("car-list");
    const logs = document.getElementById("logs");
    const sel = document.getElementById("selA");
    pL.innerHTML = ""; logs.innerHTML = ""; sel.innerHTML = `<option value="">Scegli...</option>`;
    if(data) {
        for(let id in data) {
            let c = { id, ...data[id] };
            pL.innerHTML += `<div class="car-card"><div class="targa-badge">${c.targa}</div><img src="${c.image}"><h3>${c.name}</h3><p>${c.price}</p></div>`;
            logs.innerHTML += `<tr><td>${c.dataReg}</td><td>${c.name}</td><td>${c.targa}</td><td>${c.price}</td><td><button onclick="del('${c.id}')">X</button></td></tr>`;
            sel.innerHTML += `<option value="${c.name}" data-p="${c.price}" data-t="${c.targa}">${c.name}</option>`;
        }
    }
});

function goPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById(p).classList.add('active');
}

document.getElementById('imgF').onchange = e => {
    const r = new FileReader();
    r.onload = ev => currentImg = ev.target.result;
    r.readAsDataURL(e.target.files[0]);
};

async function addCar() {
    const n = document.getElementById('name').value;
    const p = document.getElementById('price').value;
    if(!n || !p || !currentImg) return alert("Dati mancanti");
    const t = await generaTarga();
    const d = new Date().toLocaleDateString('it-IT');
    db.ref('cars').push({ name:n, price:p, image:currentImg, targa:t, dataReg:d }).then(() => alert("Registrata: " + t));
}

function del(id) { if(confirm("Eliminare?")) db.ref('cars/'+id).remove(); }
function loginO() { if(document.getElementById('oP').value === "OWNER123") { document.getElementById('owner-login').style.display='none'; document.getElementById('owner-content').style.display='block'; } }
function loginP() { if(document.getElementById('uP').value === "admin" && document.getElementById('pP').value === "1234") { document.getElementById('personal-login').style.display='none'; document.getElementById('personal-content').style.display='block'; } }

function updateF() {
    const s = document.getElementById("selA");
    document.getElementById("fM").value = s.value;
    document.getElementById("fPr").value = s.options[s.selectedIndex].dataset.p || "";
    document.getElementById("fT").value = s.options[s.selectedIndex].dataset.t || "";
}

function generaPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.setFontSize(10); pdf.text("STATO DI TEXAS - CONTEA DI TRAVIS", 105, 20, { align: "center" });
    pdf.setFontSize(18); pdf.text("FATTURA DI VENDITA", 105, 28, { align: "center" });
    const p = "AutoNation, uno dei principali concessionari automobilistici di Austin, Texas, emette la presente fattura a conferma dell’avvenuta vendita e/o dei servizi erogati al cliente. Tutti i veicoli e gli interventi forniti rispettano gli standard di qualità e trasparenza che contraddistinguono il nostro marchio. I dati riportati di seguito rappresentano in modo accurato e dettagliato l’operazione effettuata, nel pieno rispetto delle normative vigenti e delle politiche interne di AutoNation.";
    pdf.setFontSize(9); pdf.text(pdf.splitTextToSize(p, 180), 10, 45);
    pdf.text("CLIENTE: " + document.getElementById("fN").value, 10, 80);
    pdf.text("MODELLO: " + document.getElementById("fM").value, 10, 90);
    pdf.text("TARGA: " + document.getElementById("fT").value, 10, 100);
    pdf.text("PREZZO: " + document.getElementById("fPr").value, 10, 110);
    pdf.text("FIRMA: " + document.getElementById("fF").value, 10, 150);
    pdf.save("Fattura.pdf");
}
</script>
</body>
</html>
