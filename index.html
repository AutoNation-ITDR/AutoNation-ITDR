<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoNation | FiveM Dealership</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" class="logo">
    <nav>
        <a href="#">Home</a>
        <a href="#cars">Auto</a>
        <a href="#admin">Admin</a>
    </nav>
</header>

<section class="hero">
    <h1>AutoNation</h1>
    <p>Concessionario Ufficiale FiveM</p>
    <button onclick="scrollToCars()">Guarda le Auto</button>
</section>

<section id="cars">
    <h2>Veicoli Disponibili</h2>
    <div id="car-list"></div>
</section>

<!-- ADMIN PANEL -->
<section id="admin">
    <h2>Pannello Admin</h2>

    <input type="text" id="name" placeholder="Nome auto">
    <input type="text" id="price" placeholder="Prezzo">
    <input type="text" id="image" placeholder="Link immagine">

    <button onclick="addCar()">Aggiungi Auto</button>
</section>

<footer>
    <p>© 2026 AutoNation RP</p>
</footer>

<script src="script.js"></script>
</body>
</html>
