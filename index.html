<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION TEXAS | HUB UFFICIALE</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --p: #ff2e4d; --bg: #000; --s: #0a0a0a; --b: #1a1a1a; --t: #fff; --grad: linear-gradient(135deg, var(--p), #991b2d); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--t); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        nav { width: 280px; background: var(--s); border-right: 1px solid var(--b); display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; flex-shrink: 0; }
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo-box img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--p); object-fit: cover; }

        .nav-link { background: rgba(255,255,255,0.02); border: 1px solid transparent; color: #888; padding: 16px 20px; border-radius: 12px; margin-bottom: 8px; font-family: 'Orbitron'; font-size: 0.8rem; text-align: left; cursor: pointer; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-link.active { color: #fff; background: var(--grad); border-color: var(--p); box-shadow: 0 10px 20px rgba(255, 46, 77, 0.2); }

        main { flex: 1; overflow-y: auto; background: #050505; position: relative; }
        .page { display: none; padding: 60px; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }

        .glass-panel { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; border-radius: 24px; max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--p); font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 8px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 12px; font-family: 'Outfit'; }

        .btn-action { width: 100%; padding: 20px; background: var(--grad); color: #fff; border: none; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <img src="https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png">
        </div>
        <div class="nav-group">
            <button class="nav-link active" onclick="navTo('home', this)"><i class="fa-solid fa-house"></i> Home</button>
            <button class="nav-link" onclick="navTo('showroom', this)"><i class="fa-solid fa-car"></i> Showroom</button>
            <button class="nav-link" onclick="navTo('booking', this)"><i class="fa-solid fa-calendar-alt"></i> Appuntamenti</button>
            <button class="nav-link" onclick="navTo('sales', this)"><i class="fa-solid fa-file-contract"></i> Terminale Vendite</button>
            <button class="nav-link" onclick="navTo('owners', this)"><i class="fa-solid fa-shield"></i> Pannello Owner</button>
        </div>
    </nav>

    <main>
        <div id="home" class="page active" style="text-align:center; padding-top: 150px;">
            <h1 style="font-family:'Orbitron'; font-size: 4rem;">AUTO<span>NATION</span> TEXAS</h1>
            <p style="letter-spacing: 8px; color: #555;">AUSTIN LUXURY MOTORS - CORPORATE HUB</p>
        </div>

        <div id="showroom" class="page">
            <h2 style="font-family:'Orbitron'; margin-bottom:30px;">VEICOLI DISPONIBILI</h2>
            <div id="showroom-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:25px;"></div>
        </div>

        <div id="booking" class="page">
            <div class="glass-panel">
                <h2 style="font-family:'Orbitron'; text-align:center; margin-bottom:20px;">RICHIESTA APPUNTAMENTO</h2>
                <input type="text" id="b-name" placeholder="Nome e Cognome IC" style="margin-bottom:15px;">
                <input type="text" id="b-discord" placeholder="ID Discord (Ping)" style="margin-bottom:15px;">
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="date" id="b-date" style="flex:1;">
                    <input type="time" id="b-time" style="flex:1;">
                </div>
                <textarea id="b-notes" rows="3" placeholder="Note per lo Staff"></textarea>
                <button class="btn-action" style="margin-top:20px;" onclick="sendInquiry()">Invia Richiesta</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-auth" class="glass-panel" style="text-align:center;">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px;">ACCESSO AGENTI</h2>
                <input type="password" id="sales-pw" placeholder="PIN" style="text-align:center; margin-bottom:20px;">
                <button class="btn-action" onclick="login('sales')">Sblocca</button>
            </div>
            <div id="sales-panel" class="hidden">
                <div class="glass-panel">
                    <h2 style="font-family:'Orbitron'; margin-bottom:30px; text-align:center; color:var(--p);">SALES CONTRACT</h2>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div class="form-group"><label>Protocollo</label><input id="s-prot" value="TEX-001" readonly></div>
                        <div class="form-group"><label>Cliente</label><input id="s-client" placeholder="NOME CLIENTE"></div>
                        <div class="form-group"><label>Veicolo</label><select id="s-car"></select></div>
                        <div class="form-group"><label>Prezzo ($)</label><input id="s-price" placeholder="1000"></div>
                        <div class="form-group"><label>Firma Agente</label><input id="s-agent" placeholder="SIGLA AGENTE"></div>
                        <div class="form-group"><label>Data</label><input id="s-date" type="date"></div>
                    </div>
                    <button class="btn-action" style="margin-top:20px;" onclick="generateSale()">Finalizza & Firma Contratto</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owner-auth" class="glass-panel" style="text-align:center;">
                <h2 style="font-family:'Orbitron';">OWNER ACCESS</h2>
                <input type="password" id="owner-pw" style="margin:20px 0; text-align:center;">
                <button class="btn-action" onclick="login('owner')">Entra</button>
            </div>
            <div id="owner-panel" class="hidden">
                <div class="glass-panel">
                    <h3>GESTIONE STOCK</h3>
                    <input id="add-n" placeholder="Modello" style="margin-top:10px;">
                    <input id="add-p" placeholder="Prezzo" style="margin-top:10px;">
                    <input type="file" id="add-i" style="margin-top:10px;">
                    <button class="btn-action" style="margin-top:20px;" onclick="upload()">Carica Auto</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const WEBHOOK_BOOKING = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";
        const WEBHOOK_SALES = "https://discord.com/api/webhooks/1487566509982355487/dekKyZ-WeiUCUvTpeacX6YSBRssl3e_27xTTgxQwPYdOrUP8bREE1hOIOpsw-_A7rC_W";
        const LOGO = "https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png";

        let cars = {};
        let carImg = "";

        function navTo(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function login(type) {
            const val = document.getElementById(type + '-pw').value;
            if((type==='sales' && val==='1234') || (type==='owner' && val==='OWNER2026')) {
                document.getElementById(type+'-auth').classList.add('hidden');
                document.getElementById(type+'-panel').classList.remove('hidden');
            } else { alert("Accesso Negato"); }
        }

        db.ref('cars').on('value', s => {
            cars = s.val() || {};
            const grid = document.getElementById('showroom-grid');
            const sel = document.getElementById('s-car');
            grid.innerHTML = ""; sel.innerHTML = "";
            for(let id in cars) {
                grid.innerHTML += `<div style="background:#0d0d0d; border-radius:15px; overflow:hidden; border:1px solid #1a1a1a;">
                    <img src="${cars[id].img}" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:20px;"><h4 style="font-family:'Orbitron';">${cars[id].name}</h4><p style="color:var(--p);">$ ${parseInt(cars[id].price).toLocaleString()}</p></div>
                </div>`;
                sel.innerHTML += `<option value="${cars[id].name}">${cars[id].name}</option>`;
            }
        });

        document.getElementById('add-i').onchange = e => {
            const r = new FileReader(); r.onload = ev => carImg = ev.target.result; r.readAsDataURL(e.target.files[0]);
        };

        function upload() {
            const n = document.getElementById('add-n').value, p = document.getElementById('add-p').value;
            if(n && p && carImg) db.ref('cars').push({name:n, price:p, img:carImg}).then(()=>alert("Auto Caricata!"));
        }

        function sendInquiry() {
            const name = document.getElementById('b-name').value;
            const discord = document.getElementById('b-discord').value;
            const date = document.getElementById('b-date').value;
            const time = document.getElementById('b-time').value;
            if(!name || !date || !time) return alert("Dati mancanti!");

            db.ref('appointments').push({name, discord, date, time}).then(() => {
                fetch(WEBHOOK_BOOKING, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `📩 **NUOVA RICHIESTA** | Staff <@&1465030207483154554>`,
                        embeds: [{
                            title: "🔍 ANALISI RICHIESTA CLIENTE",
                            description: `Cliente: <@${discord}>\n📍 **Civico:** 203`,
                            color: 16723533,
                            thumbnail: { url: LOGO },
                            fields: [
                                { name: "CLIENTE", value: `\`${name}\``, inline: true },
                                { name: "DATA", value: `\`${date}\``, inline: true },
                                { name: "ORA", value: `\`${time}\``, inline: true }
                            ]
                        }]
                    })
                });
                alert("Inviato!");
            });
        }

        async function generateSale() {
            const client = document.getElementById('s-client').value;
            const car = document.getElementById('s-car').value;
            const price = document.getElementById('s-price').value;
            const agent = document.getElementById('s-agent').value;
            const date = document.getElementById('s-date').value;
            const prot = document.getElementById('s-prot').value;

            if(!client || !price) return alert("Dati incompleti!");

            // --- GENERAZIONE PDF PROFESSIONALE ---
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Sfondo scuro e intestazione
            doc.setFillColor(15, 15, 15); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(255, 46, 77); doc.setFontSize(26); doc.text("AUTONATION TEXAS", 20, 30);
            doc.setTextColor(150, 150, 150); doc.setFontSize(10); doc.text("Austin Luxury Motors - Corporate Hub", 20, 38);
            
            // Dettagli contratto
            doc.setDrawColor(255, 46, 77); doc.line(20, 45, 190, 45);
            doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.text("SALES CONTRACT", 20, 55);
            
            doc.setFontSize(11);
            doc.text(`PROTOCOLLO: ${prot}`, 20, 75);
            doc.text(`CLIENTE: ${client.toUpperCase()}`, 20, 85);
            doc.text(`MODELLO: ${car.toUpperCase()}`, 20, 95);
            doc.text(`DATA VENDITA: ${date}`, 20, 105);
            
            doc.setTextColor(255, 46, 77); doc.setFontSize(16); doc.text(`TOTALE: $ ${parseInt(price).toLocaleString()}`, 20, 125);

            // Garanzia e Clausole
            doc.setTextColor(180, 180, 180); doc.setFontSize(9);
            const clausola = "Il presente documento certifica il passaggio di proprieta. Il veicolo viene venduto con garanzia Austin Elite di 12 mesi sulle componenti meccaniche.";
            doc.text(doc.splitTextToSize(clausola, 170), 20, 145);

            // Firme
            doc.setDrawColor(60, 60, 60);
            doc.line(20, 200, 90, 200); doc.line(120, 200, 190, 200);
            doc.setFontSize(10); doc.setTextColor(255, 255, 255);
            doc.text("FIRMA AGENTE", 40, 208); doc.text("FIRMA CLIENTE (TASTO FIRMA)", 130, 208);
            doc.setTextColor(255, 46, 77); doc.text(agent, 45, 195);

            doc.save(`Fattura_${prot}_${client}.pdf`);

            // --- LOG DISCORD VENDITE ---
            fetch(WEBHOOK_SALES, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "📜 VENDITA REGISTRATA - " + prot,
                        color: 16723533,
                        thumbnail: { url: LOGO },
                        fields: [
                            { name: "CLIENTE", value: `\`${client}\``, inline: true },
                            { name: "AGENTE", value: `\`${agent}\``, inline: true },
                            { name: "MODELLO", value: `\`${car}\``, inline: false },
                            { name: "IMPORTO", value: `\`$ ${parseInt(price).toLocaleString()}\``, inline: true },
                            { name: "GARANZIA", value: "`Austin Elite 12 Mesi`", inline: true }
                        ],
                        footer: { text: "Auto Nation Vehicle Division ★ Austin, Texas" },
                        timestamp: new Date()
                    }]
                })
            });

            alert("VENDITA LOGGATA E PDF GENERATO!");
        }
    </script>
</body>
</html>
