<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Corporate Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --bg: #050608;
            --surface: #101218;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav { 
            width: 280px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; 
        }
        .logo-box img { width: 100%; margin-bottom: 40px; filter: drop-shadow(0 0 5px var(--primary)); }
        
        .nav-link { 
            display: flex; align-items: center; padding: 15px 20px; color: var(--text-dim); 
            text-decoration: none; border-radius: 12px; margin-bottom: 10px; font-weight: 600; transition: 0.3s;
            cursor: pointer; border: none; background: none; width: 100%; font-size: 1rem;
        }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(255,46,77,0.3); }

        /* MAIN AREA */
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at 10% 10%, #12141c 0%, #050608 100%); position: relative; }
        .page { display: none; padding: 60px; max-width: 1400px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HERO DASHBOARD */
        .hero-card { 
            height: 400px; border-radius: 30px; background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2070') center/cover;
            position: relative; display: flex; align-items: center; padding: 60px; overflow: hidden; margin-bottom: 40px;
        }
        .hero-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, #000 30%, transparent 100%); opacity: 0.8; }
        .hero-text { position: relative; z-index: 2; }
        .hero-text h1 { font-family: 'Montserrat'; font-size: 4rem; font-weight: 900; line-height: 1; margin-bottom: 10px; }
        .hero-text p { color: var(--primary); font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }

        /* SHOWROOM GRID */
        .filter-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; }
        .btn-tag { padding: 10px 20px; border-radius: 10px; border: 1px solid #333; color: white; background: none; cursor: pointer; margin-right: 5px; font-weight: 600; }
        .btn-tag.active { background: var(--primary); border: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .car-card { background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .car-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .car-img { width: 100%; height: 220px; object-fit: cover; }
        .car-info { padding: 25px; }
        .price { font-family: 'Montserrat'; color: var(--primary); font-size: 1.5rem; font-weight: 900; margin-top: 10px; }

        /* LOCK SCREEN STYLE */
        .secure-gate { max-width: 400px; margin: 100px auto; text-align: center; background: var(--surface); padding: 50px; border-radius: 30px; border: 1px solid #222; }
        input[type="password"], input[type="text"], input[type="number"], select { 
            width: 100%; padding: 15px; border-radius: 12px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 20px; 
        }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* ADMIN TABLES */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--primary); border-bottom: 1px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box"><img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png"></div>
        <button class="nav-link active" onclick="navTo('home')"><i class="fa-solid fa-house"></i> Home</button>
        <button class="nav-link" onclick="navTo('showroom')"><i class="fa-solid fa-car"></i> Showroom</button>
        <button class="nav-link" onclick="navTo('sales')"><i class="fa-solid fa-file-invoice-dollar"></i> Fatture</button>
        <button class="nav-link" onclick="navTo('owners')"><i class="fa-solid fa-crown"></i> Owners Area</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="hero-card">
                <div class="hero-text">
                    <p>Exclusive Austin Dealer</p>
                    <h1>AUTONATION<br>ELITE GROUP</h1>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div class="secure-gate" style="margin:0; padding:30px;">
                    <h2 id="st-cars">0</h2><p style="color:var(--text-dim)">Auto Disponibili</p>
                </div>
                <div class="secure-gate" style="margin:0; padding:30px;">
                    <h2 id="st-sales">0</h2><p style="color:var(--text-dim)">Contratti Firmati</p>
                </div>
                <div class="secure-gate" style="margin:0; padding:30px;">
                    <h2>100%</h2><p style="color:var(--text-dim)">Certificato Austin</p>
                </div>
            </div>
        </div>

        <div id="showroom" class="page">
            <div class="filter-nav">
                <div>
                    <button class="btn-tag active" onclick="setFilter('All')">All</button>
                    <button class="btn-tag" onclick="setFilter('Regular')">Regular</button>
                    <button class="btn-tag" onclick="setFilter('Prestige')">Prestige</button>
                    <button class="btn-tag" onclick="setFilter('Electric')">Electric</button>
                    <button class="btn-tag" onclick="setFilter('Classic')">Classic</button>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span>Max: <b id="price-lbl">$1M</b></span>
                    <input type="range" min="0" max="1000000" step="10000" value="1000000" oninput="updatePrice(this.value)">
                </div>
            </div>
            <div id="fleet-grid" class="grid"></div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="secure-gate">
                <i class="fa-solid fa-user-tie" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
                <h2>Staff Login</h2>
                <input type="password" id="pw-sales" placeholder="PIN Operatore">
                <button class="btn-prime" onclick="verify('sales')">Sblocca</button>
            </div>
            <div id="sales-content" class="hidden">
                <div style="max-width: 600px; margin: auto; background: var(--surface); padding: 40px; border-radius: 25px;">
                    <h2>Nuova Vendita</h2>
                    <label>Seleziona Veicolo</label>
                    <select id="inv-car"></select>
                    <input type="text" id="inv-name" placeholder="Nome Completo Cliente">
                    <input type="number" id="inv-final" placeholder="Prezzo Concordato ($)">
                    <input type="text" id="inv-sign" placeholder="Firma Digitale Agente">
                    <button class="btn-prime" onclick="makeInvoice()">Emetti e Stampa PDF</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="secure-gate">
                <i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
                <h2>Owner Authentication</h2>
                <input type="password" id="pw-owners" placeholder="Master Key">
                <button class="btn-prime" onclick="verify('owners')">Accedi al Database</button>
            </div>
            <div id="owners-content" class="hidden">
                <div style="display:grid; grid-template-columns: 1fr 2fr; gap:30px;">
                    <div class="secure-gate" style="margin:0; text-align:left;">
                        <h3>Carica Asset</h3>
                        <input id="add-n" placeholder="Modello Auto">
                        <input id="add-p" type="number" placeholder="Prezzo ($)">
                        <select id="add-t">
                            <option value="Regular">Regular</option>
                            <option value="Prestige">Prestige</option>
                            <option value="Electric">Electric</option>
                            <option value="Classic">Classic</option>
                        </select>
                        <input type="file" id="add-file">
                        <button class="btn-prime" onclick="saveToDB()">Aggiungi</button>
                    </div>
                    <div class="secure-gate" style="margin:0; text-align:left;">
                        <h3>Gestione Stock</h3>
                        <table id="stock-table">
                            <thead><tr><th>Auto</th><th>Prezzo</th><th>Azioni</th></tr></thead>
                            <tbody id="stock-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIG FIREBASE
        const fbCfg = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(fbCfg);
        const db = firebase.database();
        
        let allCars = {}, filter = 'All', pLimit = 1000000;
        const KEYS = { sales: "1234", owners: "OWNER2026" };

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            
            // Ogni volta che cambi pagina, se non sei loggato, la sezione si resetta (Sicurezza Extra)
            if(id === 'sales' || id === 'owners') {
                document.getElementById(id + '-content').classList.add('hidden');
                document.getElementById(id + '-gate').style.display = 'block';
                document.getElementById('pw-' + id).value = "";
            }
        }

        function verify(type) {
            const input = document.getElementById('pw-' + type).value;
            if(input === KEYS[type]) {
                document.getElementById(type + '-gate').style.display = 'none';
                document.getElementById(type + '-content').classList.remove('hidden');
            } else { alert("Accesso Negato: Credenziali Errate"); }
        }

        // DATABASE SYNC
        db.ref('cars').on('value', s => {
            allCars = s.val() || {};
            renderShowroom();
            renderStockTable();
            document.getElementById('st-cars').innerText = Object.keys(allCars).length;
            const sel = document.getElementById('inv-car'); sel.innerHTML = "";
            for(let k in allCars) sel.innerHTML += `<option>${allCars[k].name}</option>`;
        });

        db.ref('sales_logs').on('value', s => document.getElementById('st-sales').innerText = s.numChildren());

        function renderShowroom() {
            const grid = document.getElementById('fleet-grid'); grid.innerHTML = "";
            for(let k in allCars) {
                const c = allCars[k];
                if((filter === 'All' || c.type === filter) && c.price <= pLimit) {
                    grid.innerHTML += `
                        <div class="car-card">
                            <img src="${c.img}" class="car-img">
                            <div class="car-info">
                                <small style="color:var(--primary); font-weight:800">${c.type.toUpperCase()}</small>
                                <h3 style="margin-top:5px">${c.name}</h3>
                                <div class="price">$ ${parseInt(c.price).toLocaleString()}</div>
                            </div>
                        </div>`;
                }
            }
        }

        function renderStockTable() {
            const tb = document.getElementById('stock-tbody'); tb.innerHTML = "";
            for(let k in allCars) {
                tb.innerHTML += `<tr>
                    <td>${allCars[k].name}</td>
                    <td><input type="number" value="${allCars[k].price}" onchange="editPrice('${k}', this.value)" style="width:100px; margin:0; padding:5px;"></td>
                    <td><button class="btn-del" onclick="delCar('${k}')">Elimina</button></td>
                </tr>`;
            }
        }

        function editPrice(k, v) { db.ref('cars/'+k).update({ price: parseInt(v) }); }
        function delCar(k) { if(confirm("Eliminare definitivamente?")) db.ref('cars/'+k).remove(); }
        
        function setFilter(t) { 
            filter = t; 
            document.querySelectorAll('.btn-tag').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderShowroom(); 
        }
        
        function updatePrice(v) { 
            pLimit = v; 
            document.getElementById('price-lbl').innerText = v >= 1000000 ? "$1M+" : "$ "+parseInt(v).toLocaleString();
            renderShowroom(); 
        }

        let cacheImg = "";
        document.getElementById('add-file').onchange = e => {
            const r = new FileReader();
            r.onload = ev => cacheImg = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        function saveToDB() {
            const n = document.getElementById('add-n').value;
            const p = document.getElementById('add-p').value;
            const t = document.getElementById('add-t').value;
            if(n && p && cacheImg) db.ref('cars').push({ name: n, price: parseInt(p), type: t, img: cacheImg }).then(()=>alert("Auto Salvata!"));
        }

        async function makeInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const client = document.getElementById('inv-name').value;
            const car = document.getElementById('inv-car').value;
            const price = document.getElementById('inv-final').value;
            const agent = document.getElementById('inv-sign').value;

            if(!client || !price) return alert("Dati mancanti!");

            doc.setFillColor(16, 18, 24); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 46, 77); doc.setFontSize(22); doc.text("AUTONATION AUSTIN", 20, 25);
            doc.setTextColor(0,0,0); doc.setFontSize(14); doc.text("OFFICIAL SALES CONTRACT", 20, 60);
            doc.setFontSize(12);
            doc.text(`CLIENTE: ${client.toUpperCase()}`, 20, 80);
            doc.text(`VEICOLO: ${car}`, 20, 90);
            doc.text(`TOTALE: $ ${parseInt(price).toLocaleString()}`, 20, 100);
            doc.text(`DATA: ${new Date().toLocaleDateString()}`, 20, 110);
            doc.text("__________________________________", 20, 150);
            doc.text(`Firma Agente: ${agent}`, 20, 160);

            db.ref('sales_logs').push({ client, car, price, date: new Date().toLocaleString() });
            doc.save(`Contratto_${client}.pdf`);
            alert("Contratto Generato con Successo!");
        }
    </script>
</body>
</html>
