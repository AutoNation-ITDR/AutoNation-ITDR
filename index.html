<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTONATION TEXAS | OFFICIAL HUB</title>

  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --p: #ff2e4d;
      --p-rgb: 255, 46, 77;
      --bg: #000;
      --s: #0a0a0a;
      --b: #1a1a1a;
      --t: #fff;
      --grad: linear-gradient(135deg, var(--p), #991b2d);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--t);
      font-family: 'Outfit', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    nav {
      width: 280px;
      background: var(--s);
      border-right: 1px solid var(--b);
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
      flex-shrink: 0;
    }

    .logo-box img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 3px solid var(--p);
      object-fit: cover;
    }

    .nav-group { display: flex; flex-direction: column; gap: 10px; }

    .nav-link {
      background: rgba(255,255,255,0.02);
      border: 1px solid transparent;
      color: #888;
      padding: 16px 20px;
      border-radius: 12px;
      font-family: 'Orbitron';
      font-size: 0.8rem;
      cursor: pointer;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: 0.3s;
    }

    .nav-link.active {
      background: var(--grad);
      color: #fff;
      border-color: var(--p);
    }

    main {
      flex: 1;
      overflow-y: auto;
      background: radial-gradient(circle at top right, #0a0a0a, #000);
    }

    .page { display: none; padding: 60px; max-width: 1400px; margin: 0 auto; }
    .page.active { display: block; }

    /* HERO */
    #home { position: relative; height: 100%; overflow: hidden; }
    .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); opacity: 0.4; }
    .hero-overlay { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    .hero-title { font-family: 'Orbitron'; font-size: 6rem; font-weight: 900; }
    .hero-title span { color: var(--p); }

    /* SHOWROOM */
    .filter-wrapper { display: inline-flex; gap: 10px; margin-bottom: 40px; }
    .filter-btn { padding: 12px 25px; border-radius: 10px; border: none; background: #111; color: #aaa; cursor: pointer; }
    .filter-btn.active { background: var(--p); color: #fff; }

    .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
    .car-card { background: #0d0d0d; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; }

    /* FORMS */
    .glass-panel { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; border-radius: 24px; max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 20px; }
    .form-group label { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--p); margin-bottom: 8px; display: block; }

    input, select, textarea {
      width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff;
    }

    .btn-action {
      width: 100%; padding: 20px; background: var(--grad); border: none; border-radius: 12px;
      font-family: 'Orbitron'; font-weight: 900; color: #fff; cursor: pointer;
    }

    /* TABLES */
    table { width: 100%; border-collapse: collapse; color: #ccc; }
    th { padding: 20px; background: #0d0d0d; color: var(--p); font-family: 'Orbitron'; }
    td { padding: 20px; border-bottom: 1px solid #111; }

    .del-btn { background: none; border: none; color: var(--p); cursor: pointer; font-size: 1.2rem; }
  </style>
</head>

<body>

<nav>
  <div class="logo-box">
    <img src="https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png">
  </div>

  <div class="nav-group">
    <button class="nav-link active" onclick="navTo('home', this)"><i class="fa-solid fa-house"></i> Home</button>
    <button class="nav-link" onclick="navTo('showroom', this)"><i class="fa-solid fa-car"></i> Showroom</button>
    <button class="nav-link" onclick="navTo('booking', this)"><i class="fa-solid fa-calendar-check"></i> Prenotazioni</button>
    <button class="nav-link" onclick="navTo('sales', this)"><i class="fa-solid fa-file-invoice-dollar"></i> Vendite</button>
    <button class="nav-link" onclick="navTo('owners', this)"><i class="fa-solid fa-user-shield"></i> Owner</button>
  </div>
</nav>

<main>

  <!-- HOME -->
  <div id="home" class="page active">
    <video class="hero-video" autoplay muted loop>
      <source src="https://assets.mixkit.co/videos/preview/mixkit-fast-driving-in-a-city-at-night-12344-large.mp4">
    </video>

    <div class="hero-overlay">
      <h1 class="hero-title">AUTO<span>NATION</span><br>TEXAS</h1>
      <p style="font-family:Orbitron; color:#888;">PREMIUM MOTORSPORT EXPERIENCE</p>

      <div class="hero-stats" style="display:flex; gap:50px; margin-top:40px;">
        <div><span id="count-cars" style="font-size:2rem; font-family:Orbitron;">0</span><br><small>Veicoli</small></div>
        <div><span style="font-size:2rem; font-family:Orbitron;">203</span><br><small>Civico</small></div>
        <div><span style="font-size:2rem; font-family:Orbitron;">24/7</span><br><small>Supporto</small></div>
      </div>
    </div>
  </div>

  <!-- SHOWROOM -->
  <div id="showroom" class="page">
    <h2 style="font-family:Orbitron;">SHOWROOM TEXAS</h2>

    <div class="filter-wrapper">
      <button class="filter-btn active" onclick="filterData('TUTTO', this)">TUTTO</button>
      <button class="filter-btn" onclick="filterData('Regular', this)">REGULAR</button>
      <button class="filter-btn" onclick="filterData('Prestige', this)">PRESTIGE</button>
      <button class="filter-btn" onclick="filterData('Electric', this)">ELECTRIC</button>
      <button class="filter-btn" onclick="filterData('Classic', this)">CLASSIC</button>
    </div>

    <div id="showroom-grid" class="car-grid"></div>
  </div>

  <!-- BOOKING -->
  <div id="booking" class="page">
    <h2 style="font-family:Orbitron; text-align:center;">PRENOTA APPUNTAMENTO</h2>

    <div class="glass-panel">
      <div class="form-group">
        <label>Nome Completo</label>
        <input id="b-name">
      </div>

      <div class="form-group">
        <label>ID Discord</label>
        <input id="b-discord">
      </div>

      <div style="display:flex; gap:20px;">
        <div class="form-group" style="flex:1;">
          <label>Data</label>
          <input type="date" id="b-date">
        </div>

        <div class="form-group" style="flex:1;">
          <label>Ora</label>
          <input type="time" id="b-time">
        </div>
      </div>

      <div class="form-group">
        <label>Note</label>
        <textarea id="b-notes"></textarea>
      </div>

      <button class="btn-action" onclick="submitBooking()">Invia Richiesta</button>
    </div>
  </div>

  <!-- SALES -->
  <div id="sales" class="page">
    <div id="sales-auth" class="glass-panel">
      <h2 style="font-family:Orbitron;">ACCESSO STAFF</h2>
      <input type="password" id="sales-pw" placeholder="PIN Agente">
      <button class="btn-action" onclick="checkAuth('sales')">Sblocca</button>
    </div>

    <div id="sales-panel" class="hidden">
      <h2 style="font-family:Orbitron;">TERMINALE VENDITE</h2>

      <div class="glass-panel" style="max-width:800px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
          <div>
            <div class="form-group">
              <label>Cliente</label>
              <input id="s-client">
            </div>

            <div class="form-group">
              <label>Veicolo</label>
              <select id="s-car" onchange="autoFillPrice()"></select>
            </div>

            <div class="form-group">
              <label>Prezzo</label>
              <input id="s-price">
            </div>
          </div>

          <div>
            <div class="form-group">
              <label>Agente</label>
              <input id="s-agent">
            </div>

            <div class="form-group">
              <label>Metodo</label>
              <select id="s-method">
                <option>Contanti</option>
                <option>Bonifico</option>
                <option>Finanziamento</option>
              </select>
            </div>

            <div class="form-group">
              <label>Note</label>
              <textarea id="s-notes"></textarea>
            </div>
          </div>
        </div>

        <button class="btn-action" onclick="finalizeSale()">Genera Fattura</button>
      </div>
    </div>
  </div>

  <!-- OWNERS -->
  <div id="owners" class="page">
    <div id="owner-auth" class="glass-panel">
      <h2 style="font-family:Orbitron;">OWNER CONTROL</h2>
      <input type="password" id="owner-pw" placeholder="Master Key">
      <button class="btn-action" onclick="checkAuth('owner')">Accedi</button>
    </div>

    <div id="owner-panel" class="hidden">
      <h2 style="font-family:Orbitron;">GESTIONE MAGAZZINO</h2>

      <div class="owner-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:40px;">
        <div class="glass-panel">
          <h3 style="font-family:Orbitron;">AGGIUNGI VEICOLO</h3>

          <div class="form-group">
            <label>Nome</label>
            <input id="add-name">
          </div>

          <div class="form-group">
            <label>Prezzo</label>
            <input id="add-price">
          </div>

          <div class="form-group">
            <label>Categoria</label>
            <select id="add-cat">
              <option value="Regular">Regular</option>
              <option value="Prestige">Prestige</option>
              <option value="Electric">Electric</option>
              <option value="Classic">Classic</option>
            </select>
          </div>

          <div class="form-group">
            <label>Immagine</label>
            <input type="file" id="add-img" accept="image/*">
          </div>

          <button class="btn-action" onclick="uploadCar()">Pubblica</button>
        </div>

        <div class="glass-panel">
          <h3 style="font-family:Orbitron;">STOCK ATTUALE</h3>
          <div id="stock-list-container" style="max-height:400px; overflow-y:auto;"></div>
        </div>
      </div>

      <div class="glass-panel" style="margin-top:40px;">
        <h3 style="font-family:Orbitron;">PRENOTAZIONI</h3>
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Cliente</th>
              <th>Discord</th>
              <th>Appuntamento</th>
              <th>Ora</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="admin-book-list"></tbody>
        </table>
      </div>
    </div>
  </div>
<script>
/* --- FIREBASE --- */
const fbConfig = {
  apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
  authDomain: "autonation-bc786.firebaseapp.com",
  databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "autonation-bc786",
  appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(fbConfig);
const db = firebase.database();

/* --- WEBHOOKS --- */
const WEBHOOK_ACCEPT = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";
const WEBHOOK_REJECT = "https://discord.com/api/webhooks/1487587998328426539/QLHK4aFuB6S7iV24RdhQ6HBDNVSWJyLJgnQnCf4kvu3wL_5oAlb5h3l9MiJ0i1Wgzv1d";
const WEBHOOK_SALES  = "https://discord.com/api/webhooks/1487566509982355487/dekKyZ-WeiUCUvTpeacX6YSBRssl3e_27xTTgxQwPYdOrUP8bREE1hOIOpsw-_A7rC_W";

/* --- STATE --- */
let carsCache = {};
let selectedFilter = "TUTTO";
let tempImageBase64 = "";

/* --- NAV --- */
function navTo(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  btn.classList.add('active');
}

/* --- AUTH --- */
function checkAuth(type) {
  if (type === 'sales') {
    const pass = document.getElementById('sales-pw').value;
    if (pass === '1234') {
      document.getElementById('sales-auth').classList.add('hidden');
      document.getElementById('sales-panel').classList.remove('hidden');
    } else alert("PIN Errato!");
  } else {
    const pass = document.getElementById('owner-pw').value;
    if (pass === 'OWNER2026') {
      document.getElementById('owner-auth').classList.add('hidden');
      document.getElementById('owner-panel').classList.remove('hidden');
    } else alert("Master Key Errata!");
  }
}

/* --- REALTIME --- */
db.ref('cars').on('value', snap => {
  carsCache = snap.val() || {};
  renderShowroom();
  updateOwnerStock();
  populateSalesSelect();
  document.getElementById('count-cars').innerText = Object.keys(carsCache).length;
});

db.ref('appointments').on('value', snap => {
  renderAdminAppointments(snap.val() || {});
});

/* --- SHOWROOM --- */
function filterData(cat, btn) {
  selectedFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderShowroom();
}

function renderShowroom() {
  const grid = document.getElementById('showroom-grid');
  grid.innerHTML = "";
  for (let id in carsCache) {
    const car = carsCache[id];
    if (selectedFilter !== "TUTTO" && car.type !== selectedFilter) continue;

    grid.innerHTML += `
      <div class="car-card">
        <div class="car-badge">${car.type}</div>
        <div class="car-img-box">
          <img src="${car.img}" class="car-img" onerror="this.src='https://via.placeholder.com/400x200?text=Auto+In+Arrivo'">
        </div>
        <div class="car-content">
          <h3 class="car-name">${car.name}</h3>
          <div class="car-price">$ ${parseInt(car.price).toLocaleString()}</div>
        </div>
      </div>
    `;
  }
}

/* --- OWNER STOCK --- */
function updateOwnerStock() {
  const container = document.getElementById('stock-list-container');
  container.innerHTML = "";
  for (let id in carsCache) {
    const car = carsCache[id];
    container.innerHTML += `
      <div class="stock-item" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #111;">
        <div>
          <strong>${car.name}</strong><br>
          <small style="color:var(--p)">$ ${car.price}</small>
        </div>
        <button class="del-btn" onclick="deleteCar('${id}')"><i class="fa-solid fa-trash"></i></button>
      </div>
    `;
  }
}

function deleteCar(id) {
  if (confirm("Rimuovere definitivamente?")) {
    db.ref('cars').child(id).remove();
  }
}

/* --- ADD CAR --- */
document.getElementById('add-img').addEventListener('change', e => {
  const reader = new FileReader();
  reader.onload = () => tempImageBase64 = reader.result;
  reader.readAsDataURL(e.target.files[0]);
});

function uploadCar() {
  const name = document.getElementById('add-name').value;
  const price = document.getElementById('add-price').value;
  const type = document.getElementById('add-cat').value;

  if (!name || !price || !tempImageBase64) return alert("Compila tutto!");

  db.ref('cars').push({ name, price, type, img: tempImageBase64 }).then(() => {
    alert("Veicolo aggiunto!");
    document.getElementById('add-name').value = "";
    document.getElementById('add-price').value = "";
    document.getElementById('add-img').value = "";
    tempImageBase64 = "";
  });
}

/* --- BOOKING --- */
function submitBooking() {
  const name = document.getElementById('b-name').value;
  const discord = document.getElementById('b-discord').value;
  const date = document.getElementById('b-date').value;
  const time = document.getElementById('b-time').value;
  const notes = document.getElementById('b-notes').value || "Nessuna nota.";

  if (!name || !date || !time) return alert("Dati mancanti!");

  db.ref('appointments').push({
    name, discord, date, time, notes, createdAt: Date.now()
  }).then(() => {
    alert("Richiesta registrata!");
    document.getElementById('b-name').value = "";
    document.getElementById('b-discord').value = "";
    document.getElementById('b-date').value = "";
    document.getElementById('b-time').value = "";
    document.getElementById('b-notes').value = "";
  });
}

/* --- ADMIN APPOINTMENTS --- */
function renderAdminAppointments(data) {
  const tbody = document.getElementById('admin-book-list');
  tbody.innerHTML = "";
  for (let id in data) {
    const a = data[id];
    const created = a.createdAt ? new Date(a.createdAt) : new Date();

    tbody.innerHTML += `
      <tr>
        <td>${created.toLocaleDateString()}</td>
        <td>${a.name}</td>
        <td>${a.discord}</td>
        <td>${a.date}</td>
        <td>${a.time}</td>
        <td style="display:flex;gap:8px;">
          <button class="del-btn" style="color:lime;" onclick="acceptApp('${id}')"><i class="fa-solid fa-check"></i></button>
          <button class="del-btn" style="color:red;" onclick="rejectApp('${id}')"><i class="fa-solid fa-xmark"></i></button>
        </td>
      </tr>
    `;
  }
}

/* --- ACCEPT APPOINTMENT --- */
function acceptApp(id) {
  db.ref('appointments').child(id).once('value').then(snap => {
    const a = snap.val();
    if (!a) return;

    let ping = a.discord;
    if (!isNaN(ping) && String(ping).length > 15) ping = `<@${ping}>`;

    fetch(WEBHOOK_ACCEPT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content: `📅 **PRENOTAZIONE ACCETTATA** | ${ping}`,
        embeds: [{
          title: "📌 Appuntamento Confermato",
          description:
            `Ciao ${ping}, il tuo appuntamento è stato **confermato**.\n\n` +
            `📍 **Civico:** 203\n` +
            `📆 **Data:** ${a.date}\n` +
            `⏰ **Ora:** ${a.time}`,
          color: 65280,
          timestamp: new Date().toISOString()
        }]
      })
    }).then(() => {
      db.ref('appointments').child(id).remove();
      alert("Appuntamento accettato.");
    }).catch(err => {
      console.error(err);
      alert("Errore invio webhook accettazione.");
    });
  });
}

/* --- REJECT APPOINTMENT --- */
function rejectApp(id) {
  const motivo = prompt("Motivo del rifiuto?");
  if (!motivo || motivo.trim() === "") return alert("Rifiuto annullato.");

  db.ref('appointments').child(id).once('value').then(snap => {
    const a = snap.val();
    if (!a) return;

    let ping = a.discord;
    if (!isNaN(ping) && String(ping).length > 15) ping = `<@${ping}>`;

    setTimeout(() => {
      fetch(WEBHOOK_REJECT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: `❌ **PRENOTAZIONE RIFIUTATA** | ${ping}`,
          embeds: [{
            title: "⛔ Appuntamento Rifiutato",
            description:
              `Ciao ${ping}, purtroppo **non possiamo confermare** il tuo appuntamento.\n\n` +
              `📆 **Data richiesta:** ${a.date}\n` +
              `⏰ **Ora richiesta:** ${a.time}\n\n` +
              `**Motivo:** ${motivo}`,
            color: 16711680,
            timestamp: new Date().toISOString()
          }]
        })
      }).then(() => {
        db.ref('appointments').child(id).remove();
        alert("Appuntamento rifiutato.");
      }).catch(err => {
        console.error(err);
        alert("Errore invio webhook rifiuto.");
      });
    }, 300);
  });
}

/* --- SALES SELECT --- */
function populateSalesSelect() {
  const select = document.getElementById('s-car');
  select.innerHTML = `<option disabled selected>Seleziona veicolo...</option>`;
  for (let id in carsCache) {
    const car = carsCache[id];
    select.innerHTML += `<option value="${car.name}">${car.name}</option>`;
  }
}

function autoFillPrice() {
  const name = document.getElementById('s-car').value;
  for (let id in carsCache) {
    if (carsCache[id].name === name) {
      document.getElementById('s-price').value = carsCache[id].price;
    }
  }
}

/* --- SALES WEBHOOK LOG --- */
function sendInvoiceLog(client, car, price, agent, method, notes) {
  fetch(WEBHOOK_SALES, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      embeds: [{
        title: "💰 NUOVA VENDITA REGISTRATA",
        color: 3066993,
        fields: [
          { name: "Cliente", value: client, inline: true },
          { name: "Agente", value: agent, inline: true },
          { name: "Veicolo", value: car, inline: false },
          { name: "Prezzo", value: `$ ${parseInt(price).toLocaleString()}`, inline: true },
          { name: "Metodo", value: method, inline: true },
          { name: "Note", value: notes, inline: false }
        ],
        timestamp: new Date().toISOString()
      }]
    })
  }).catch(err => console.error("Errore webhook fatture:", err));
}

/* --- FINALIZE SALE + PDF TEX-005 --- */
async function finalizeSale() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const client = document.getElementById('s-client').value;
  const car    = document.getElementById('s-car').value;
  const price  = document.getElementById('s-price').value;
  const agent  = document.getElementById('s-agent').value || "N/D";
  const method = document.getElementById('s-method').value;
  const notes  = document.getElementById('s-notes').value || "Nessuna nota.";

  if (!client || !car || !price) return alert("Compila tutti i campi obbligatori!");

  const invoiceId = "TEX-" + String(Math.floor(Math.random() * 999)).padStart(3, "0");
  const today = new Date().toLocaleDateString();

  // SFONDO
  doc.setFillColor(0, 0, 0);
  doc.rect(0, 0, 210, 297, "F");

  // HEADER
  doc.setTextColor(255, 46, 77);
  doc.setFontSize(28);
  doc.setFont("helvetica", "bold");
