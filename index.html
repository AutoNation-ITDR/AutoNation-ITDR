<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Elite Operations v11.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --bg: #000000;
            --surface: #080808;
            --border: #1a1a1a;
            --text: #ffffff;
            --text-dim: #555555;
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px; }
        .logo-container img { width: 100%; margin-bottom: 40px; }
        .nav-link { display: flex; align-items: center; padding: 15px 18px; color: var(--text-dim); text-decoration: none; border-radius: 12px; margin-bottom: 5px; font-weight: 700; transition: var(--transition); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.8rem; text-transform: uppercase; }
        .nav-link i { margin-right: 12px; font-size: 1.1rem; }
        .nav-link:hover, .nav-link.active { color: white; background: #111; }
        .nav-link.active { color: var(--primary); border-left: 3px solid var(--primary); border-radius: 0 12px 12px 0; }

        /* MAIN */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* SHOWROOM CATEGORIES */
        .category-header { font-family: 'Montserrat'; font-size: 1.2rem; color: var(--primary); margin: 35px 0 15px 0; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .category-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .car-card { background: var(--surface); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); transition: var(--transition); position: relative; }
        .car-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .car-img { width: 100%; height: 180px; object-fit: cover; background: #111; }
        .car-info { padding: 15px; }
        .car-price { color: var(--primary); font-weight: 900; font-size: 1.2rem; margin-top: 5px; }
        .badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: 800; color: var(--primary); text-transform: uppercase; border: 1px solid var(--primary); }

        /* UI */
        .panel { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: left; color: var(--text-dim); font-size: 0.6rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container"><img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png"></div>
        <button class="nav-link active" onclick="navTo('home', this)"><i class="fa-solid fa-house"></i> Home</button>
        <button class="nav-link" onclick="navTo('showroom', this)"><i class="fa-solid fa-car"></i> Showroom</button>
        <button class="nav-link" onclick="navTo('booking', this)"><i class="fa-solid fa-calendar"></i> Booking</button>
        <button class="nav-link" onclick="navTo('sales', this)"><i class="fa-solid fa-file-invoice"></i> Fatturazione</button>
        <button class="nav-link" onclick="navTo('owners', this)"><i class="fa-solid fa-user-shield"></i> Management</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="stat-grid">
                <div class="stat-card"><h2 id="st-cars">0</h2><p style="font-size:0.6rem; color:var(--text-dim);">STOCK</p></div>
                <div class="stat-card"><h2 id="st-sales">0</h2><p style="font-size:0.6rem; color:var(--text-dim);">VENDITE</p></div>
                <div class="stat-card"><h2 id="st-app">0</h2><p style="font-size:0.6rem; color:var(--text-dim);">RICHIESTE</p></div>
            </div>
            <div class="panel">
                <h1 style="font-family:'Montserrat'; font-size: 3.5rem; letter-spacing: -2px;">AUSTIN<br><span style="color:var(--primary)">OPERATIONS.</span></h1>
            </div>
        </div>

        <div id="showroom" class="page">
            <h2 style="font-family:'Montserrat';">SHOWROOM</h2>
            <div id="showroom-content"></div>
        </div>

        <div id="booking" class="page">
            <div class="panel" style="max-width: 500px; margin: 0 auto;">
                <h3 style="text-align:center; margin-bottom:20px;">PRENOTA</h3>
                <input id="book-name" placeholder="Nome">
                <input type="date" id="book-date">
                <input type="time" id="book-time">
                <select id="book-reason">
                    <option value="Acquisto">Acquisto</option>
                    <option value="Test Drive">Test Drive</option>
                </select>
                <button class="btn-prime" onclick="sendBooking()">Invia</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="panel" style="max-width:400px; margin: 80px auto; text-align:center;">
                <input type="password" id="pw-sales" placeholder="Staff PIN">
                <button class="btn-prime" onclick="verify('sales')">Sblocca</button>
            </div>
            <div id="sales-content" class="hidden">
                <div class="panel" style="max-width: 500px; margin: 0 auto;">
                    <h3>Emetti Fattura</h3>
                    <select id="inv-car" onchange="updatePrice()"></select>
                    <input id="inv-name" placeholder="Nome Cliente">
                    <input id="inv-final" readonly placeholder="Prezzo">
                    <input id="inv-sign" placeholder="Firma Operatore">
                    <button class="btn-prime" onclick="makeInvoice()">Genera PDF</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="panel" style="max-width:400px; margin: 80px auto; text-align:center;">
                <input type="password" id="pw-owners" placeholder="Owner Key">
                <button class="btn-prime" onclick="verify('owners')">Entra</button>
            </div>
            <div id="owners-content" class="hidden">
                <div class="panel">
                    <h3>Appuntamenti</h3>
                    <table id="app-table">
                        <tbody id="app-tbody"></tbody>
                    </table>
                </div>
                <div class="panel">
                    <h3>Aggiungi Veicolo</h3>
                    <input id="add-n" placeholder="Modello">
                    <input id="add-p" type="number" placeholder="Prezzo $">
                    
                    <label style="font-size:0.6rem; color:var(--primary)">TYPE</label>
                    <select id="add-type">
                        <option value="Regular">Regular</option>
                        <option value="Prestige">Prestige</option>
                        <option value="Electric">Electric</option>
                        <option value="Classic">Classic</option>
                    </select>

                    <label style="font-size:0.6rem; color:var(--primary)">CLASS</label>
                    <select id="add-class">
                        <option value="Car">Car</option>
                        <option value="Truck">Truck</option>
                        <option value="SUV">SUV</option>
                        <option value="Industrial">Industrial</option>
                    </select>

                    <input type="file" id="add-file">
                    <button class="btn-prime" onclick="saveToDB()">Pubblica</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const WEBHOOK = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";
        
        let allCars = {}, cacheImg = "";

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function verify(type) {
            const keys = { sales: "1234", owners: "OWNER2026" };
            if(document.getElementById('pw-'+type).value === keys[type]) {
                document.getElementById(type+'-gate').classList.add('hidden');
                document.getElementById(type+'-content').classList.remove('hidden');
            }
        }

        // --- SHOWROOM LOGIC ---
        db.ref('cars').on('value', s => {
            allCars = s.val() || {};
            const content = document.getElementById('showroom-content');
            const sel = document.getElementById('inv-car');
            content.innerHTML = "";
            sel.innerHTML = "<option disabled selected>Scegli Auto...</option>";

            const types = ["Prestige", "Regular", "Electric", "Classic"];
            
            types.forEach(type => {
                let html = `<div class="category-header">${type} Division</div><div class="car-grid">`;
                let has = false;
                for(let k in allCars) {
                    const c = allCars[k];
                    if(c.type === type) {
                        has = true;
                        html += `<div class="car-card">
                            <div class="badge">${c.class}</div>
                            <img src="${c.img}" class="car-img">
                            <div class="car-info">
                                <h3>${c.name}</h3>
                                <div class="car-price">$ ${parseInt(c.price).toLocaleString()}</div>
                            </div>
                        </div>`;
                        sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                    }
                }
                html += `</div>`;
                if(has) content.innerHTML += html;
            });
            document.getElementById('st-cars').innerText = Object.keys(allCars).length;
        });

        // --- APPUNTAMENTI ---
        db.ref('appointments').on('value', s => {
            const data = s.val() || {};
            const tb = document.getElementById('app-tbody'); tb.innerHTML = "";
            for(let k in data) {
                tb.innerHTML += `<tr><td>${data[k].name}</td><td>${data[k].date}</td><td><button onclick='acceptApp("${k}", ${JSON.stringify(data[k])})' style="color:var(--primary); background:none; border:none; cursor:pointer;">ACCETTA</button></td></tr>`;
            }
            document.getElementById('st-app').innerText = Object.keys(data).length;
        });

        async function acceptApp(key, data) {
            const embed = { username: "Austin Hub", embeds: [{ title: "✅ APPUNTAMENTO CONFERMATO", color: 16723533, fields: [{name:"Cliente", value:data.name, inline:true},{name:"Data", value:data.date, inline:true}] }] };
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(embed) });
            db.ref('appointments/'+key).remove();
        }

        function sendBooking() {
            const name = document.getElementById('book-name').value, date = document.getElementById('book-date').value, time = document.getElementById('book-time').value;
            if(name && date) db.ref('appointments').push({name, date, time}).then(()=>alert("Inviato!"));
        }

        // --- GESTIONE STOCK ---
        document.getElementById('add-file').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => cacheImg = ev.target.result; r.readAsDataURL(e.target.files[0]);
        };

        function saveToDB() {
            const n = document.getElementById('add-n').value, p = document.getElementById('add-p').value, t = document.getElementById('add-type').value, c = document.getElementById('add-class').value;
            if(n && p && cacheImg) db.ref('cars').push({ name: n, price: p, type: t, class: c, img: cacheImg }).then(() => alert("Aggiunto!"));
        }

        // --- FATTURA TEX-001 ---
        async function makeInvoice() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const client = document.getElementById('inv-name').value.toUpperCase(), car = document.getElementById('inv-car').value, price = document.getElementById('inv-final').value, agent = document.getElementById('inv-sign').value.toUpperCase();
            doc.setFontSize(26); doc.text("Auto Nation", 105, 45, null, null, "center");
            doc.setFontSize(18); doc.text("SALES CONTRACT", 105, 58, null, null, "center");
            doc.setDrawColor(200, 0, 0); doc.line(25, 65, 185, 65);
            doc.setFontSize(10); doc.text("CONCESSIONARIO: AutoNation Austin Luxury Motors", 25, 85);
            doc.text("CLIENTE: " + client, 25, 105);
            doc.text("VEICOLO: " + car, 25, 125);
            doc.setFontSize(14); doc.text("TOTALE: $ " + parseInt(price).toLocaleString(), 25, 145);
            doc.text("FIRMA AGENTE: " + agent, 155, 215, null, null, "center");
            doc.text("AUTONATION TEXAS ★ VEHICLE DIVISION", 105, 275, null, null, "center");
            doc.save(`Fattura_${client}.pdf`);
        }

        function updatePrice() {
            const n = document.getElementById('inv-car').value;
            for(let k in allCars) if(allCars[k].name === n) document.getElementById('inv-final').value = allCars[k].price;
        }

        db.ref('sales_logs').on('value', s => { document.getElementById('st-sales').innerText = Object.keys(s.val() || {}).length; });
    </script>
</body>
</html>
