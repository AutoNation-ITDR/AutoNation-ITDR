<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AutoNation Gestionale</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "INSERISCI_API_KEY",
authDomain: "TUO_PROGETTO.firebaseapp.com",
projectId: "TUO_PROGETTO",
storageBucket: "TUO_PROGETTO.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let role="dipendente"

document.getElementById("loginBtn").onclick=async()=>{

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,pass)

}

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

if(user.email.includes("admin"))
role="admin"

loadCars()
loadVendite()

}

})

async function addCar(){

let name=document.getElementById("carName").value
let price=document.getElementById("carPrice").value

await addDoc(collection(db,"cars"),{
name,
price
})

loadCars()

}

async function loadCars(){

let list=document.getElementById("carList")
list.innerHTML=""

const query=await getDocs(collection(db,"cars"))

query.forEach(doc=>{

let c=doc.data()

list.innerHTML+=`

<div class="car">

<h3>${c.name}</h3>
<p>${c.price}</p>

<button onclick="sellCar('${c.name}')">Vendi</button>

</div>

`

})

}

let targa=1

window.sellCar=async(auto)=>{

let nome=prompt("Nome cliente")
let cognome=prompt("Cognome cliente")

let num=String(targa).padStart(3,"0")

let plate="TEX-"+num

targa++

let data=new Date().toLocaleDateString()

await addDoc(collection(db,"sales"),{

nome,
cognome,
auto,
plate,
data

})

generatePDF(nome,cognome,auto,plate)

loadVendite()

}

async function loadVendite(){

if(role!=="admin") return

let table=document.getElementById("sales")

const query=await getDocs(collection(db,"sales"))

query.forEach(doc=>{

let v=doc.data()

table.innerHTML+=`

<tr>

<td>${v.plate}</td>
<td>${v.nome} ${v.cognome}</td>
<td>${v.auto}</td>
<td>${v.data}</td>

</tr>

`

})

}

window.generatePDF=function(nome,cognome,auto,plate){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.text("Contratto Vendita Auto",20,20)

doc.text("Cliente: "+nome+" "+cognome,20,40)
doc.text("Auto: "+auto,20,60)
doc.text("Targa: "+plate,20,80)

let firma=signaturePad.toDataURL()

doc.addImage(firma,"PNG",20,100,100,40)

doc.save("contratto-"+plate+".pdf")

}

</script>

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#020617;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 15px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

#carList{
display:flex;
flex-wrap:wrap;
}

.car{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
}

table{
width:100%;
margin-top:30px;
}

td,th{
padding:10px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<div id="login">

<h2>Login</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button id="loginBtn">Login</button>

</div>

<div id="app" style="display:none">

<header>

<h1>AutoNation Gestionale</h1>

</header>

<h2>Aggiungi Auto</h2>

<input id="carName" placeholder="Modello">
<input id="carPrice" placeholder="Prezzo">

<button onclick="addCar()">Aggiungi</button>

<div id="carList"></div>

<h2>Firma Cliente</h2>

<canvas id="signature" width="400" height="150" style="background:white"></canvas>

<h2>Registro Vendite</h2>

<table>

<thead>

<tr>
<th>Targa</th>
<th>Cliente</th>
<th>Auto</th>
<th>Data</th>
</tr>

</thead>

<tbody id="sales"></tbody>

</table>

</div>

<script>

let canvas=document.getElementById("signature")
let signaturePad=new SignaturePad(canvas)

</script>

</body>

</html>
