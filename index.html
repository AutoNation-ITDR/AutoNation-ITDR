<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Austin | Elite Management v3.2</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff2e4d;
            --bg: #030405;
            --surface: #0d0f14;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --accent-glow: 0 0 20px rgba(255, 46, 77, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav { width: 280px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 40px 20px; z-index: 100; }
        .logo-container img { width: 100%; margin-bottom: 50px; filter: drop-shadow(var(--accent-glow)); }
        
        .nav-link { 
            display: flex; align-items: center; padding: 18px 20px; color: var(--text-dim); 
            text-decoration: none; border-radius: 15px; margin-bottom: 12px; font-weight: 700; transition: 0.3s;
            cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; text-transform: uppercase;
        }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: var(--accent-glow); }

        /* MAIN AREA */
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #1a1c26 0%, #030405 100%); position: relative; }
        .page { display: none; padding: 60px; max-width: 1400px; margin: 0 auto; animation: slideUp 0.5s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* UI COMPONENTS */
        .panel { background: var(--surface); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .secure-gate { max-width: 400px; margin: 80px auto; text-align: center; background: var(--surface); padding: 50px; border-radius: 35px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 12px; font-family: 'Outfit'; }
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .logout-btn { background: rgba(255,255,255,0.05); color: #ff4444; border: 1px solid #ff4444; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; float: right; font-size: 0.7rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container"><img src="https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png"></div>
        <button class="nav-link active" onclick="navTo('home')"><i class="fa-solid fa-house"></i> Home</button>
        <button class="nav-link" onclick="navTo('sales')"><i class="fa-solid fa-file-invoice-dollar"></i> Fatture</button>
        <button class="nav-link" onclick="navTo('owners')"><i class="fa-solid fa-crown"></i> Owners Area</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="panel">
                <h1>Benvenuti in AutoNation Austin</h1>
                <p>Gestione Vendite e Contratti Corporate Hub Texas.</p>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="secure-gate">
                <h2>Staff Login</h2>
                <input type="password" id="pw-sales" placeholder="PIN">
                <button class="btn-prime" onclick="verify('sales')">Sblocca</button>
            </div>
            <div id="sales-content" class="hidden">
                <button class="logout-btn" onclick="logout('sales')">LOGOUT</button>
                <div class="panel" style="max-width: 500px; margin: 20px auto;">
                    <h3>Emetti Sales Contract</h3>
                    <label>Seleziona Veicolo</label>
                    <select id="inv-car" onchange="autoSetPrice()"></select>
                    <label>Nome Cliente</label>
                    <input type="text" id="inv-name" placeholder="Es: MARK">
                    <label>Prezzo Finale ($)</label>
                    <input type="number" id="inv-final" readonly style="background: #111; color: #aaa;">
                    <label>Firma Agente</label>
                    <input type="text" id="inv-sign" placeholder="Il tuo nome">
                    <button class="btn-prime" onclick="makeInvoice()">Genera Contratto PDF</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="secure-gate">
                <h2>Owner Master Login</h2>
                <input type="password" id="pw-owners" placeholder="Master Key">
                <button class="btn-prime" onclick="verify('owners')">Accedi</button>
            </div>
            <div id="owners-content" class="hidden">
                <button class="logout-btn" onclick="logout('owners')">ESCI</button>
                <div class="panel">
                    <h3>Gestione Stock Veicoli</h3>
                    <p>Modulo per aggiungere/eliminare veicoli attivo nel sistema.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let allCars = {};
        const KEYS = { sales: "1234", owners: "OWNER2026" };

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function verify(type) {
            if(document.getElementById('pw-' + type).value === KEYS[type]) {
                document.getElementById(type + '-gate').style.display = 'none';
                document.getElementById(type + '-content').classList.remove('hidden');
            } else { alert("PIN Errato"); }
        }

        function logout(type) {
            document.getElementById(type + '-content').classList.add('hidden');
            document.getElementById(type + '-gate').style.display = 'block';
        }

        // CARICAMENTO AUTOMATICO PREZZO
        function autoSetPrice() {
            const name = document.getElementById('inv-car').value;
            for(let k in allCars) {
                if(allCars[k].name === name) {
                    document.getElementById('inv-final').value = allCars[k].price;
                    break;
                }
            }
        }

        db.ref('cars').on('value', s => {
            allCars = s.val() || {};
            const sel = document.getElementById('inv-car');
            sel.innerHTML = "<option disabled selected>Scegli auto...</option>";
            for(let k in allCars) sel.innerHTML += `<option value="${allCars[k].name}">${allCars[k].name}</option>`;
        });

        // GENERAZIONE PDF UFFICIALE (FEDELE AL TUO MODELLO)
        async function makeInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const client = document.getElementById('inv-name').value || "CLIENTE";
            const car = document.getElementById('inv-car').value;
            const price = document.getElementById('inv-final').value;
            const agent = document.getElementById('inv-sign').value || "AGENTE";
            const protocollo = "TEX-" + Math.floor(100 + Math.random() * 900);

            // LOGO (Base64 del logo AutoNation Texas)
            const logoUrl = "https://res.cloudinary.com/dn0k6htsv/image/upload/v1774647697/zcbubagqn4hpxmlzwwan.png";
            
            // Header
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("Auto Nation", 105, 40, null, null, "center");
            
            doc.setFontSize(18);
            doc.text("SALES CONTRACT", 105, 55, null, null, "center");

            // Sezione Concessionario e Cliente
            doc.setFontSize(10);
            doc.text("CONCESSIONARIO:", 20, 75);
            doc.setFont("helvetica", "normal");
            doc.text("AutoNation Austin Luxury Motors", 20, 80);
            doc.text("Austin, Texas - Corporate Hub", 20, 85);

            doc.setFont("helvetica", "bold");
            doc.text("CLIENTE:", 20, 100);
            doc.setFont("helvetica", "normal");
            doc.text(client.toUpperCase(), 20, 105);

            // Dettagli Veicolo
            doc.setFont("helvetica", "bold");
            doc.text("DETTAGLI VEICOLO", 20, 120);
            doc.setFont("helvetica", "normal");
            doc.text(`Modello: ${car}`, 20, 128);
            doc.text(`Protocollo: ${protocollo}`, 20, 134);
            doc.text(`Data Vendita: ${new Date().toLocaleDateString()}`, 20, 140);

            // Totale
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text(`TOTALE: $ ${parseInt(price).toLocaleString()}`, 20, 155);

            // Note Legali e Garanzia
            doc.setFont("helvetica", "normal");
            doc.setFontSize(9);
            const textMsg = "Il presente documento certifica il passaggio di proprietà. Il veicolo viene venduto con garanzia Austin Elite di 12 mesi sulle componenti meccaniche.";
            const splitText = doc.splitTextToSize(textMsg, 170);
            doc.text(splitText, 20, 170);

            // Firma
            doc.setFont("helvetica", "bold");
            doc.setFontSize(10);
            doc.text("FIRMA AGENTE", 150, 200);
            doc.setFont("helvetica", "normal");
            doc.text(agent.toUpperCase(), 150, 208);

            // Footer (Logo Circolare Simulato)
            doc.setFontSize(8);
            doc.text("AUTONATION TEXAS VEHICLE DIVISION", 105, 280, null, null, "center");

            // Salvataggio Log e Download
            db.ref('sales_logs').push({ client, car, price, date: new Date().toLocaleString() });
            doc.save(`Fattura_${protocollo}.pdf`);
        }
    </script>
</body>
</html>
