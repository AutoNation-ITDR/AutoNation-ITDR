<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION TEXAS | OFFICIAL HUB</title>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --p: #ff2e4d; --bg: #000; --s: #0a0a0a; --b: #1a1a1a; --t: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        nav { width: 260px; background: var(--s); border-right: 2px solid var(--p); display: flex; flex-direction: column; padding: 30px; z-index: 100; flex-shrink: 0; }
        .logo-box { text-align: center; margin-bottom: 40px; }
        .logo-box img { width: 130px; height: 130px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; }
        .nav-link { background: none; border: none; color: #777; padding: 15px; margin-bottom: 5px; font-family: 'Orbitron'; font-size: 0.75rem; text-align: left; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .nav-link.active { color: var(--p); border-left: 4px solid var(--p); background: rgba(255,46,77,0.05); padding-left: 20px; }

        /* --- MAIN --- */
        main { flex: 1; overflow-y: auto; background: #050505; position: relative; }
        .page { display: none; min-height: 100%; padding: 40px; }
        .page.active { display: block; }

        /* --- HOME --- */
        #home { padding: 0; position: relative; width: 100%; height: 100%; overflow: hidden; }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translate(-50%, -50%); object-fit: cover; opacity: 0.5; }
        .hero-overlay { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, transparent, rgba(0,0,0,0.9)); }
        .hero-title { font-family: 'Orbitron'; font-size: 5rem; font-weight: 900; text-shadow: 0 0 30px var(--p); line-height: 1; }

        /* --- SHOWROOM FILTERS --- */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { background: #111; border: 1px solid #333; color: #777; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--p); color: #fff; background: rgba(255,46,77,0.1); }

        /* --- GRID --- */
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .car-card { background: #0d0d0d; border: 1px solid var(--b); position: relative; border-radius: 10px; overflow: hidden; }
        .car-img { width: 100%; height: 200px; object-fit: cover; }
        .badge { position: absolute; top: 15px; right: 15px; padding: 5px 12px; font-size: 0.6rem; font-weight: 900; background: var(--p); color: white; border-radius: 4px; text-transform: uppercase; }

        /* --- PANELS --- */
        .panel { background: #0a0a0a; border: 1px solid var(--b); padding: 35px; border-radius: 15px; max-width: 900px; margin: 0 auto; }
        .panel-title { font-family: 'Orbitron'; color: var(--p); margin-bottom: 25px; font-size: 1.2rem; text-align: center; }
        input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-family: 'Outfit'; }
        .btn-prime { width: 100%; padding: 18px; background: var(--p); color: #fff; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { text-align: left; color: var(--p); padding: 10px; border-bottom: 1px solid #222; font-family: 'Orbitron'; font-size: 0.7rem; }
        td { padding: 10px; border-bottom: 1px solid #111; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box"><img src="https://res.cloudinary.com/dtunh07qw/image/upload/v1774726227/prdrllnucdla95lhztwi.png"></div>
        <button class="nav-link active" onclick="navTo('home', this)">Home</button>
        <button class="nav-link" onclick="navTo('showroom', this)">Showroom</button>
        <button class="nav-link" onclick="navTo('booking', this)">Prenotazioni</button>
        <button class="nav-link" onclick="navTo('sales', this)">Vendite</button>
        <button class="nav-link" onclick="navTo('owners', this)">Owner</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <video class="hero-video" autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-fast-driving-in-a-city-at-night-12344-large.mp4"></video>
            <div class="hero-overlay"><h1 class="hero-title">AUTONATION<br><span style="color:var(--p)">TEXAS</span></h1></div>
        </div>

        <div id="showroom" class="page">
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterShowroom('TUTTO', this)">TUTTO</button>
                <button class="filter-btn" onclick="filterShowroom('Regular', this)">REGULAR</button>
                <button class="filter-btn" onclick="filterShowroom('Prestige', this)">PRESTIGE</button>
                <button class="filter-btn" onclick="filterShowroom('Electric', this)">ELECTRIC</button>
                <button class="filter-btn" onclick="filterShowroom('Classic', this)">CLASSIC</button>
            </div>
            <div id="fleet-grid" class="car-grid"></div>
        </div>

        <div id="booking" class="page">
            <div class="panel" style="max-width:550px;">
                <div class="panel-title">PRENOTA UN APPUNTAMENTO</div>
                <input id="book-name" placeholder="Tuo Nome">
                <input id="book-discord" placeholder="Discord ID">
                <input type="date" id="book-date">
                <input type="time" id="book-time">
                <button class="btn-prime" onclick="sendBooking()">INVIA RICHIESTA</button>
            </div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="panel" style="max-width:350px; text-align:center;">
                <div class="panel-title">AREA STAFF</div>
                <input type="password" id="pw-sales" placeholder="PIN VENDITE">
                <button class="btn-prime" onclick="verify('sales')">ACCEDI</button>
            </div>
            <div id="sales-content" class="hidden">
                <div class="panel" style="max-width:550px;">
                    <div class="panel-title">TERMINALE VENDITE</div>
                    <input id="inv-name" placeholder="Nome Cliente">
                    <select id="inv-car" onchange="updatePrice()"></select>
                    <input id="inv-final" readonly placeholder="Prezzo">
                    <input id="inv-sign" placeholder="Nome Agente">
                    <button class="btn-prime" onclick="makeInvoice()">GENERA CONTRATTO</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="panel" style="max-width:350px; text-align:center;">
                <div class="panel-title">OWNER ACCESS</div>
                <input type="password" id="pw-owners" placeholder="OWNER KEY">
                <button class="btn-prime" onclick="verify('owners')">SBLOCCA</button>
            </div>
            <div id="owners-content" class="hidden">
                <div class="panel" style="margin-bottom:30px;">
                    <div class="panel-title">GESTIONE PRENOTAZIONI</div>
                    <table>
                        <thead><tr><th>CLIENTE</th><th>DISCORD</th><th>DATA</th><th>ORA</th><th>AZIONE</th></tr></thead>
                        <tbody id="owner-book-list"></tbody>
                    </table>
                </div>
                <div class="panel">
                    <div class="panel-title">GESTIONE STOCK AUTO</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div>
                            <h4>AGGIUNGI AUTO</h4>
                            <input id="add-n" placeholder="Nome Modello">
                            <input id="add-p" type="number" placeholder="Prezzo">
                            <select id="add-type">
                                <option value="Regular">Regular</option>
                                <option value="Prestige">Prestige</option>
                                <option value="Electric">Electric</option>
                                <option value="Classic">Classic</option>
                            </select>
                            <input type="file" id="add-file">
                            <button class="btn-prime" onclick="saveToDB()">CARICA AUTO</button>
                        </div>
                        <div id="owner-stock-list" style="max-height:400px; overflow-y:auto; background:#000; padding:15px; border-radius:10px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        // IL TUO WEBHOOK AGGIORNATO
        const WEBHOOK = "https://discord.com/api/webhooks/1487519988712472636/XiAG6FkU6GTuaKmfNmSdcA5PiJ830TJnMGfZkVaF1vWuwGSztTSF_DMogGCTG1IlkS5Q";

        let allCars = {}, cacheImg = "", currentFilter = "TUTTO";

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function verify(type) {
            const val = document.getElementById('pw-'+type).value;
            if((type==='sales' && val==='1234') || (type==='owners' && val==='OWNER2026')) {
                document.getElementById(type+'-gate').classList.add('hidden');
                document.getElementById(type+'-content').classList.remove('hidden');
            } else { alert("ACCESSO NEGATO"); }
        }

        db.ref('cars').on('value', s => { allCars = s.val() || {}; renderCars(currentFilter); });
        db.ref('appointments').on('value', s => { renderAppointments(s.val()); });

        function filterShowroom(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCars(cat);
        }

        function renderCars(filter = "TUTTO") {
            const grid = document.getElementById('fleet-grid'), sel = document.getElementById('inv-car'), ownStock = document.getElementById('owner-stock-list');
            grid.innerHTML = ""; sel.innerHTML = "<option disabled selected>Seleziona Auto...</option>"; ownStock.innerHTML = "<h4>LISTA STOCK</h4>";
            for(let k in allCars) {
                const c = allCars[k];
                if(filter === "TUTTO" || c.type === filter) grid.innerHTML += `<div class="car-card"><div class="badge">${c.type}</div><img src="${c.img}" class="car-img"><div class="car-info"><h3>${c.name}</h3><div style="color:var(--p); font-weight:900;">$ ${parseInt(c.price).toLocaleString()}</div></div></div>`;
                sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                ownStock.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;"><span>${c.name}</span><button onclick="deleteCar('${k}')" style="color:red; background:none; border:none; cursor:pointer;">ELIMINA</button></div>`;
            }
        }

        function renderAppointments(data) {
            const list = document.getElementById('owner-book-list'); list.innerHTML = "";
            for(let k in data) {
                const a = data[k];
                list.innerHTML += `<tr><td>${a.name}</td><td>${a.discord}</td><td>${a.date}</td><td>${a.time}</td><td><button onclick="deleteApp('${k}')" style="color:var(--p); background:none; border:none; cursor:pointer;">ARCHIVIA</button></td></tr>`;
            }
        }

        function deleteCar(key) { if(confirm("Eliminare auto?")) db.ref('cars').child(key).remove(); }
        function deleteApp(key) { if(confirm("Archiviare appuntamento?")) db.ref('appointments').child(key).remove(); }
        function updatePrice() {
            const n = document.getElementById('inv-car').value;
            for(let k in allCars) if(allCars[k].name === n) document.getElementById('inv-final').value = allCars[k].price;
        }

        document.getElementById('add-file').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => cacheImg = ev.target.result; r.readAsDataURL(e.target.files[0]);
        };

        function saveToDB() {
            const n = document.getElementById('add-n').value, p = document.getElementById('add-p').value, t = document.getElementById('add-type').value;
            if(n && p && cacheImg) db.ref('cars').push({ name: n, price: p, type: t, img: cacheImg }).then(() => alert("AUTO CARICATA!"));
        }

        // INVIO APPUNTAMENTO CON EMBED DISCORD
        function sendBooking() {
            const name = document.getElementById('book-name').value;
            const discord = document.getElementById('book-discord').value;
            const date = document.getElementById('book-date').value;
            const time = document.getElementById('book-time').value;

            if(!name || !date || !time) return alert("Compila tutti i campi!");

            db.ref('appointments').push({name, discord, date, time}).then(()=> {
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: "<@&1465030207483154554>", // Ping ruolo staff
                        embeds: [{
                            title: "📅 NUOVA RICHIESTA APPUNTAMENTO",
                            color: 16723533,
                            fields: [
                                { name: "👤 Cliente", value: name, inline: true },
                                { name: "🆔 Discord", value: discord || "Non fornito", inline: true },
                                { name: "📅 Data", value: date, inline: true },
                                { name: "⏰ Ora", value: time, inline: true }
                            ],
                            footer: { text: "Sistema Prenotazioni AutoNation" },
                            timestamp: new Date()
                        }]
                    })
                });
                alert("RICHIESTA INVIATA!");
                document.querySelectorAll('#booking input').forEach(i=>i.value="");
            });
        }

        async function makeInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const client = document.getElementById('inv-name').value || "CLIENTE";
            const car = document.getElementById('inv-car').value;
            const price = document.getElementById('inv-final').value;
            const agent = document.getElementById('inv-sign').value || "Agente";

            doc.setFillColor(0,0,0); doc.rect(0,0,210,297,'F');
            doc.setTextColor(255, 46, 77); doc.setFontSize(30); doc.text("AUTONATION TEXAS", 20, 30);
            doc.setTextColor(255, 255, 255); doc.setFontSize(12);
            doc.text(`CONTRATTO DI VENDITA`, 20, 60);
            doc.text(`CLIENTE: ${client.toUpperCase()}`, 20, 75);
            doc.text(`VEICOLO: ${car}`, 20, 85);
            doc.text(`PREZZO: $ ${parseInt(price).toLocaleString()}`, 20, 95);
            
            fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: "<@&1465030207483154554>",
                    embeds: [{
                        title: "📈 VENDITA CONCLUSA",
                        color: 3066993,
                        fields: [
                            { name: "Cliente", value: client, inline: true },
                            { name: "Auto", value: car, inline: true },
                            { name: "Prezzo", value: `$ ${price}`, inline: true },
                            { name: "Agente", value: agent, inline: true }
                        ]
                    }]
                })
            });
            doc.save(`Contratto_${client}.pdf`);
        }
    </script>
</body>
</html>
