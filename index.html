<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONATION | Austin's Elite Motors</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --neon: #ff0000; --bg: #000000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); 
        }
        .logo { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 4px; font-weight: 900; }
        .logo span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        
        nav a { color: #fff; margin-left: 25px; text-decoration: none; font-size: 11px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; cursor: pointer; opacity: 0.6; transition: 0.4s; }
        nav a:hover { opacity: 1; color: var(--neon); }

        .page { display: none; padding-top: 100px; animation: fadeInUp 0.6s ease forwards; min-height: 100vh; }
        .active { display: block; }

        .hero-new { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; text-align: center; overflow: hidden; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%); z-index: 1; }
        .hero-video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.4); }
        .hero-text { z-index: 2; }
        .hero-text h1 { font-family: 'Orbitron'; font-size: clamp(50px, 15vw, 150px); margin: 0; line-height: 0.8; letter-spacing: -5px; }
        
        .btn-action { margin-top: 40px; padding: 18px 45px; background: transparent; color: #fff; border: 1px solid var(--neon); font-family: 'Orbitron'; font-size: 13px; cursor: pointer; box-shadow: 0 0 15px var(--neon); transition: 0.3s; }
        .btn-action:hover { background: var(--neon); color: #000; }
        .btn-danger { background: rgba(255,0,0,0.2); border: 1px solid #ff0000; color: #ff0000; padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; margin-top: 10px; }
        .btn-danger:hover { background: #ff0000; color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 40px 5%; }
        .car-card { background: var(--glass); border: 1px solid var(--border); }
        .car-card img { width: 100%; height: 220px; object-fit: cover; }
        .car-info { padding: 20px; }

        .glass-box { max-width: 600px; margin: 40px auto; background: var(--glass); padding: 40px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; background: #080808; border: 1px solid #222; color: #fff; }

        .log-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; color: #ccc; }
        .log-table th, .log-table td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        .log-table th { background: rgba(255,0,0,0.1); color: var(--neon); text-transform: uppercase; font-family: 'Orbitron'; font-size: 10px; }

        .hidden { display: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">AUTO<span>NATION</span></div>
    <nav>
        <a onclick="goPage('home')">Overview</a>
        <a onclick="goPage('auto')">Inventory</a>
        <a onclick="goPage('personale')">Personale AutoNation</a>
        <a onclick="goPage('owner')">Owner Reserved</a>
    </nav>
</header>

<div id="home" class="page active" style="padding-top:0;">
    <section class="hero-new">
        <div class="video-overlay"></div>
        <video autoplay loop muted playsinline class="hero-video">
            <source src="https://coverr.co/articles/homepage-video-background-with-css/coverr-night-traffic-1571761271617.mp4" type="video/mp4">
        </video>
        <div class="hero-text">
            <h1>AUSTIN<br>PRIDE</h1>
            <p style="letter-spacing:10px; color:var(--neon)">ELITE AUTOMOTIVE HUB</p>
            <button class="btn-action" onclick="goPage('auto')">DISCOVER THE FLEET</button>
        </div>
    </section>
</div>

<div id="auto" class="page">
    <h2 style="text-align:center; font-family:'Orbitron';">THE <span style="color:var(--neon)">FLEET</span></h2>
    <div id="car-list" class="grid"></div>
</div>

<div id="personale" class="page">
    <div id="personal-login" class="glass-box">
        <h3 style="text-align:center; font-family:'Orbitron';">STAFF PORTAL</h3>
        <input id="uStaff" placeholder="OPERATOR ID"><input id="pStaff" type="password" placeholder="PASSWORD">
        <button class="btn-action" style="width:100%" onclick="loginP()">ACCEDI</button>
    </div>
    <div id="personal-content" class="hidden">
        <div class="glass-box">
            <h3 style="font-family:'Orbitron'; color:var(--neon);">NUOVA VENDITA</h3>
            <select id="selAuto" onchange="updatePrice()"></select>
            <input id="fCliente" placeholder="NOME COMPLETO ACQUIRENTE">
            <input id="fPrezzo" placeholder="PREZZO FINALE">
            <input id="fFirmaStaff" placeholder="IL TUO NOME (FIRMA)">
            <button class="btn-action" style="width:100%" onclick="eseguiVendita()">REGISTRA E GENERA CONTRATTO</button>
        </div>
    </div>
</div>

<div id="owner" class="page">
    <div id="owner-login" class="glass-box">
        <h3 style="font-family:'Orbitron';">OWNER ACCESS</h3>
        <input id="oPass" type="password" placeholder="MASTER KEY">
        <button class="btn-action" style="width:100%" onclick="loginO()">SBLOCCA CORE</button>
    </div>
    <div id="owner-content" class="hidden">
        <div class="glass-box">
            <h3 style="font-family:'Orbitron'; color:var(--neon);">AGGIUNGI AUTO</h3>
            <input id="cName" placeholder="MODELLO"><input id="cPrice" placeholder="PREZZO LISTINO"><input type="file" id="cImg">
            <button class="btn-action" style="width:100%" onclick="caricaAuto()">CARICA IN SHOWROOM</button>
        </div>
        
        <div class="glass-box" style="max-width:98%">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="font-family:'Orbitron';">LOGS VENDITE</h3>
                <button class="btn-danger" onclick="resetTarghe()">RESET TARGHE E VENDITE</button>
            </div>
            <table class="log-table">
                <thead><tr><th>DATA</th><th>CLIENTE</th><th>AUTO</th><th>TARGA</th><th>PREZZO</th><th>OPERATORE</th></tr></thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// --- FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
    authDomain: "autonation-bc786.firebaseapp.com",
    databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "autonation-bc786",
    storageBucket: "autonation-bc786.firebasestorage.app",
    messagingSenderId: "440986575785",
    appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let tempImg = null;

// --- GESTIONE TARGHE ---
async function calcolaProssimaTarga() {
    const snap = await db.ref('sales_logs').limitToLast(1).once('value');
    const data = snap.val();
    if (!data) return "TEX-001";
    const lastKey = Object.keys(data)[0];
    const lastTarga = data[lastKey].targa;
    const num = parseInt(lastTarga.split('-')[1]);
    return "TEX-" + (num + 1).toString().padStart(3, '0');
}

// --- RESET VENDITE (SOLO OWNER) ---
function resetTarghe() {
    if(confirm("ATTENZIONE: Stai per cancellare tutto lo storico vendite e resettare le targhe a TEX-001. Continuare?")) {
        db.ref('sales_logs').remove().then(() => alert("Database vendite resettato."));
    }
}

// --- SYNC ---
db.ref('cars').on('value', s => {
    const data = s.val();
    const grid = document.getElementById("car-list");
    const sel = document.getElementById("selAuto");
    grid.innerHTML = ""; sel.innerHTML = "<option>Scegli Veicolo...</option>";
    for(let id in data){
        grid.innerHTML += `<div class="car-card"><img src="${data[id].image}"><div class="car-info"><h3>${data[id].name}</h3><div style="color:red">${data[id].price}</div></div></div>`;
        sel.innerHTML += `<option value="${data[id].name}" data-p="${data[id].price}">${data[id].name}</option>`;
    }
});

db.ref('sales_logs').on('value', s => {
    const data = s.val();
    const body = document.getElementById("logs-body");
    body.innerHTML = "";
    if(data){
        Object.keys(data).reverse().forEach(id => {
            const v = data[id];
            body.innerHTML += `<tr><td>${v.data}</td><td>${v.cliente}</td><td>${v.veicolo}</td><td style="color:red; font-weight:bold;">${v.targa}</td><td>${v.prezzo}</td><td>${v.staff}</td></tr>`;
        });
    }
});

function goPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById(p).classList.add('active'); window.scrollTo(0,0); }

// OWNER ACTIONS
document.getElementById('cImg').onchange = e => { const r = new FileReader(); r.onload = ev => tempImg = ev.target.result; r.readAsDataURL(e.target.files[0]); };
function caricaAuto() {
    const n = document.getElementById('cName').value, p = document.getElementById('cPrice').value;
    if(!n || !p || !tempImg) return alert("Completa i dati");
    db.ref('cars').push({ name:n, price:p, image:tempImg }).then(()=> { alert("Showroom aggiornato!"); });
}

// STAFF ACTIONS
function updatePrice() { const s = document.getElementById("selAuto"); document.getElementById("fPrezzo").value = s.options[s.selectedIndex].dataset.p || ""; }
async function eseguiVendita() {
    const cli = document.getElementById("fCliente").value, vei = document.getElementById("selAuto").value, prz = document.getElementById("fPrezzo").value, stf = document.getElementById("fFirmaStaff").value;
    if(!cli || !stf || vei === "Scegli Veicolo...") return alert("Dati mancanti");
    const targa = await calcolaProssimaTarga();
    const oggi = new Date().toLocaleDateString('it-IT');
    db.ref('sales_logs').push({ data: oggi, cliente: cli, veicolo: vei, targa: targa, prezzo: prz, staff: stf }).then(() => {
        generaPDF(cli, vei, targa, prz, stf, oggi);
        alert("Contratto Eseguito!");
    });
}

function generaPDF(cli, vei, targa, prz, stf, data) {
    const { jsPDF } = window.jspdf; const pdf = new jsPDF();
    pdf.setFont("helvetica", "bold"); pdf.text("AUTONATION AUSTIN", 105, 20, {align:"center"});
    pdf.setFontSize(10); pdf.text("CERTIFICATO DI VENDITA", 105, 28, {align:"center"});
    pdf.line(10, 32, 200, 32);
    pdf.text("Data: " + data, 10, 45);
    pdf.text("Acquirente: " + cli.toUpperCase(), 10, 52);
    pdf.text("Veicolo: " + vei, 10, 65);
    pdf.setFontSize(16); pdf.text("TARGA ASSEGNATA: " + targa, 10, 75);
    pdf.setFontSize(10); pdf.text("Prezzo: " + prz, 10, 85);
    pdf.text("Firma Staff: " + stf.toUpperCase(), 10, 120);
    pdf.save(`Contratto_${targa}.pdf`);
}

function loginO() { if(document.getElementById('oPass').value === "OWNER123") { document.getElementById('owner-login').classList.add('hidden'); document.getElementById('owner-content').classList.remove('hidden'); } }
function loginP() { if(document.getElementById('uStaff').value === "admin" && document.getElementById('pStaff').value === "1234") { document.getElementById('personal-login').classList.add('hidden'); document.getElementById('personal-content').classList.remove('hidden'); } }
</script>
</body>
</html>
