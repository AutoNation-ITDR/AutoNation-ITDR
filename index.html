<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNation Texas | Elite Operations</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #ff2e4d; --bg: #000000; --surface: #0a0a0a; --border: #1a1a1a; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        nav { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; }
        .logo-nav { width: 120px; height: 120px; margin: 0 auto 30px auto; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .nav-link { padding: 15px; color: #777; border-radius: 10px; margin-bottom: 5px; cursor: pointer; border: none; background: none; text-align: left; font-weight: 700; width: 100%; transition: 0.3s; }
        .nav-link.active { color: white; background: var(--primary); }

        main { flex: 1; overflow-y: auto; background: #050505; position: relative; }
        .page { display: none; padding: 40px; min-height: 100%; }
        .page.active { display: block; }

        /* HOME CINEMATIC */
        .hero { height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; text-align: center; }
        .hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 0; }
        .hero-content { z-index: 1; }
        .hero-content h1 { font-family: 'Montserrat'; font-size: 5rem; line-height: 0.9; }

        /* PANELS */
        .panel { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); max-width: 600px; margin: 0 auto; }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        input, select { width: 100%; padding: 15px; border-radius: 8px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 15px; }
        label { color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* SHOWROOM */
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .car-card { background: var(--surface); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .car-img { width: 100%; height: 180px; object-fit: cover; }
        .car-info { padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <img src="https://i.ibb.co/v4m0YvS/BCO.jpg" class="logo-nav">
        <button class="nav-link active" onclick="navTo('home', this)">HOME</button>
        <button class="nav-link" onclick="navTo('showroom', this)">SHOWROOM</button>
        <button class="nav-link" onclick="navTo('sales', this)">VENDITE</button>
        <button class="nav-link" onclick="navTo('owners', this)">OWNER</button>
    </nav>

    <main>
        <div id="home" class="page active">
            <div class="hero">
                <video class="hero-video" autoplay muted loop playsinline>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-fast-driving-in-a-city-at-night-12344-large.mp4" type="video/mp4">
                </video>
                <div class="hero-content">
                    <h1>AUTONATION<br><span style="color:var(--primary)">TEXAS</span></h1>
                    <p>Vehicle Division Elite</p>
                </div>
            </div>
        </div>

        <div id="showroom" class="page">
            <div id="fleet-grid" class="car-grid"></div>
        </div>

        <div id="sales" class="page">
            <div id="sales-gate" class="panel" style="max-width:300px; text-align:center;">
                <h3>STAFF PIN</h3>
                <input type="password" id="pw-sales">
                <button class="btn-prime" onclick="verify('sales')">LOG IN</button>
            </div>
            <div id="sales-content" class="hidden">
                <div class="panel">
                    <h2>NUOVA VENDITA</h2>
                    <label>Auto</label><select id="inv-car" onchange="updatePrice()"></select>
                    <label>Cliente</label><input id="inv-name">
                    <label>Prezzo finale ($)</label><input id="inv-final" readonly>
                    <label>Agente</label><input id="inv-sign">
                    <button class="btn-prime" onclick="makeInvoice()">GENERA PDF</button>
                </div>
            </div>
        </div>

        <div id="owners" class="page">
            <div id="owners-gate" class="panel" style="max-width:300px; text-align:center;">
                <h3>ADMIN PIN</h3>
                <input type="password" id="pw-owners">
                <button class="btn-prime" onclick="verify('owners')">LOG IN</button>
            </div>
            <div id="owners-content" class="hidden">
                <div class="panel">
                    <h3>Aggiungi Auto</h3>
                    <input id="add-n" placeholder="Modello">
                    <input id="add-p" type="number" placeholder="Prezzo">
                    <input type="file" id="add-file">
                    <button class="btn-prime" onclick="saveToDB()">CARICA</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCUH4SGDnbvh1clXm_R_n3ynmDndhIwsbM",
            authDomain: "autonation-bc786.firebaseapp.com",
            databaseURL: "https://autonation-bc786-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "autonation-bc786",
            appId: "1:440986575785:web:e80e42f31a0b5c0b095ab8"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let allCars = {}, cacheImg = "";

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function verify(type) {
            const pin = document.getElementById('pw-'+type).value;
            if((type==='sales' && pin==='1234') || (type==='owners' && pin==='OWNER2026')) {
                document.getElementById(type+'-gate').classList.add('hidden');
                document.getElementById(type+'-content').classList.remove('hidden');
            }
        }

        db.ref('cars').on('value', s => { 
            allCars = s.val() || {}; 
            renderShowroom(); 
            const sel = document.getElementById('inv-car'); 
            sel.innerHTML = "<option disabled selected>Scegli...</option>";
            for(let k in allCars) sel.innerHTML += `<option value="${allCars[k].name}">${allCars[k].name}</option>`;
        });

        function renderShowroom() {
            const grid = document.getElementById('fleet-grid'); grid.innerHTML = "";
            for(let k in allCars) {
                const c = allCars[k];
                grid.innerHTML += `<div class="car-card"><img src="${c.img}" class="car-img"><div class="car-info"><h3>${c.name}</h3><p style="color:var(--primary); font-weight:bold;">$ ${parseInt(c.price).toLocaleString()}</p></div></div>`;
            }
        }

        function updatePrice() {
            const n = document.getElementById('inv-car').value;
            for(let k in allCars) if(allCars[k].name === n) document.getElementById('inv-final').value = allCars[k].price;
        }

        document.getElementById('add-file').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => cacheImg = ev.target.result; r.readAsDataURL(e.target.files[0]);
        };

        function saveToDB() {
            const n = document.getElementById('add-n').value, p = document.getElementById('add-p').value;
            if(n && p && cacheImg) db.ref('cars').push({ name: n, price: p, img: cacheImg }).then(() => alert("Caricata!"));
        }

        function makeInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const client = document.getElementById('inv-name').value || "CLIENTE";
            const car = document.getElementById('inv-car').value || "VEICOLO";
            const price = document.getElementById('inv-final').value || "0";
            const agent = document.getElementById('inv-sign').value || "AGENTE TEXAS";

            // Sfondo Rosso Texas
            doc.setFillColor(255, 46, 77); doc.rect(0, 0, 210, 40, 'F');
            
            // Logo
            doc.addImage("https://i.ibb.co/v4m0YvS/BCO.jpg", 'JPEG', 160, 5, 30, 30);
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22); doc.text("AUTONATION TEXAS", 20, 25);
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text("CLIENTE: " + client, 20, 60);
            doc.text("DATA: " + new Date().toLocaleDateString(), 20, 65);
            
            doc.line(20, 75, 190, 75);
            doc.text("VEICOLO: " + car, 25, 85);
            doc.text("TOTALE: $ " + parseInt(price).toLocaleString(), 25, 92);
            doc.line(20, 100, 190, 100);

            // Firme classiche (Niente AcroForms che buggano)
            doc.text("FIRMA ACQUIRENTE:", 20, 130);
            doc.line(20, 145, 80, 145);
            
            doc.text("FIRMA AGENTE (VERIFICATA):", 120, 130);
            doc.setFont("courier", "italic"); doc.setFontSize(14);
            doc.text(agent, 120, 142);
            
            doc.save(`Fattura_${client}.pdf`);
        }
    </script>
</body>
</html>
